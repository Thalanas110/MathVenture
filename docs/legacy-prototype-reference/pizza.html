<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Magic Pizza Chef Addition</title>
    <style>
        :root {
            --pizza-crust: #eab308;
            --sauce-red: #dc2626;
            --chef-blue: #2563eb;
            --box-tan: #fed7aa;
            --dark: #334155;
        }

        body {
            margin: 0;
            padding: 20px; /* Added padding to protect phone edges */
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif;
            background: linear-gradient(180deg, #ffedd5 0%, #fed7aa 100%);
            color: var(--dark);
            display: flex;
            flex-direction: column; /* Forces vertical stacking */
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            gap: 25px; /* Adds space between game and buttons */
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }

        #game-container {
            width: 100%; /* Changed to 100% for safe mobile sizing */
            max-width: 460px;
            background: #ffffff;
            border: 6px solid var(--chef-blue);
            border-radius: 32px;
            padding: 20px;
            box-shadow: 0 20px 40px rgba(37, 99, 235, 0.15);
            text-align: center;
            position: relative;
            box-sizing: border-box;
        }

        .hud-row {
            display: flex;
            justify-content: space-between;
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--chef-blue);
            margin-bottom: 5px;
        }

        /* The Cooking Kitchen Stage */
        #kitchen-stage {
            height: 180px;
            background: #f8fafc;
            border: 4px solid #cbd5e1;
            border-radius: 24px;
            margin: 15px 0;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            box-shadow: inset 0 4px 8px rgba(0,0,0,0.05);
        }

        /* The Pizza Crust */
        #pizza-pie {
            width: 150px;
            height: 150px;
            background: #fef08a;
            border: 8px solid var(--pizza-crust);
            border-radius: 50%;
            position: relative;
            box-shadow: 0 6px 10px rgba(0,0,0,0.1);
            display: flex;
            overflow: hidden;
        }

        /* Split the pizza into two halves visually */
        .pizza-half {
            width: 50%;
            height: 100%;
            position: relative;
            display: flex;
            flex-wrap: wrap;
            align-content: center;
            justify-content: center;
            gap: 6px;
            padding: 10px;
            box-sizing: border-box;
        }

        #left-half {
            background: rgba(220, 38, 38, 0.15); /* Light sauce color left */
            border-right: 2px dashed rgba(234, 179, 8, 0.5);
        }

        #right-half {
            background: rgba(220, 38, 38, 0.08); /* Slightly lighter sauce right */
        }

        .topping {
            font-size: 1.8rem;
            display: inline-block;
            filter: drop-shadow(0 2px 2px rgba(0,0,0,0.15));
            animation: toss 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes toss {
            0% { transform: scale(0) translateY(-50px); opacity: 0; }
            100% { transform: scale(1) translateY(0); opacity: 1; }
        }

        #math-equation {
            font-size: 3.5rem;
            font-weight: 900;
            margin: 10px 0;
            color: var(--sauce-red);
            text-shadow: 2px 2px 0px #fee2e2;
        }

        /* Delivery Box Buttons */
        #delivery-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-top: 15px;
        }

        .box-btn {
            background-color: var(--box-tan);
            color: #7c2d12;
            border: 3px solid #b45309;
            border-radius: 20px;
            font-size: 2.5rem;
            font-weight: bold;
            padding: 10px 0;
            cursor: pointer;
            box-shadow: 0 6px 0 #7c2d12;
            font-family: inherit;
            transition: transform 0.1s;
        }

        .box-btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #7c2d12;
        }

        /* Display Shelf */
        #display-shelf {
            background: #f1f5f9;
            border-top: 4px solid var(--chef-blue);
            border-radius: 12px;
            padding: 8px;
            margin-top: 15px;
        }

        #shelf-rewards {
            display: flex;
            justify-content: center;
            gap: 10px;
            font-size: 1.8rem;
            min-height: 35px;
            flex-wrap: wrap;
        }

        /* Award Popup Modal */
        #chef-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.98);
            border-radius: 26px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }

        #chef-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }

        .prize-spin {
            font-size: 6.5rem;
            animation: prizeWave 1s infinite alternate ease-in-out;
        }

        @keyframes prizeWave {
            0% { transform: translateY(0) rotate(-5deg); }
            100% { transform: translateY(-12px) rotate(5deg); }
        }

        .cook-btn {
            background-color: var(--chef-blue);
            color: white;
            border: none;
            padding: 12px 35px;
            font-size: 1.3rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 0 #1d4ed8;
            font-family: inherit;
        }

        /* Modern layout for bottom navigation images */
        .nav-buttons {
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap; /* Allows safe stacking on narrow screens */
            gap: 20px;
        }

        .nav-buttons img {
            transition: transform 0.2s;
            border-radius: 15px;
        }

        @media (hover: hover) {
            .nav-buttons img:hover {
                transform: scale(1.05);
            }
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="chef-overlay">
            <h2 style="color: var(--chef-blue); margin: 0; font-size: 2.2rem;">👩‍🍳 Star Chef! 👨‍🍳</h2>
            <p style="font-size: 1.2rem; margin: 5px 0; color: #475569;">You unlocked a golden kitchen tool:</p>
            <div class="prize-spin" id="reward-icon">🍳</div>
            <button class="cook-btn" onclick="closeChefWindow()">Bake More Pizzas!</button>
        </div>

        <div class="hud-row">
            <div>Pizzas: <span id="score-text" style="color: var(--chef-blue);">0</span></div>
            <div>Next Star: <span id="target-text" style="color: var(--pizza-crust);">10</span></div>
        </div>

        <div id="kitchen-stage">
            <div style="position: absolute; left: 15px; font-size: 3.5rem;">👨‍🍳</div>
            <div id="pizza-pie">
                <div class="pizza-half" id="left-half"></div>
                <div class="pizza-half" id="right-half"></div>
            </div>
        </div>

        <p style="margin: 0; font-weight: bold; color: #64748b;">Count all the toppings on the pizza!</p>
        <div id="math-equation">3 + 2</div>

        <div id="delivery-grid">
            <button class="box-btn" onclick="checkPizzaAnswer(this)">?</button>
            <button class="box-btn" onclick="checkPizzaAnswer(this)">?</button>
            <button class="box-btn" onclick="checkPizzaAnswer(this)">?</button>
        </div>

        <div id="display-shelf">
            <div style="font-size: 0.75rem; color: #94a3b8; font-weight: bold; text-transform: uppercase; margin-bottom: 3px;">Your Golden Kitchen Collection</div>
            <div id="shelf-rewards"></div>
        </div>
    </div>

    <div class="nav-buttons">
        <a href="rocket.html"><img src="np.png" width="80" height="50" alt="Next Page"></a>
        <a href="1.html"><img src="ACT.png" width="80" height="50" alt="Activity"></a>
    </div>

    <script>
        let score = 0;
        let correctAnswer = 0;
        let chefMilestone = 10;

        const leftToppings = ['🍕', '🍅', '🍄', '🫑']; // Toppings for the left side
        const rightToppings = ['🍍', '🧀', '🧅', '🌽']; // Toppings for the right side
        const kitchenPrizes = ['🍳', '🧑‍🍳', '🥣', '🥤', '🧂', '🔪', '🥖', '🍩'];

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playPizzaSound(type) {
            const now = audioCtx.currentTime;

            if (type === 'bell') {
                // Happy high-pitched oven timer bell ring "Ding!"
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(880, now); // A5 note
                gain.gain.setValueAtTime(0.2, now);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(now); osc.stop(now + 0.4);
            } else if (type === 'buzz') {
                // Short buzz sound for a wrong delivery box
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(160, now);
                gain.gain.setValueAtTime(0.15, now);
                gain.gain.linearRampToValueAtTime(0.01, now + 0.2);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(now); osc.stop(now + 0.2);
            } else if (type === 'fanfare') {
                // Uplifting chord for earning a chef prize
                const notes = [261.63, 329.63, 392.00, 523.25];
                notes.forEach((freq, idx) => {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(freq, now + (idx * 0.06));
                    gain.gain.setValueAtTime(0.15, now + (idx * 0.06));
                    gain.gain.exponentialRampToValueAtTime(0.01, now + (idx * 0.06) + 0.3);
                    osc.connect(gain); gain.connect(audioCtx.destination);
                    osc.start(now + (idx * 0.06)); osc.stop(now + (idx * 0.06) + 0.3);
                });
            }
        }

        function buildPizzaOrder() {
            // Keep addition sums simple for kindergarten (total between 2 and 10)
            const num1 = Math.floor(Math.random() * 5) + 1; // 1 to 5
            const num2 = Math.floor(Math.random() * 5) + 1; // 1 to 5
            correctAnswer = num1 + num2;

            document.getElementById('math-equation').textContent = `${num1} + ${num2}`;

            // Add left-half toppings
            const leftSide = document.getElementById('left-half');
            leftSide.innerHTML = '';
            const top1 = leftToppings[Math.floor(Math.random() * leftToppings.length)];
            for (let i = 0; i < num1; i++) {
                const span = document.createElement('span');
                span.className = 'topping';
                span.textContent = top1;
                leftSide.appendChild(span);
            }

            // Add right-half toppings
            const rightSide = document.getElementById('right-half');
            rightSide.innerHTML = '';
            const top2 = rightToppings[Math.floor(Math.random() * rightToppings.length)];
            for (let i = 0; i < num2; i++) {
                const span = document.createElement('span');
                span.className = 'topping';
                span.textContent = top2;
                rightSide.appendChild(span);
            }

            // Create answer selection options
            let choices = [correctAnswer];
            while (choices.length < 3) {
                let fake = Math.floor(Math.random() * 9) + 2; // 2 to 10
                if (!choices.includes(fake)) choices.push(fake);
            }
            choices.sort(() => Math.random() - 0.5);

            // Set up button faces
            const buttons = document.querySelectorAll('.box-btn');
            buttons.forEach((btn, idx) => {
                btn.textContent = choices[idx];
                btn.disabled = false;
                btn.style.backgroundColor = 'var(--box-tan)';
                btn.style.borderColor = '#b45309';
                btn.style.boxShadow = '0 6px 0 #7c2d12';
            });
        }

        function checkPizzaAnswer(button) {
            const userGuess = parseInt(button.textContent);
            const buttons = document.querySelectorAll('.box-btn');

            if (userGuess === correctAnswer) {
                score++;
                document.getElementById('score-text').textContent = score;
                playPizzaSound('bell');

                button.style.backgroundColor = '#22c55e';
                button.style.borderColor = '#16a34a';
                button.style.boxShadow = '0 6px 0 #15803d';
                buttons.forEach(btn => btn.disabled = true);

                if (score === chefMilestone) {
                    setTimeout(showChefPrize, 800);
                } else {
                    setTimeout(buildPizzaOrder, 1200);
                }
            } else {
                playPizzaSound('buzz');
                button.style.backgroundColor = '#cbd5e1';
                button.style.borderColor = '#94a3b8';
                button.style.boxShadow = '0 6px 0 #64748b';
                button.disabled = true;
            }
        }

        function showChefPrize() {
            playPizzaSound('fanfare');

            const prize = kitchenPrizes[Math.floor(Math.random() * kitchenPrizes.length)];
            document.getElementById('reward-icon').textContent = prize;

            const shelf = document.getElementById('shelf-rewards');
            const span = document.createElement('span');
            span.textContent = prize;
            shelf.appendChild(span);

            document.getElementById('chef-overlay').classList.add('show');
            chefMilestone += 10;
        }

        function closeChefWindow() {
            document.getElementById('chef-overlay').classList.remove('show');
            document.getElementById('target-text').textContent = chefMilestone;
            buildPizzaOrder();
        }

        // Initialize the kitchen!
        buildPizzaOrder();
    </script>
</body>
</html>

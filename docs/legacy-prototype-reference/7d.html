<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🏆 The Balancing Bridge</title>
    <style>
        * { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
        
        body {
            background: #e1f5fe;
            font-family: 'Comic Sans MS', cursive, sans-serif;
            margin: 0;
            padding: 20px; /* Added padding to protect phone edges */
            display: flex;
            flex-direction: column; /* Forces vertical stacking */
            justify-content: flex-start; /* Safely starts content at the top on small screens */
            align-items: center;
            min-height: 100vh;
            min-height: 100dvh; /* Accounts for mobile browser address bars */
            gap: 25px; /* Adds space between game and buttons */
            box-sizing: border-box;
            /* Removed overflow: hidden so mobile users can scroll down to the buttons */
        }

        .game-container {
            width: 100%; /* Changed to 100% for safe mobile sizing */
            max-width: 600px;
            margin-top: auto; /* Pushes the box down to center when there is space */
            text-align: center;
            padding: 20px;
            background: #ffffff;
            border-radius: 40px;
            border: 8px solid #81d4fa;
            box-shadow: 0 10px 0 #4fc3f7;
            position: relative;
            box-sizing: border-box;
        }

        .instruction-box {
            background: #fff9c4;
            padding: 15px;
            border-radius: 20px;
            border: 4px solid #fbc02d;
            font-size: 1.4rem;
            font-weight: bold;
            margin-bottom: 20px;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Scale / Seesaw */
        .scale-area {
            position: relative;
            height: 180px;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            margin-bottom: 40px;
        }

        .base {
            width: 60px;
            height: 40px;
            background: #795548;
            clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
            z-index: 2;
        }

        .plank {
            position: absolute;
            width: 280px;
            height: 15px;
            background: #a1887f;
            bottom: 35px;
            border-radius: 10px;
            transition: transform 0.8s ease-in-out;
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 1;
        }

        .tilt-left { transform: rotate(-15deg); }
        .tilt-right { transform: rotate(15deg); }
        .tilt-flat { transform: rotate(0deg); }

        .side-cargo {
            font-size: 4rem;
            margin-top: -70px;
            filter: drop-shadow(2px 2px 0 rgba(0,0,0,0.1));
        }

        /* Choice Grid */
        .choices {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 15px;
        }

        .choice-btn {
            background: white;
            border: 5px solid #81c784;
            border-radius: 25px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 6px 0 #4caf50;
        }

        .choice-btn:active { transform: translateY(4px); box-shadow: none; }
        .choice-emoji { font-size: 3rem; }
        .choice-label { font-size: 1rem; font-weight: bold; margin-top: 5px; color: #333; }

        /* Trophy Screen */
        #trophyScreen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #fff9c4;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .trophy-big { font-size: 8rem; animation: bounce 1s infinite alternate; }
        @keyframes bounce { from { transform: scale(1); } to { transform: scale(1.1); } }

        .btn-restart {
            padding: 15px 40px;
            font-size: 1.5rem;
            background: #4caf50;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 20px;
        }

        /* Modern layout for bottom navigation images */
        .nav-buttons {
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap; /* Allows safe stacking on narrow screens */
            gap: 20px;
            margin-bottom: auto; /* Pushes the buttons up to balance the centering */
        }

        .nav-buttons img {
            transition: transform 0.2s;
            border-radius: 15px;
        }

        @media (hover: hover) {
            .nav-buttons img:hover {
                transform: scale(1.05);
            }
        }

        @media (max-width: 500px) {
            .plank { width: 220px; }
            .side-cargo { font-size: 3rem; margin-top: -50px; }
            .instruction-box { font-size: 1.1rem; }
        }
    </style>
</head>
<body>

<div id="trophyScreen">
    <div class="trophy-big">🏆✨</div>
    <h1 style="color: #5d4037;">WEIGHT STAR!</h1>
    <p>You balanced 10 scales!</p>
    <button class="btn-restart" onclick="resetGame()">Play Again! 🔄</button>
</div>

<div class="game-container">
    <div class="instruction-box" id="msg">Which one is HEAVY?</div>

    <div class="scale-area">
        <div class="plank tilt-flat" id="plank">
            <div class="side-cargo" id="leftSide">❓</div>
            <div class="side-cargo" id="rightSide">❓</div>
        </div>
        <div class="base"></div>
    </div>

    <div class="choices" id="choiceGrid"></div>

    <div style="font-weight: bold; color: #fbc02d; font-size: 1.2rem;">
        ⭐ Score: <span id="score">0</span> / 10
    </div>
</div>

<div class="nav-buttons">
    <a href="tiny.html"><img src="np.png" width="80" height="50" alt="Next Page"></a>
    <a href="1.html"><img src="ACT.png" width="80" height="50" alt="Activity"></a>
</div>

<script>
    const items = [
        { name: "Elephant", emoji: "🐘", w: 10 },
        { name: "Feather", emoji: "🪶", w: 1 },
        { name: "Butterfly", emoji: "🦋", w: 1 },
        { name: "Truck", emoji: "🚛", w: 10 },
        { name: "Balloon", emoji: "🎈", w: 1 },
        { name: "Hippo", emoji: "🦛", w: 10 },
        { name: "Leaf", emoji: "🍃", w: 1 },
        { name: "Plane", emoji: "✈️", w: 10 }
    ];

    let score = 0;
    let target = "HEAVY";
    let currentPair = [];

    function setupRound() {
        if (score >= 10) {
            document.getElementById('trophyScreen').style.display = 'flex';
            return;
        }

        const plank = document.getElementById('plank');
        const left = document.getElementById('leftSide');
        const right = document.getElementById('rightSide');
        const grid = document.getElementById('choiceGrid');
        const msg = document.getElementById('msg');

        plank.className = "plank tilt-flat";
        left.innerText = "❓";
        right.innerText = "❓";

        const heavy = items.filter(i => i.w === 10)[Math.floor(Math.random() * 4)];
        const light = items.filter(i => i.w === 1)[Math.floor(Math.random() * 4)];
        
        currentPair = [heavy, light].sort(() => Math.random() - 0.5);
        target = Math.random() > 0.5 ? "HEAVY" : "LIGHT";
        
        msg.innerText = "Which one is " + target + "?";
        msg.style.color = target === "HEAVY" ? "#d32f2f" : "#1976d2";

        grid.innerHTML = currentPair.map(item => `
            <div class="choice-btn" onclick="check('${item.name}')">
                <span class="choice-emoji">${item.emoji}</span>
                <span class="choice-label">${item.name}</span>
            </div>
        `).join('');
    }

    window.check = function(name) {
        const selected = currentPair.find(i => i.name === name);
        const plank = document.getElementById('plank');
        const left = document.getElementById('leftSide');
        const right = document.getElementById('rightSide');
        const msg = document.getElementById('msg');

        left.innerText = currentPair[0].emoji;
        right.innerText = currentPair[1].emoji;

        // Heavy side always goes down
        if (currentPair[0].w > currentPair[1].w) {
            plank.className = "plank tilt-left";
        } else {
            plank.className = "plank tilt-right";
        }

        const correct = (target === "HEAVY" && selected.w === 10) || (target === "LIGHT" && selected.w === 1);

        if (correct) {
            score++;
            document.getElementById('score').innerText = score;
            msg.innerText = "YES! " + name + " is " + target + "! ✨";
        } else {
            msg.innerText = "Look! " + (selected.w === 10 ? "Heavy goes down." : "Light stays up.");
        }

        document.querySelectorAll('.choice-btn').forEach(b => b.style.pointerEvents = 'none');
        setTimeout(setupRound, 3000);
    };

    window.resetGame = function() {
        score = 0;
        document.getElementById('score').innerText = "0";
        document.getElementById('trophyScreen').style.display = 'none';
        setupRound();
    };

    setupRound();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Shortest to Longest Game</title>

<style>
  body {
    font-family: Arial;
    text-align: center;
    background: #dff5d8;
  }

  h1 {
    margin-top: 20px;
  }

  #choices, #answers {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 30px;
  }

  .caterpillar {
    display: flex;
    align-items: center;
    cursor: grab;
  }

  .segment {
    width: 25px;
    height: 25px;
    background: #4CAF50;
    border-radius: 50%;
    margin: 2px;
  }

  .head {
    background: #2e7d32;
    position: relative;
  }

  .head::after {
    content: "👀";
    position: absolute;
    top: -10px;
    left: 0;
    font-size: 12px;
  }

  .slot {
    width: 200px;
    height: 60px;
    border: 3px dashed #333;
  }

  #message {
    font-size: 24px;
    color: green;
    margin-top: 20px;
  }
</style>
</head>

<body>

<h1>🐛 Shortest to Longest</h1>
<p>Drag the caterpillars from shortest to longest!</p>

<div id="choices"></div>
<div id="answers"></div>

<div id="message"></div>

<script>
const sizes = [3, 5, 7, 9]; // number of segments (short → long)
const shuffled = [...sizes].sort(() => Math.random() - 0.5);

const choices = document.getElementById("choices");
const answers = document.getElementById("answers");
const message = document.getElementById("message");

// Create caterpillars
shuffled.forEach(size => {
  const caterpillar = document.createElement("div");
  caterpillar.className = "caterpillar";
  caterpillar.draggable = true;
  caterpillar.dataset.size = size;

  // Build body
  for (let i = 0; i < size; i++) {
    const segment = document.createElement("div");
    segment.className = "segment";
    if (i === 0) segment.classList.add("head");
    caterpillar.appendChild(segment);
  }

  caterpillar.addEventListener("dragstart", () => {
    caterpillar.classList.add("dragging");
  });

  caterpillar.addEventListener("dragend", () => {
    caterpillar.classList.remove("dragging");
  });

  choices.appendChild(caterpillar);
});

// Create slots
for (let i = 0; i < sizes.length; i++) {
  const slot = document.createElement("div");
  slot.className = "slot";

  slot.addEventListener("dragover", e => e.preventDefault());

  slot.addEventListener("drop", () => {
    const dragging = document.querySelector(".dragging");
    if (dragging && slot.children.length === 0) {
      slot.appendChild(dragging);
      checkAnswer();
    }
  });

  answers.appendChild(slot);
}

// Check order
function checkAnswer() {
  let correct = true;

  for (let i = 0; i < sizes.length; i++) {
    const slot = answers.children[i];
    if (!slot.firstChild || slot.firstChild.dataset.size != sizes[i]) {
      correct = false;
      break;
    }
  }

  if (correct) {
    message.textContent = "🎉 Great job! You got the correct order!";
  }
}
</script>

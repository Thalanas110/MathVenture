<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Tiny Builder's Ruler</title>
    <style>
        :root {
            --wood-brown: #b45309;
            --ruler-yellow: #fde047;
            --blueprint-blue: #1d4ed8;
            --hard-hat-orange: #f97316;
            --dark: #334155;
        }

        body {
            margin: 0;
            padding: 20px; /* Added padding to protect phone edges */
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif;
            background: linear-gradient(180deg, #fef3c7 0%, #fde68a 100%);
            color: var(--dark);
            display: flex;
            flex-direction: column; /* Forces vertical stacking */
            justify-content: flex-start; /* Safely starts content at the top on small screens */
            align-items: center;
            min-height: 100vh;
            min-height: 100dvh; /* Accounts for mobile browser address bars */
            gap: 25px; /* Adds space between game and buttons */
            user-select: none;
            -webkit-user-select: none;
            box-sizing: border-box;
        }

        #game-container {
            width: 100%; /* Changed to 100% for safe mobile sizing */
            max-width: 440px;
            margin-top: auto; /* Pushes the box down to center when there is space */
            background: #ffffff;
            border: 6px solid var(--hard-hat-orange);
            border-radius: 32px;
            padding: 20px;
            box-shadow: 0 20px 40px rgba(249, 115, 22, 0.15);
            text-align: center;
            position: relative;
            box-sizing: border-box;
        }

        .hud-row {
            display: flex;
            justify-content: space-between;
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--hard-hat-orange);
            margin-bottom: 5px;
        }

        /* The Interactive Measuring Workbench */
        #workbench {
            background: #f8fafc;
            border: 4px solid #cbd5e1;
            border-radius: 24px;
            margin: 20px 0;
            padding: 20px;
            box-sizing: border-box;
            box-shadow: inset 0 4px 8px rgba(0,0,0,0.05);
        }

        /* Grid Framework: 5 columns matching the 5 inches */
        .measurement-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            width: 100%;
            position: relative;
        }

        /* The Item Holder Area */
        #item-zone {
            height: 50px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: flex-start;
        }

        /* Digital block representing the object length */
        #brick-toy {
            height: 35px;
            background: linear-gradient(135deg, #ff7043 0%, #f4511e 100%);
            border: 3px solid #bf360c;
            border-radius: 8px;
            box-shadow: 0 4px 0 #d84315, inset 0 2px 4px rgba(255,255,255,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
            font-size: 1.3rem;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
            box-sizing: border-box;
            transition: width 0.2s ease-out;
            white-space: nowrap;
            overflow: hidden;
        }

        /* The Master Locked Ruler */
        #ruler-bar {
            background-color: var(--ruler-yellow);
            border: 4px solid var(--wood-brown);
            border-radius: 10px;
            height: 65px;
            box-shadow: 0 4px 0 #78350f;
        }

        .inch-mark {
            border-right: 3px solid var(--wood-brown);
            height: 100%;
            position: relative;
            box-sizing: border-box;
        }

        .inch-mark:last-child {
            border-right: none;
        }

        /* Tall line at the end of the inch block */
        .inch-mark::after {
            content: '';
            position: absolute;
            right: -3px;
            top: 0;
            width: 3px;
            height: 24px;
            background-color: var(--wood-brown);
        }

        /* Short middle half-inch mark */
        .inch-mark::before {
            content: '';
            position: absolute;
            right: 50%;
            top: 0;
            width: 2px;
            height: 12px;
            background-color: var(--wood-brown);
        }

        .number-label {
            position: absolute;
            right: -7px;
            bottom: 4px;
            font-weight: 900;
            font-size: 1.2rem;
            color: var(--wood-brown);
        }

        .start-zero {
            position: absolute;
            left: 5px;
            bottom: 4px;
            font-weight: 900;
            font-size: 1.2rem;
            color: var(--wood-brown);
        }

        /* Blueprint Answer Grid */
        #blueprint-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-top: 20px;
        }

        .blueprint-btn {
            background-color: var(--blueprint-blue);
            color: white;
            border: 3px solid #1e3a8a;
            border-radius: 20px;
            font-size: 2.2rem;
            font-weight: bold;
            padding: 10px 0;
            cursor: pointer;
            box-shadow: 0 6px 0 #1e3a8a;
            font-family: inherit;
            transition: transform 0.1s;
        }

        .blueprint-btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #1e3a8a;
        }

        /* Storage Toolbox Frame */
        #toolbox-shelf {
            background: #f1f5f9;
            border-top: 4px solid var(--hard-hat-orange);
            border-radius: 12px;
            padding: 8px;
            margin-top: 15px;
        }

        #shelf-tools {
            display: flex;
            justify-content: center;
            gap: 10px;
            font-size: 1.8rem;
            min-height: 35px;
        }

        /* Milestone Popup Reward Box */
        #builder-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.98);
            border-radius: 26px;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 10; opacity: 0; pointer-events: none;
            transition: opacity 0.4s ease;
        }

        #builder-overlay.show { opacity: 1; pointer-events: auto; }

        .next-job-btn {
            background-color: var(--hard-hat-orange);
            color: white;
            border: none;
            padding: 12px 35px;
            font-size: 1.3rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 0 #c2410c;
            font-family: inherit;
        }

        /* Modern layout for bottom navigation images */
        .nav-buttons {
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap; /* Allows safe stacking on narrow screens */
            gap: 20px;
            margin-bottom: auto; /* Pushes the buttons up to balance the centering */
        }

        .nav-buttons img {
            transition: transform 0.2s;
            border-radius: 15px;
        }

        @media (hover: hover) {
            .nav-buttons img:hover {
                transform: scale(1.05);
            }
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="builder-overlay">
            <h2 style="color: var(--hard-hat-orange); margin: 0; font-size: 2.2rem;">🔨 Master Builder! 🔨</h2>
            <p style="font-size: 1.2rem; margin: 5px 0; color: #475569;">You earned a new tool:</p>
            <div style="font-size: 6.5rem; margin: 10px 0;" id="tool-icon">🛠️</div>
            <button class="next-job-btn" onclick="closeBuilderWindow()">Next Blueprint!</button>
        </div>

        <div class="hud-row">
            <div>Jobs Done: <span id="score-text" style="color: var(--hard-hat-orange);">0</span></div>
            <div>Next Badge: <span id="target-text" style="color: var(--wood-brown);">10</span></div>
        </div>

        <h2 style="margin: 5px 0; font-size: 1.8rem; color: var(--blueprint-blue);">How long is it?</h2>
        <p style="margin: 0; font-weight: bold; color: #64748b; font-size: 0.9rem;">Look at where the block stops on the ruler!</p>

        <div id="workbench">
            
            <div id="item-zone">
                <div id="brick-toy">🧱 Loading...</div>
            </div>

            <div id="ruler-bar" class="measurement-grid">
                <span class="start-zero">0</span>
                <div class="inch-mark"><span class="number-label">1</span></div>
                <div class="inch-mark"><span class="number-label">2</span></div>
                <div class="inch-mark"><span class="number-label">3</span></div>
                <div class="inch-mark"><span class="number-label">4</span></div>
                <div class="inch-mark"><span class="number-label">5</span></div>
            </div>

        </div>

        <div id="blueprint-grid">
            <button class="blueprint-btn" onclick="checkMeasurement(this)">?</button>
            <button class="blueprint-btn" onclick="checkMeasurement(this)">?</button>
            <button class="blueprint-btn" onclick="checkMeasurement(this)">?</button>
        </div>

        <div id="toolbox-shelf">
            <div style="font-size: 0.75rem; color: #94a3b8; font-weight: bold; text-transform: uppercase; margin-bottom: 3px;">Your Golden Toolbox</div>
            <div id="shelf-tools"></div>
        </div>
    </div>

    <div class="nav-buttons">
        <a href="scoop.html"><img src="np.png" width="80" height="50" alt="Next Page"></a>
        <a href="1.html"><img src="ACT.png" width="80" height="50" alt="Activity"></a>
    </div>

    <script>
        let score = 0;
        let correctLength = 0;
        let builderMilestone = 10;

        const brickLabels = ['🧱 BLOCK', '📦 BOX', '🪵 LOG', 'BAR ✨', 'BEAM 🛠️', 'BOARD'];
        const toolPrizes = ['🔨', '🪚', '🧰', '🧱', '🚜', '📐', '🔧', '🦺'];

        function generateLevel() {
            correctLength = Math.floor(Math.random() * 5) + 1;

            const toy = document.getElementById('brick-toy');
            const randomLabel = brickLabels[Math.floor(Math.random() * brickLabels.length)];
            toy.textContent = randomLabel;
            
            toy.style.width = (correctLength * 20) + "%";

            let choices = [correctLength];
            while (choices.length < 3) {
                let fakeNum = Math.floor(Math.random() * 5) + 1;
                if (!choices.includes(fakeNum)) choices.push(fakeNum);
            }
            choices.sort(() => Math.random() - 0.5);

            const buttons = document.querySelectorAll('.blueprint-btn');
            buttons.forEach((btn, idx) => {
                btn.textContent = choices[idx] + " in";
                btn.value = choices[idx];
                btn.disabled = false;
                btn.style.backgroundColor = 'var(--blueprint-blue)';
                btn.style.borderColor = '#1e3a8a';
                btn.style.boxShadow = '0 6px 0 #1e3a8a';
            });
        }

        function checkMeasurement(button) {
            const guess = parseInt(button.value);
            const buttons = document.querySelectorAll('.blueprint-btn');

            if (guess === correctLength) {
                score++;
                document.getElementById('score-text').textContent = score;

                button.style.backgroundColor = '#22c55e';
                button.style.borderColor = '#16a34a';
                button.style.boxShadow = '0 6px 0 #15803d';
                buttons.forEach(btn => btn.disabled = true);

                if (score === builderMilestone) {
                    setTimeout(showToolAward, 400);
                } else {
                    setTimeout(generateLevel, 800);
                }
            } else {
                button.style.backgroundColor = '#94a3b8';
                button.style.borderColor = '#64748b';
                button.style.boxShadow = '0 6px 0 #475569';
                button.disabled = true;
            }
        }

        function showToolAward() {
            const prize = toolPrizes[Math.floor(Math.random() * toolPrizes.length)];
            document.getElementById('tool-icon').textContent = prize;

            const shelf = document.getElementById('shelf-tools');
            const span = document.createElement('span');
            span.textContent = prize;
            shelf.appendChild(span);

            document.getElementById('builder-overlay').classList.add('show');
            builderMilestone += 10;
        }

        function closeBuilderWindow() {
            document.getElementById('builder-overlay').classList.remove('show');
            document.getElementById('target-text').textContent = builderMilestone;
            generateLevel();
        }

        generateLevel();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Surprise Sequencing!</title>
    <style>
        body {
            font-family: 'Comic Sans MS', sans-serif;
            background-color: #fdf2f8;
            display: flex;
            flex-direction: column;
            align-items: center;
            touch-action: none;
            height: 100vh;
            margin: 0;
            padding-top: 10px;
            overflow: hidden;
            user-select: none;
        }

        #game-bar {
            display: flex;
            justify-content: space-around;
            width: 100%;
            font-weight: bold;
            color: #be185d;
            padding: 10px 0;
            background: rgba(255,255,255,0.5);
            margin-bottom: 5px;
        }

        h1 { color: #9d174d; margin: 5px; font-size: 1.4rem; text-align: center; }
        
        /* Prominent Instruction Box */
        #instructions { 
            font-size: 1.2rem; 
            font-weight: bold;
            color: #db2777; 
            margin-bottom: 15px; 
            background: #fbcfe8;
            padding: 8px 16px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 3px 0px #f472b6;
        }

        #pool, #slots {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 10px 0;
            flex-wrap: wrap;
            min-height: 80px;
            width: 95%;
        }

        .card {
            width: 60px;
            height: 60px;
            background-color: #f472b6;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            font-size: 1.8rem;
            cursor: grab;
            box-shadow: 0 5px 0px #be185d;
            color: white;
            z-index: 10;
        }

        /* Slot style with ghost hint centered */
        .slot {
            width: 60px;
            height: 60px;
            border: 3px dashed #fbcfe8;
            border-radius: 12px;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* Faint ghost icon text */
        .slot::before {
            content: attr(data-hint);
            font-size: 1.6rem;
            color: #cbd5e1; /* Faint gray */
            opacity: 0.5;
            position: absolute;
            pointer-events: none;
        }

        #reward-screen {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #fdf2f8;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        #trophy { font-size: 8rem; animation: bounce 1s infinite alternate; }
        @keyframes bounce { from { transform: scale(1); } to { transform: scale(1.1); } }

        .confetti {
            position: absolute; width: 10px; height: 10px;
            animation: fall 3s linear infinite;
        }
        @keyframes fall { to { transform: translateY(100vh) rotate(360deg); } }

        button {
            padding: 15px 30px; font-size: 1.2rem; border-radius: 20px;
            border: none; background: #db2777; color: white; box-shadow: 0 5px 0 #9d174d;
        }
    </style>
</head>
<body>

    <div id="game-bar">
        <span id="level-display">Level: 1/5</span>
        <span id="score-display">Score: 0</span>
    </div>

    <h1 id="title">Next Challenge!</h1>
    <!-- Clear instructions text target -->
    <p id="instructions">Look closely at the pattern!</p>

    <div id="pool"></div>
    <div id="slots"></div>

    <div id="reward-screen">
        <div id="trophy">🏆</div>
        <h1>GRAND CHAMPION!</h1>
        <p id="final-score"></p>
        <button onclick="location.reload()">Play Again!</button>
    </div>

    <script {nonce}>
        const pool = document.getElementById('pool');
        const slots = document.getElementById('slots');
        const levelDisplay = document.getElementById('level-display');
        const scoreDisplay = document.getElementById('score-display');
        const instructions = document.getElementById('instructions');

        let currentLevel = 1;
        let score = 0;
        let levelAnswer = [];

        // Structured Banks with explicit Kindergarten Instructions
        const banks = {
            numbers: {
                data: ["1","2","3","4","5","6","7","8","9"],
                guide: "Follow the numbers from smallest to biggest! 🔢"
            },
            shapes: {
                data: ["🔴","🟠","🟡","🟢","🔵","🟣","⚫"],
                guide: "Follow the color track order! 🎨"
            },
            animals: {
                data: ["🐥","🐸","🐱","🐶","🦁","🐘","🦒"],
                guide: "Put the animals in a line! 🐾"
            },
            fruit: {
                data: ["🍎","🍊","🍋","🍌","🍉","🍇","🍓"],
                guide: "Sort the delicious fruits! 🍓"
            }
        };

        function initLevel() {
            pool.innerHTML = '';
            slots.innerHTML = '';
            levelDisplay.textContent = `Level: ${currentLevel}/5`;
            
            let count = 3;
            if(currentLevel >= 3) count = 4;
            if(currentLevel === 5) count = 5;

            const keys = Object.keys(banks);
            const randomKey = keys[Math.floor(Math.random() * keys.length)];
            const selectedBank = banks[randomKey];
            
            const startIdx = Math.floor(Math.random() * (selectedBank.data.length - count + 1));
            levelAnswer = selectedBank.data.slice(startIdx, startIdx + count);

            // Dynamically change instructions based on the chosen category
            instructions.textContent = selectedBank.guide;

            // Create target slots with a 'data-hint' background tag
            levelAnswer.forEach((item) => {
                const s = document.createElement('div');
                s.classList.add('slot');
                s.setAttribute('data-hint', item); // Injects the faint visual map element
                slots.appendChild(s);
            });

            // Scramble the cards
            const scrambled = [...levelAnswer].sort(() => Math.random() - 0.5);
            scrambled.forEach(val => {
                const c = document.createElement('div');
                c.classList.add('card');
                c.textContent = val;
                c.onpointerdown = onPointerDown;
                pool.appendChild(c);
            });
        }

        let activeElem = null;
        let startX, startY;

        function onPointerDown(e) {
            activeElem = e.target;
            activeElem.setPointerCapture(e.pointerId);
            const rect = activeElem.getBoundingClientRect();
            startX = e.clientX - rect.left;
            startY = e.clientY - rect.top;
            activeElem.style.position = 'fixed';
            activeElem.style.zIndex = '1000';
            
            activeElem.onpointermove = (ev) => {
                activeElem.style.left = (ev.clientX - startX) + 'px';
                activeElem.style.top = (ev.clientY - startY) + 'px';
            };

            activeElem.onpointerup = (ev) => {
                activeElem.onpointermove = null;
                activeElem.onpointerup = null;
                activeElem.style.display = 'none';
                let target = document.elementFromPoint(ev.clientX, ev.clientY);
                let slot = target ? target.closest('.slot') : null;
                activeElem.style.display = 'flex';
                activeElem.style.position = 'static';

                if (slot && !slot.hasChildNodes()) {
                    slot.appendChild(activeElem);
                    score += 5;
                    scoreDisplay.textContent = `Score: ${score}`;
                } else {
                    pool.appendChild(activeElem);
                }
                checkResult();
            };
        }

        function checkResult() {
            const currentSlots = document.querySelectorAll('.slot');
            let result = [];
            currentSlots.forEach(s => { if(s.firstChild) result.push(s.firstChild.textContent); });

            if (result.length === levelAnswer.length) {
                if (result.join('') === levelAnswer.join('')) {
                    score += 50;
                    if(currentLevel < 5) {
                        currentLevel++;
                        setTimeout(initLevel, 600);
                    } else {
                        showWinner();
                    }
                } else {
                    // Send back to selection pool if incorrect
                    setTimeout(() => {
                        currentSlots.forEach(s => { if(s.firstChild) pool.appendChild(s.firstChild); });
                    }, 500);
                }
            }
        }

        function showWinner() {
            document.getElementById('reward-screen').style.display = 'flex';
            document.getElementById('final-score').textContent = "Total Score: " + score;
            for (let i = 0; i < 50; i++) {
                const c = document.createElement('div');
                c.classList.add('confetti');
                c.style.left = Math.random() * 100 + 'vw';
                c.style.backgroundColor = `hsl(${Math.random() * 360}, 100%, 50%)`;
                c.style.animationDelay = Math.random() * 2 + 's';
                document.getElementById('reward-screen').appendChild(c);
            }
        }

        initLevel();
    </script>

</html>

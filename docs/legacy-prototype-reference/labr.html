<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Barnyard Balance: Heavy vs Light</title>
    <style>
        :root {
            --farm-red: #ef4444;
            --grass-green: #22c55e;
            --sky-blue: #0ea5e9;
            --mud-brown: #78350f;
            --dark: #1e293b;
        }

        body {
            margin: 0;
            padding: 20px; /* Added padding to protect phone edges */
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif;
            background: linear-gradient(180deg, #f0fdf4 0%, #dcfce7 100%);
            color: var(--dark);
            display: flex;
            flex-direction: column; /* Forces vertical stacking */
            justify-content: flex-start; /* Safely starts content at the top on small screens */
            align-items: center;
            min-height: 100vh;
            min-height: 100dvh; /* Accounts for mobile browser address bars */
            gap: 25px; /* Adds space between game and buttons */
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }

        #game-container {
            width: 100%; /* Changed to 100% for safe mobile sizing */
            max-width: 440px;
            margin-top: auto; /* Pushes the box down to center when there is space */
            background: #ffffff;
            border: 6px solid var(--farm-red);
            border-radius: 32px;
            padding: 20px;
            box-shadow: 0 20px 40px rgba(239, 68, 68, 0.15);
            text-align: center;
            position: relative;
            box-sizing: border-box;
        }

        .hud-row {
            display: flex;
            justify-content: space-between;
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--farm-red);
            margin-bottom: 5px;
        }

        #question-banner {
            font-size: 2.2rem;
            font-weight: 900;
            margin: 10px 0;
            color: #991b1b;
            text-transform: uppercase;
        }

        .highlight-word {
            background-color: #fef08a;
            padding: 2px 12px;
            border-radius: 12px;
            border: 2px dashed #ca8a04;
        }

        /* The Barnyard Field Stage */
        #farm-stage {
            height: 180px;
            background: #f8fafc;
            border: 4px solid #cbd5e1;
            border-radius: 24px;
            margin: 15px 0;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 10px;
            box-sizing: border-box;
            box-shadow: inset 0 4px 8px rgba(0,0,0,0.05);
        }

        /* Choice Cards */
        .farm-card {
            width: 42%;
            height: 140px;
            background: #ffffff;
            border: 4px solid #e2e8f0;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 6px 0 #cbd5e1;
            transition: transform 0.1s, box-shadow 0.1s;
        }

        .farm-card:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #cbd5e1;
        }

        .card-emoji {
            font-size: 3.8rem;
            margin-bottom: 5px;
        }

        .card-text {
            font-weight: bold;
            font-size: 1rem;
            color: #475569;
            text-transform: uppercase;
        }

        /* Bottom Trophy Shelf */
        #farm-shelf {
            background: #f1f5f9;
            border-top: 4px solid var(--farm-red);
            border-radius: 12px;
            padding: 8px;
            margin-top: 15px;
        }

        #shelf-badges {
            display: flex;
            justify-content: center;
            gap: 10px;
            font-size: 1.8rem;
            min-height: 35px;
        }

        /* Overlay Reward Window */
        #farm-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.98);
            border-radius: 26px;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 10; opacity: 0; pointer-events: none;
            transition: opacity 0.4s ease;
        }

        #farm-overlay.show { opacity: 1; pointer-events: auto; }

        .next-farm-btn {
            background-color: var(--grass-green);
            color: white;
            border: none;
            padding: 12px 35px;
            font-size: 1.3rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 0 #16a34a;
            font-family: inherit;
        }

        /* Modern layout for bottom navigation images */
        .nav-buttons {
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap; /* Allows safe stacking on narrow screens */
            gap: 20px;
            margin-bottom: auto; /* Pushes the buttons up to balance the centering */
        }

        .nav-buttons img {
            transition: transform 0.2s;
            border-radius: 15px;
        }

        @media (hover: hover) {
            .nav-buttons img:hover {
                transform: scale(1.05);
            }
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="farm-overlay">
            <h2 style="color: var(--farm-red); margin: 0; font-size: 2.2rem;">🚜 Master Farmer! 🚜</h2>
            <p style="font-size: 1.2rem; margin: 5px 0; color: #475569;">You unlocked a golden farm trophy:</p>
            <div style="font-size: 6.5rem; margin: 10px 0;" id="trophy-icon">🌻</div>
            <button class="next-farm-btn" onclick="closeFarmWindow()">Next Task!</button>
        </div>

        <div class="hud-row">
            <div>Items Sorted: <span id="score-text">0</span></div>
            <div>Next Trophy: <span id="target-text" style="color: var(--mud-brown);">10</span></div>
        </div>

        <div id="question-banner">Which is <span id="task-type" class="highlight-word">HEAVY</span>?</div>
        <p style="margin: 0; font-weight: bold; color: #64748b; font-size: 0.9rem;">Tap the card that matches the word!</p>

        <div id="farm-stage">
            
            <div class="farm-card" id="card-0" onclick="selectCard(0)">
                <div class="card-emoji" id="emoji-0">🐄</div>
                <div class="card-text" id="text-0">Cow</div>
            </div>

            <div class="farm-card" id="card-1" onclick="selectCard(1)">
                <div class="card-emoji" id="emoji-1">🍓</div>
                <div class="card-text" id="text-1">Strawberry</div>
            </div>

        </div>

        <div id="farm-shelf">
            <div style="font-size: 0.75rem; color: #94a3b8; font-weight: bold; text-transform: uppercase; margin-bottom: 3px;">Harvest Trophy Case</div>
            <div id="shelf-badges"></div>
        </div>
    </div>

    <div class="nav-buttons">
        <a href="arcade.html"><img src="np.png" width="80" height="50" alt="Next Page"></a>
        <a href="1.html"><img src="ACT.png" width="80" height="50" alt="Activity"></a>
    </div>

    <script>
        let score = 0;
        let farmMilestone = 10;
        
        let targetCondition = "HEAVY";
        let correctIndex = -1;
        let canClick = true;

        const farmPairs = [
            { heavy: { emoji: '🐄', name: 'Cow' }, light: { emoji: '🍓', name: 'Berry' } },
            { heavy: { emoji: '🚜', name: 'Tractor' }, light: { emoji: '🪶', name: 'Feather' } },
            { heavy: { emoji: '🐷', name: 'Pig' }, light: { emoji: '🪱', name: 'Worm' } },
            { heavy: { emoji: '🎃', name: 'Pumpkin' }, light: { emoji: '🍃', name: 'Leaf' } },
            { heavy: { emoji: '🪵', name: 'Log' }, light: { emoji: '🌸', name: 'Flower' } },
            { heavy: { emoji: '🐴', name: 'Horse' }, light: { emoji: '🐣', name: 'Chick' } },
            { heavy: { emoji: '🍉', name: 'Melon' }, light: { emoji: '🍒', name: 'Cherry' } },
            { heavy: { emoji: '🏠', name: 'Barn' }, light: { emoji: '🎈', name: 'Balloon' } }
        ];

        const farmPrizes = ['🌻', '🍎', '🌽', '🥚', '🥕', '🍯', '🥛', '🍉'];

        function generateRound() {
            canClick = true;
            targetCondition = Math.random() > 0.5 ? "HEAVY" : "LIGHT";
            const taskSpan = document.getElementById('task-type');
            taskSpan.textContent = targetCondition;

            if (targetCondition === "HEAVY") {
                taskSpan.style.backgroundColor = "#ffedd5";
                taskSpan.style.borderColor = "#ea580c";
            } else {
                taskSpan.style.backgroundColor = "#e0f2fe";
                taskSpan.style.borderColor = "#0284c7";
            }

            const selectedPair = farmPairs[Math.floor(Math.random() * farmPairs.length)];
            const shuffleOrder = Math.random() > 0.5;
            
            const slot0 = shuffleOrder ? selectedPair.heavy : selectedPair.light;
            const slot1 = shuffleOrder ? selectedPair.light : selectedPair.heavy;

            if (targetCondition === "HEAVY") {
                correctIndex = shuffleOrder ? 0 : 1;
            } else {
                correctIndex = shuffleOrder ? 1 : 0;
            }

            document.getElementById('emoji-0').textContent = slot0.emoji;
            document.getElementById('text-0').textContent = slot0.name;
            document.getElementById('emoji-1').textContent = slot1.emoji;
            document.getElementById('text-1').textContent = slot1.name;

            for (let i = 0; i < 2; i++) {
                const card = document.getElementById(`card-${i}`);
                card.style.opacity = "1";
                card.style.transform = "scale(1)";
                card.style.backgroundColor = "#ffffff";
                card.style.borderColor = "#e2e8f0";
                card.style.boxShadow = "0 6px 0 #cbd5e1";
            }
        }

        function selectCard(index) {
            if (!canClick) return;
            const selectedCard = document.getElementById(`card-${index}`);
            if (index === correctIndex) {
                score++;
                document.getElementById('score-text').textContent = score;
                canClick = false;
                selectedCard.style.backgroundColor = "#dcfce7";
                selectedCard.style.borderColor = "var(--grass-green)";
                selectedCard.style.boxShadow = "0 6px 0 #15803d";
                selectedCard.style.transform = "scale(1.05)";
                const otherIndex = index === 0 ? 1 : 0;
                document.getElementById(`card-${otherIndex}`).style.opacity = "0.3";
                if (score === farmMilestone) setTimeout(showFarmAward, 500);
                else setTimeout(generateRound, 900);
            } else {
                selectedCard.style.opacity = "0.3";
                selectedCard.style.backgroundColor = "#f1f5f9";
                selectedCard.style.borderColor = "#94a3b8";
                selectedCard.style.boxShadow = "0 6px 0 #475569";
            }
        }

        function showFarmAward() {
            const prize = farmPrizes[Math.floor(Math.random() * farmPrizes.length)];
            document.getElementById('trophy-icon').textContent = prize;
            const shelf = document.getElementById('shelf-badges');
            const span = document.createElement('span');
            span.textContent = prize;
            shelf.appendChild(span);
            document.getElementById('farm-overlay').classList.add('show');
            farmMilestone += 10;
        }

        function closeFarmWindow() {
            document.getElementById('farm-overlay').classList.remove('show');
            document.getElementById('target-text').textContent = farmMilestone;
            generateRound();
        }

        generateRound();
    </script>
</body>
</html>

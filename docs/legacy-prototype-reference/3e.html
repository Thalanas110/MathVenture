<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cake Sequencing Game</title>

<style>
  body {
    font-family: Arial;
    text-align: center;
    background: #ffe6f0;
  }

  h1 {
    margin-top: 20px;
  }

  #choices, #answers {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 30px;
  }

  .cake {
    display: flex;
    flex-direction: column;
    align-items: center;
    cursor: grab;
  }

  .layer {
    width: 80px;
    height: 20px;
    background: pink;
    margin: 2px 0;
    border-radius: 5px;
    border: 2px solid #ff99cc;
  }

  .topper {
    font-size: 20px;
  }

  .slot {
    width: 100px;
    height: 120px;
    border: 3px dashed #333;
  }

  #message {
    font-size: 24px;
    color: green;
    margin-top: 20px;
  }
</style>
</head>

<body>

<h1>🎂 Smallest to Biggest Cake</h1>
<p>Drag the cakes from smallest to biggest!</p>

<div id="choices"></div>
<div id="answers"></div>

<div id="message"></div>

<script>
const sizes = [1, 2, 3, 4]; // number of layers
const shuffled = [...sizes].sort(() => Math.random() - 0.5);

const choices = document.getElementById("choices");
const answers = document.getElementById("answers");
const message = document.getElementById("message");

// Create cakes
shuffled.forEach(size => {
  const cake = document.createElement("div");
  cake.className = "cake";
  cake.draggable = true;
  cake.dataset.size = size;

  // topper
  const topper = document.createElement("div");
  topper.className = "topper";
  topper.textContent = "🍒";
  cake.appendChild(topper);

  // layers
  for (let i = 0; i < size; i++) {
    const layer = document.createElement("div");
    layer.className = "layer";
    cake.appendChild(layer);
  }

  cake.addEventListener("dragstart", () => {
    cake.classList.add("dragging");
  });

  cake.addEventListener("dragend", () => {
    cake.classList.remove("dragging");
  });

  choices.appendChild(cake);
});

// Create slots
for (let i = 0; i < sizes.length; i++) {
  const slot = document.createElement("div");
  slot.className = "slot";

  slot.addEventListener("dragover", e => e.preventDefault());

  slot.addEventListener("drop", () => {
    const dragging = document.querySelector(".dragging");
    if (dragging && slot.children.length === 0) {
      slot.appendChild(dragging);
      checkAnswer();
    }
  });

  answers.appendChild(slot);
}

// Check answer
function checkAnswer() {
  let correct = true;

  for (let i = 0; i < sizes.length; i++) {
    const slot = answers.children[i];
    if (!slot.firstChild || slot.firstChild.dataset.size != sizes[i]) {
      correct = false;
      break;
    }
  }

  if (correct) {
    message.textContent = "🎉 Yummy! Correct order!";
  }
}
</script>

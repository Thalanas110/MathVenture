<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Monster's Snack Time!</title>
    <style>
        :root {
            --monster-purple: #a855f7;
            --monster-green: #22c55e;
            --monster-orange: #f97316;
            --bg-light: #faf5ff;
            --card-bg: #ffffff;
        }

        body {
            margin: 0;
            padding: 20px; /* Added padding to protect phone edges */
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif;
            background-color: var(--bg-light);
            color: #334155;
            display: flex;
            flex-direction: column; /* Forces vertical stacking */
            justify-content: flex-start; /* Safely starts content at the top on small screens */
            align-items: center;
            min-height: 100vh;
            min-height: 100dvh; /* Accounts for mobile browser address bars */
            gap: 25px; /* Adds space between game and buttons */
            user-select: none;
            -webkit-user-select: none;
            box-sizing: border-box;
        }

        #game-box {
            width: 100%; /* Changed to 100% for safe mobile sizing */
            max-width: 460px;
            margin-top: auto; /* Pushes the box down to center when there is space */
            background: var(--card-bg);
            border: 5px solid var(--monster-purple);
            border-radius: 32px;
            padding: 20px;
            box-shadow: 0 15px 30px rgba(168, 85, 247, 0.15);
            text-align: center;
            position: relative;
            box-sizing: border-box;
        }

        .stats-bar {
            display: flex;
            justify-content: space-between;
            font-size: 1.1rem;
            font-weight: bold;
            color: #6b21a8;
            margin-bottom: 10px;
        }

        /* The Number Monster Area */
        #monster-container {
            background: #f3e8ff;
            border-radius: 24px;
            padding: 15px;
            margin-bottom: 20px;
            position: relative;
        }

        #monster {
            font-size: 5.5rem;
            margin: 0;
            display: inline-block;
            transition: transform 0.3s;
        }

        #target-bubble {
            background: #fff;
            border: 4px solid #cb6ce6;
            border-radius: 50%;
            width: 65px;
            height: 65px;
            font-size: 2.5rem;
            font-weight: 900;
            color: #9333ea;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            vertical-align: top;
            margin-left: -15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        /* Choice cards containing the items to count */
        #choices-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .choice-card {
            background: #f8fafc;
            border: 3px solid #e2e8f0;
            border-radius: 20px;
            padding: 12px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
            min-height: 60px;
            box-shadow: 0 4px 0 #cbd5e1;
            transition: all 0.1s ease;
        }

        .choice-card:active {
            transform: translateY(4px);
            box-shadow: 0 0px 0 #cbd5e1;
        }

        .snack {
            font-size: 2rem;
        }

        /* Badges drawer */
        #badge-shelf {
            margin-top: 20px;
            padding-top: 10px;
            border-top: 2px dashed #e2e8f0;
        }

        #badges-display {
            display: flex;
            justify-content: center;
            gap: 10px;
            font-size: 1.8rem;
            min-height: 35px;
        }

        /* Full Screen Reward Overlay */
        #reward-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.98);
            border-radius: 26px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }

        #reward-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }

        .badge-giant {
            font-size: 6.5rem;
            animation: bounce 1s infinite alternate;
        }

        @keyframes bounce {
            0% { transform: translateY(0); }
            100% { transform: translateY(-15px); }
        }

        .claim-btn {
            background-color: #a855f7;
            color: white;
            border: none;
            padding: 12px 35px;
            font-size: 1.4rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 0 #7e22ce;
            font-family: inherit;
        }

        /* Modern layout for bottom navigation images */
        .nav-buttons {
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap; /* Allows safe stacking on narrow screens */
            gap: 20px;
            margin-bottom: auto; /* Pushes the buttons up to balance the centering */
        }

        .nav-buttons img {
            transition: transform 0.2s;
            border-radius: 15px;
        }

        @media (hover: hover) {
            .nav-buttons img:hover {
                transform: scale(1.05);
            }
        }
    </style>
</head>
<body>

    <div id="game-box">
        <div id="reward-overlay">
            <h2 style="color: #9333ea; margin: 0; font-size: 2.2rem;">🎉 Number Master! 🎉</h2>
            <p style="font-size: 1.2rem; margin: 5px 0; color: #64748b;">You counted beautifully! You won a badge:</p>
            <div class="badge-giant" id="won-badge">🏅</div>
            <button class="claim-btn" onclick="closeReward()">Feed Me More!</button>
        </div>

        <div class="stats-bar">
            <div>Score: <span id="score-val" style="color: #a855f7;">0</span></div>
            <div>Next Badge: <span id="target-val" style="color: #f97316;">10</span></div>
        </div>

        <div id="monster-container">
            <div id="monster">👾</div>
            <div id="target-bubble" id="target-num">?</div>
            <p style="margin: 10px 0 0 0; font-weight: bold; color: #5b21b6;" id="instruction">Feed me exactly 5 snacks!</p>
        </div>

        <div id="choices-container">
            <div class="choice-card" onclick="verifyChoice(this)" data-count="0"></div>
            <div class="choice-card" onclick="verifyChoice(this)" data-count="0"></div>
            <div class="choice-card" onclick="verifyChoice(this)" data-count="0"></div>
        </div>

        <div id="badge-shelf">
            <div style="font-size: 0.8rem; color: #94a3b8; font-weight: bold; text-transform: uppercase; margin-bottom: 5px;">Badges Earned</div>
            <div id="badges-display"></div>
        </div>
    </div>

    <div class="nav-buttons">
        <a href="6e.html"><img src="np.png" width="80" height="50" alt="Next Page"></a>
        <a href="1.html"><img src="ACT.png" width="80" height="50" alt="Activity"></a>
    </div>

    <script>
        let score = 0;
        let targetNumber = 0;
        let scoreMilestone = 10;

        const monsterEmojis = ['👾', '👹', '🤖', '👽', '🦊', '🦁'];
        const monsterColors = ['#a855f7', '#22c55e', '#f97316', '#ec4899', '#06b6d4'];
        const snackPool = ['🍔', '🍕', '🍩', '🍪', '🍓', '🍉', '🥕', '🍦'];
        const badgePool = ['🏅', '🥇', '⭐', '💎', '👑', '🔮', '🚀', '🎁'];

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playSound(style) {
            const now = audioCtx.currentTime;

            if (style === 'chomp') {
                // Two quick, low biting/crunching sounds "Chomp Chomp!"
                [0, 0.12].forEach((delay) => {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(120, now + delay);
                    osc.frequency.linearRampToValueAtTime(40, now + delay + 0.08);
                    gain.gain.setValueAtTime(0.3, now + delay);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + delay + 0.08);
                    osc.connect(gain); gain.connect(audioCtx.destination);
                    osc.start(now + delay); osc.stop(now + delay + 0.08);
                });
            } else if (style === 'error') {
                // Short buzz sound for a wrong match
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(150, now);
                gain.gain.setValueAtTime(0.15, now);
                gain.gain.linearRampToValueAtTime(0.01, now + 0.2);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(now); osc.stop(now + 0.2);
            } else if (style === 'fanfare') {
                // Happy climbing arpeggio celebration melody
                const notes = [261.63, 329.63, 392.00, 523.25, 659.25];
                notes.forEach((freq, idx) => {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(freq, now + (idx * 0.07));
                    gain.gain.setValueAtTime(0.2, now + (idx * 0.07));
                    gain.gain.exponentialRampToValueAtTime(0.01, now + (idx * 0.07) + 0.2);
                    osc.connect(gain); gain.connect(audioCtx.destination);
                    osc.start(now + (idx * 0.07)); osc.stop(now + (idx * 0.07) + 0.2);
                });
            }
        }

        function buildLevel() {
            // Pick a random number target safe for kindergarteners (From 2 to 9)
            targetNumber = Math.floor(Math.random() * 8) + 2; 

            // Setup display text
            document.getElementById('target-bubble').textContent = targetNumber;
            document.getElementById('instruction').textContent = `Feed me exactly ${targetNumber} snacks!`;
            document.getElementById('monster').textContent = monsterEmojis[score % monsterEmojis.length];

            // Choose a delicious snack type for this specific round
            const activeSnack = snackPool[Math.floor(Math.random() * snackPool.length)];

            // Create three distinct counts (one correct, two fakes)
            let counts = [targetNumber];
            while (counts.length < 3) {
                let fake = Math.floor(Math.random() * 9) + 1; // 1 to 9
                if (!counts.includes(fake)) counts.push(fake);
            }
            counts.sort(() => Math.random() - 0.5); // Shuffle choices

            // Render out the snack items inside each choice card box
            const cards = document.querySelectorAll('.choice-card');
            cards.forEach((card, idx) => {
                card.innerHTML = ''; // clear old snacks
                card.style.background = '#f8fafc';
                card.style.border = '3px solid #e2e8f0';
                card.style.boxShadow = '0 4px 0 #cbd5e1';
                card.style.pointerEvents = 'auto';
                
                const itemQuantity = counts[idx];
                card.setAttribute('data-count', itemQuantity);

                // Add the actual individual item emojis to count
                for (let i = 0; i < itemQuantity; i++) {
                    const span = document.createElement('span');
                    span.className = 'snack';
                    span.textContent = activeSnack;
                    card.appendChild(span);
                }
            });
        }

        function verifyChoice(card) {
            const userCount = parseInt(card.getAttribute('data-count'));
            const cards = document.querySelectorAll('.choice-card');

            if (userCount === targetNumber) {
                score++;
                document.getElementById('score-val').textContent = score;
                playSound('chomp');

                // Animate the monster chewing happily
                document.getElementById('monster').style.transform = 'scale(1.3) rotate(10deg)';
                setTimeout(() => {
                    document.getElementById('monster').style.transform = 'scale(1) rotate(0deg)';
                }, 300);

                // Highlight correct card green
                card.style.background = '#dcfce7';
                card.style.border = '3px solid #22c55e';
                card.style.boxShadow = '0 4px 0 #16a34a';
                cards.forEach(c => c.style.pointerEvents = 'none'); // Lock clicking

                // Check for milestones
                if (score === scoreMilestone) {
                    setTimeout(triggerMilestoneReward, 1000);
                } else {
                    setTimeout(buildLevel, 1200);
                }
            } else {
                playSound('error');
                // Gray out the wrong card option
                card.style.background = '#f1f5f9';
                card.style.border = '3px solid #cbd5e1';
                card.style.boxShadow = '0 4px 0 #94a3b8';
                card.style.pointerEvents = 'none'; // Lock just this wrong choice
            }
        }

        function triggerMilestoneReward() {
            playSound('fanfare');
            
            // Randomly select a shiny reward badge prize
            const randomBadge = badgePool[Math.floor(Math.random() * badgePool.length)];
            document.getElementById('won-badge').textContent = randomBadge;

            // Save the badge permanently down inside the shelf layout
            const shelf = document.getElementById('badges-display');
            const span = document.createElement('span');
            span.textContent = randomBadge;
            shelf.appendChild(span);

            // Dynamically alter game frame outline border color to mix it up!
            const newColor = monsterColors[Math.floor(Math.random() * monsterColors.length)];
            document.getElementById('game-box').style.borderColor = newColor;

            // Trigger window slide display open
            document.getElementById('reward-overlay').classList.add('show');
            scoreMilestone += 10;
        }

        function closeReward() {
            document.getElementById('reward-overlay').classList.remove('show');
            document.getElementById('target-val').textContent = scoreMilestone;
            buildLevel();
        }

        // Initialize the game loop state on start
        buildLevel();
    </script>
</body>
</html>

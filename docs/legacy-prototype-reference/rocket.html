<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cosmic Star Catcher Addition</title>
    <style>
        :root {
            --space-dark: #0f172a;
            --star-gold: #f59e0b;
            --star-purple: #c084fc;
            --neon-cyan: #22d3ee;
            --engine-red: #ef4444;
        }

        body {
            margin: 0;
            padding: 20px; /* Added padding to protect phone edges */
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif;
            background-color: var(--space-dark);
            color: #ffffff;
            display: flex;
            flex-direction: column; /* Forces vertical stacking */
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            gap: 25px; /* Adds space between game and buttons */
            user-select: none;
            -webkit-user-select: none;
            box-sizing: border-box;
        }

        #galaxy-frame {
            width: 100%; /* Changed to 100% for safe mobile sizing */
            max-width: 460px;
            background: rgba(30, 41, 59, 0.8);
            border: 6px solid var(--neon-cyan);
            border-radius: 32px;
            padding: 20px;
            box-shadow: 0 20px 40px rgba(34, 211, 238, 0.2);
            text-align: center;
            position: relative;
            box-sizing: border-box;
        }

        .hud-counters {
            display: flex;
            justify-content: space-between;
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--neon-cyan);
        }

        #rocket-screen {
            font-size: 3.5rem;
            font-weight: 900;
            margin: 10px 0;
            color: #ffffff;
            text-shadow: 0 0 15px var(--neon-cyan);
        }

        /* Clickable Station Tubs */
        .sky-dispenser {
            display: flex;
            justify-content: space-around;
            background: rgba(15, 23, 42, 0.6);
            border-radius: 20px;
            padding: 12px;
            border: 2px dashed #475569;
            margin: 15px 0;
        }

        .star-source {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: rgba(255,255,255,0.05);
            padding: 8px 20px;
            border-radius: 16px;
            cursor: pointer;
            box-shadow: 0 4px 0 #1e293b;
            transition: transform 0.1s;
        }
        .star-source:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #1e293b;
        }

        .movable-star {
            font-size: 3rem;
            filter: drop-shadow(0 0 8px rgba(255,255,255,0.4));
        }

        /* Spaceship Stage */
        #spaceship-stage {
            height: 160px;
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
            border-radius: 24px;
            margin: 15px 0;
            border: 3px solid #334155;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 25px;
        }

        #rocket-ship {
            font-size: 4rem;
        }

        .fuel-tank {
            width: 110px;
            height: 110px;
            background: rgba(255, 255, 255, 0.03);
            border: 3px solid #475569;
            border-radius: 20px;
            display: flex;
            flex-wrap: wrap;
            align-content: center;
            justify-content: center;
            gap: 4px;
            padding: 6px;
            box-sizing: border-box;
        }
        #left-tank { border-color: var(--star-gold); }
        #right-tank { border-color: var(--star-purple); }

        .captured-star {
            font-size: 1.8rem;
            animation: beamIn 0.2s ease-out;
            cursor: pointer;
        }

        @keyframes beamIn {
            0% { transform: scale(0); filter: brightness(3); }
            100% { transform: scale(1); filter: brightness(1); }
        }

        .engine-btn {
            background-color: var(--engine-red);
            color: white;
            border: none;
            padding: 12px 40px;
            font-size: 1.4rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 6px 0 #991b1b;
            font-family: inherit;
            text-transform: uppercase;
        }
        .engine-btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #991b1b;
        }

        #space-shelf {
            background: rgba(15, 23, 42, 0.4);
            border-top: 4px solid var(--neon-cyan);
            border-radius: 12px;
            padding: 8px;
            margin-top: 15px;
        }
        #galaxy-badges {
            display: flex;
            justify-content: center;
            gap: 10px;
            font-size: 1.8rem;
            min-height: 35px;
            flex-wrap: wrap;
        }

        #space-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #1e1b4b 0%, #090514 100%);
            border-radius: 26px;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 10; opacity: 0; pointer-events: none;
            transition: opacity 0.4s ease;
        }
        #space-overlay.show { opacity: 1; pointer-events: auto; }

        /* Modern layout for bottom navigation images */
        .nav-buttons {
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap; /* Allows safe stacking on narrow screens */
            gap: 20px;
        }

        .nav-buttons img {
            transition: transform 0.2s;
            border-radius: 15px;
        }

        @media (hover: hover) {
            .nav-buttons img:hover {
                transform: scale(1.05);
            }
        }
    </style>
</head>
<body>

    <div id="galaxy-frame">
        <div id="space-overlay">
            <h2 style="color: var(--neon-cyan); margin: 0; font-size: 2.2rem;">🚀 Orbit Reached! 🚀</h2>
            <p style="font-size: 1.2rem; margin: 5px 0; color: #cbd5e1;">Your hyperdrive discovered a planet:</p>
            <div style="font-size: 6.5rem;" id="space-badge-icon">🪐</div>
            <button class="engine-btn" style="background-color: var(--neon-cyan); box-shadow: 0 6px 0 #0891b2; color: #0f172a;" onclick="closeSpaceWindow()">Next Mission</button>
        </div>

        <div class="hud-counters">
            <div>Blasts: <span id="score-text" style="color: var(--neon-cyan);">0</span></div>
            <div>Next Planet: <span id="target-text" style="color: var(--star-gold);">10</span></div>
        </div>

        <div id="rocket-screen">4 + 2</div>
        <p style="margin: 0; font-weight: bold; color: #94a3b8; font-size: 0.9rem;">Tap a star button to load fuel! Tap a star inside the tank to delete it.</p>

        <div class="sky-dispenser">
            <div class="star-source" onclick="addStar('left', '⭐')">
                <div class="movable-star">⭐</div>
                <span style="font-size: 0.7rem; font-weight: bold; color: var(--star-gold);">ADD GOLD</span>
            </div>
            <div class="star-source" onclick="addStar('right', '✨')">
                <div class="movable-star">✨</div>
                <span style="font-size: 0.7rem; font-weight: bold; color: var(--star-purple);">ADD PURPLE</span>
            </div>
        </div>

        <div id="spaceship-stage">
            <div class="fuel-tank" id="left-tank"></div>
            <div id="rocket-ship">🚀</div>
            <div class="fuel-tank" id="right-tank"></div>
        </div>

        <button class="engine-btn" onclick="engageHyperdrive()">Launch Hyperdrive! ⚡</button>

        <div id="space-shelf">
            <div style="font-size: 0.75rem; color: #64748b; font-weight: bold; text-transform: uppercase; margin-bottom: 3px;">Discovered Space Map</div>
            <div id="galaxy-badges"></div>
        </div>
    </div>

    <div class="nav-buttons">
        <a href="4e.html"><img src="np.png" width="80" height="50" alt="Next Page"></a>
        <a href="1.html"><img src="ACT.png" width="80" height="50" alt="Activity"></a>
    </div>

    <script>
        let score = 0;
        let num1 = 0, num2 = 0;
        let spaceMilestone = 10;
        const galaxyPrizes = ['🪐', '🌍', '☄️', '🛸', '👽', '☀️', '🌕'];
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playSynthNoise(style) {
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            if (style === 'twinkle') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(900, now);
                osc.frequency.exponentialRampToValueAtTime(1500, now + 0.08);
                gain.gain.setValueAtTime(0.15, now);
            } else if (style === 'warp') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(200, now);
                osc.frequency.exponentialRampToValueAtTime(1800, now + 0.6);
                gain.gain.setValueAtTime(0.2, now);
            } else if (style === 'fail') {
                osc.type = 'triangle'; osc.frequency.setValueAtTime(220, now);
                osc.frequency.linearRampToValueAtTime(80, now + 0.25);
                gain.gain.setValueAtTime(0.2, now);
            }
            gain.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(now); osc.stop(now + 0.6);
        }

        function addStar(side, emoji) {
            const tank = document.getElementById(`${side}-tank`);
            if (tank.children.length >= 6) return;

            const star = document.createElement('span');
            star.className = 'captured-star';
            star.textContent = emoji;
            star.onclick = function(e) { e.stopPropagation(); this.remove(); playSynthNoise('twinkle'); };

            tank.appendChild(star);
            playSynthNoise('twinkle');
        }

        function generateStarCoordinates() {
            num1 = Math.floor(Math.random() * 5) + 1;
            num2 = Math.floor(Math.random() * 5) + 1;
            document.getElementById('rocket-screen').textContent = `${num1} + ${num2}`;
            document.getElementById('left-tank').innerHTML = '';
            document.getElementById('right-tank').innerHTML = '';
        }

        function engageHyperdrive() {
            const leftCount = document.getElementById('left-tank').children.length;
            const rightCount = document.getElementById('right-tank').children.length;

            if (leftCount === num1 && rightCount === num2) {
                score++;
                document.getElementById('score-text').textContent = score;
                playSynthNoise('warp');

                const rocket = document.getElementById('rocket-ship');
                rocket.style.transition = 'transform 0.5s ease-in';
                rocket.style.transform = 'translateY(-250px) scale(1.5)';

                if (score === spaceMilestone) { setTimeout(openGalaxyRewardModal, 600); } 
                else {
                    setTimeout(() => {
                        rocket.style.transition = 'none'; rocket.style.transform = 'translateY(0)';
                        generateStarCoordinates();
                    }, 1100);
                }
            } else {
                playSynthNoise('fail');
                alert("Spaceship engine check! Let's count the fuel tank stars again to match the flight plan numbers! 🚀");
            }
        }

        function openGalaxyRewardModal() {
            const prize = galaxyPrizes[Math.floor(Math.random() * galaxyPrizes.length)];
            document.getElementById('space-badge-icon').textContent = prize;
            const shelf = document.getElementById('galaxy-badges');
            const span = document.createElement('span');
            span.textContent = prize;
            shelf.appendChild(span);
            document.getElementById('space-overlay').classList.add('show');
            spaceMilestone += 10;
        }

        function closeSpaceWindow() {
            document.getElementById('space-overlay').classList.remove('show');
            document.getElementById('target-text').textContent = spaceMilestone;
            const rocket = document.getElementById('rocket-ship');
            rocket.style.transition = 'none'; rocket.style.transform = 'translateY(0)';
            generateStarCoordinates();
        }

        generateStarCoordinates();
    </script>
</body>
</html>

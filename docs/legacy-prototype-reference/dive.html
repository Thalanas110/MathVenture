<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deep Diver: Number Explorer</title>
    <style>
        :root {
            --ocean-blue: #0284c7;
            --deep-sea: #0c4a6e;
            --bubble-cyan: #38bdf8;
            --coral-pink: #fb7185;
            --sand-yellow: #fef08a;
        }

        body {
            margin: 0;
            padding: 20px; /* Added padding to protect phone edges */
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif;
            background: linear-gradient(180deg, #0ea5e9 0%, var(--deep-sea) 100%);
            color: #fff;
            display: flex;
            flex-direction: column; /* Forces vertical stacking */
            justify-content: flex-start; /* Safely starts content at the top on small screens */
            align-items: center;
            min-height: 100vh;
            min-height: 100dvh; /* Accounts for mobile browser address bars */
            gap: 25px; /* Adds space between game and buttons */
            user-select: none;
            -webkit-user-select: none;
            box-sizing: border-box;
            /* Removed overflow: hidden so mobile users can scroll down to the buttons */
        }

        #aquarium-frame {
            width: 100%; /* Changed to 100% for safe mobile sizing */
            max-width: 460px;
            margin-top: auto; /* Pushes the box down to center when there is space */
            background: rgba(12, 74, 110, 0.6);
            border: 6px solid #0284c7;
            border-radius: 32px;
            padding: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4), inset 0 0 20px rgba(56, 189, 248, 0.3);
            text-align: center;
            position: relative;
            box-sizing: border-box;
            backdrop-filter: blur(4px);
        }

        .hud-stats {
            display: flex;
            justify-content: space-between;
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--bubble-cyan);
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        /* Diver Clue Display Window */
        #clue-window {
            background: rgba(255, 255, 255, 0.95);
            color: var(--deep-sea);
            border-radius: 24px;
            padding: 15px;
            margin: 15px 0;
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
        }

        #diver-icon {
            font-size: 3.5rem;
            animation: floatSub 3s infinite ease-in-out;
            display: inline-block;
        }

        @keyframes floatSub {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-8px) rotate(3deg); }
        }

        #clue-text {
            font-size: 1.5rem;
            font-weight: bold;
            margin: 5px 0;
            color: #0369a1;
        }

        #visual-clue {
            font-size: 2.2rem;
            letter-spacing: 3px;
            min-height: 40px;
            margin-top: 5px;
        }

        /* Floating Bubble Layout Container */
        #bubble-zone {
            display: flex;
            justify-content: space-around;
            align-items: center;
            height: 180px;
            margin: 25px 0;
        }

        .sea-bubble {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.8) 0%, rgba(56, 189, 248, 0.4) 50%, rgba(2, 132, 199, 0.7) 100%);
            border: 2px solid rgba(255, 255, 255, 0.6);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 3rem;
            font-weight: 900;
            color: white;
            text-shadow: 1px 2px 4px rgba(0,0,0,0.4);
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            animation: bobble 2.5s infinite ease-in-out alternate;
            transition: transform 0.1s, opacity 0.3s;
        }

        /* Off-sync floating animations for individual realism */
        .sea-bubble:nth-child(2) { animation-delay: 0.4s; animation-duration: 2s; }
        .sea-bubble:nth-child(3) { animation-delay: 0.8s; animation-duration: 2.8s; }

        @keyframes bobble {
            0% { transform: translateY(10px) scale(1); }
            100% { transform: translateY(-15px) scale(1.03); }
        }

        .sea-bubble:active {
            transform: scale(0.85);
        }

        /* Treasure Display Deck */
        #trophy-deck {
            background: rgba(0, 0, 0, 0.25);
            border-radius: 16px;
            padding: 10px;
            margin-top: 10px;
            border-bottom: 4px solid #0369a1;
        }

        #gems-box {
            display: flex;
            justify-content: center;
            gap: 12px;
            font-size: 1.8rem;
            min-height: 35px;
        }

        /* Treasure Reward Pop-up Window */
        #chest-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, var(--ocean-blue) 0%, var(--deep-sea) 100%);
            border-radius: 26px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }

        #chest-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }

        .giant-treasure {
            font-size: 6.5rem;
            animation: shine 1.5s infinite ease-in-out alternate;
        }

        @keyframes shine {
            0% { transform: scale(0.95); filter: drop-shadow(0 0 5px #fff); }
            100% { transform: scale(1.1); filter: drop-shadow(0 0 25px var(--sand-yellow)); }
        }

        .swim-btn {
            background-color: var(--coral-pink);
            color: white;
            border: none;
            padding: 12px 35px;
            font-size: 1.4rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 0 #be123c;
            font-family: inherit;
        }

        /* Modern layout for bottom navigation images */
        .nav-buttons {
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap; /* Allows safe stacking on narrow screens */
            gap: 20px;
            margin-bottom: auto; /* Pushes the buttons up to balance the centering */
        }

        .nav-buttons img {
            transition: transform 0.2s;
            border-radius: 15px;
        }

        @media (hover: hover) {
            .nav-buttons img:hover {
                transform: scale(1.05);
            }
        }
    </style>
</head>
<body>

    <div id="aquarium-frame">
        <div id="chest-overlay">
            <h2 style="color: var(--sand-yellow); margin: 0; font-size: 2.2rem;">🏴‍☠️ Treasure Found! 🏴‍☠️</h2>
            <p style="font-size: 1.2rem; margin: 5px 0; color: #e0f2fe;">Your submarine opened a legendary chest!</p>
            <div class="giant-treasure" id="won-gem">💎</div>
            <button class="swim-btn" onclick="closeChest()">Dive Deeper!</button>
        </div>

        <div class="hud-stats">
            <div>Score: <span id="score-val" style="color: var(--sand-yellow);">0</span></div>
            <div>Next Chest: <span id="target-val" style="color: var(--coral-pink);">10</span></div>
        </div>

        <div id="clue-window">
            <div id="diver-icon">🤿</div>
            <div id="clue-text">Pop the number...</div>
            <div id="visual-clue">⭐⭐⭐⭐</div>
        </div>

        <p style="margin: 0; font-size: 0.95rem; color: #e0f2fe; font-weight: bold;">Tap the floating bubble to pop it!</p>

        <div id="bubble-zone">
            <div class="sea-bubble" onclick="popBubble(this)">?</div>
            <div class="sea-bubble" onclick="popBubble(this)">?</div>
            <div class="sea-bubble" onclick="popBubble(this)">?</div>
        </div>

        <div id="trophy-deck">
            <div style="font-size: 0.8rem; color: var(--bubble-cyan); font-weight: bold; text-transform: uppercase; margin-bottom: 5px;">Sunken Treasure Collection</div>
            <div id="gems-box"></div>
        </div>
    </div>

    <div class="nav-buttons">
        <a href="toy.html"><img src="np.png" width="80" height="50" alt="Next Page"></a>
        <a href="1.html"><img src="ACT.png" width="80" height="50" alt="Activity"></a>
    </div>

    <script>
        let score = 0;
        let correctNumber = 0;
        let rewardMilestone = 10;

        const numberWords = ["ZERO", "ONE", "TWO", "THREE", "FOUR", "FIVE", "SIX", "SEVEN", "EIGHT", "NINE"];
        const countEmojis = ['⭐', '🐚', '🐠', '🦀', '🪙', '💎'];
        const rewardGems = ['💎', '👑', '🔮', '🔱', '💰', '⚔️', '🧱', '🏺'];

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playOceanSound(style) {
            const now = audioCtx.currentTime;

            if (style === 'pop') {
                // High rapid sine frequency sweep resembling a bubble popping "Bloop!"
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(600, now);
                osc.frequency.exponentialRampToValueAtTime(1200, now + 0.08);
                gain.gain.setValueAtTime(0.2, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.08);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(now); osc.stop(now + 0.08);
            } else if (style === 'splash') {
                // Dropping/Incorrect heavy audio sound
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(200, now);
                osc.frequency.linearRampToValueAtTime(80, now + 0.2);
                gain.gain.setValueAtTime(0.2, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(now); osc.stop(now + 0.2);
            } else if (style === 'fanfare') {
                // Sunken treasure discovery music fanfare chords
                const chord = [329.63, 392.00, 523.25, 659.25]; // E, G, C, E
                chord.forEach((pitch, i) => {
                    const o = audioCtx.createOscillator();
                    const g = audioCtx.createGain();
                    o.type = 'sine';
                    o.frequency.setValueAtTime(pitch, now + (i * 0.06));
                    g.gain.setValueAtTime(0.15, now + (i * 0.06));
                    g.gain.exponentialRampToValueAtTime(0.01, now + (i * 0.06) + 0.4);
                    o.connect(g); g.connect(audioCtx.destination);
                    o.start(now + (i * 0.06)); o.stop(now + (i * 0.06) + 0.4);
                });
            }
        }

        function generateSeaLevel() {
            // Target number from 1 to 9
            correctNumber = Math.floor(Math.random() * 9) + 1;

            // Flip a coin: 50% show word clue, 50% show counting icon clue
            const useWordClue = Math.random() > 0.5;
            const textWindow = document.getElementById('clue-text');
            const visualWindow = document.getElementById('visual-clue');

            if (useWordClue) {
                textWindow.textContent = `Find the number...`;
                visualWindow.textContent = numberWords[correctNumber];
                visualWindow.style.color = '#e11d48'; // Bright red style for readable word focus
                visualWindow.style.fontSize = '2.4rem';
            } else {
                textWindow.textContent = `Count and match!`;
                visualWindow.style.fontSize = '2rem';
                
                // Build a line grid of icons to count manually
                const activeIcon = countEmojis[Math.floor(Math.random() * countEmojis.length)];
                visualWindow.textContent = activeIcon.repeat(correctNumber);
            }

            // Create 3 bubble digit choices
            let choices = [correctNumber];
            while (choices.length < 3) {
                let randomFake = Math.floor(Math.random() * 9) + 1;
                if (!choices.includes(randomFake)) choices.push(randomFake);
            }
            choices.sort(() => Math.random() - 0.5);

            // Render numbers into our floating bubble arrays
            const bubbles = document.querySelectorAll('.sea-bubble');
            bubbles.forEach((bubble, index) => {
                bubble.textContent = choices[index];
                bubble.style.opacity = '1';
                bubble.style.pointerEvents = 'auto';
                bubble.style.transform = 'scale(1)';
            });
        }

        function popBubble(bubble) {
            const chosenValue = parseInt(bubble.textContent);
            const bubbles = document.querySelectorAll('.sea-bubble');

            if (chosenValue === correctNumber) {
                score++;
                document.getElementById('score-val').textContent = score;
                playOceanSound('pop');

                // Visual popping shrinking fadeout animation
                bubble.style.transform = 'scale(1.4)';
                bubble.style.opacity = '0';
                bubbles.forEach(b => b.style.pointerEvents = 'none'); // Halt hacking clicks

                if (score === rewardMilestone) {
                    setTimeout(triggerChestUnlockOverlay, 800);
                } else {
                    setTimeout(generateSeaLevel, 1000);
                }
            } else {
                playOceanSound('splash');
                // Dim down the false bubble choices instantly
                bubble.style.opacity = '0.2';
                bubble.style.pointerEvents = 'none';
            }
        }

        function triggerChestUnlockOverlay() {
            playOceanSound('fanfare');
            
            // Randomly cherry-pick an epic treasure item
            const specialGem = rewardGems[Math.floor(Math.random() * rewardGems.length)];
            document.getElementById('won-gem').textContent = specialGem;

            // Drop a mini icon copy down onto the user chest showcase container row
            const gemsBox = document.getElementById('gems-box');
            const span = document.createElement('span');
            span.textContent = specialGem;
            gemsBox.appendChild(span);

            // Push up screen window view
            document.getElementById('chest-overlay').classList.add('show');
            rewardMilestone += 10;
        }

        function closeChest() {
            document.getElementById('chest-overlay').classList.remove('show');
            document.getElementById('target-val').textContent = rewardMilestone;
            generateSeaLevel();
        }

        // Boot-up active first grid frame loop instantly
        generateSeaLevel();
    </script>
</body>
</html>

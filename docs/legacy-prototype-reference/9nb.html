<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time Matcher Game</title>
    <style>
        body {
            font-family: 'Comic Sans MS', cursive, sans-serif;
            background-color: #e0f7fa;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }

        h1 {
            color: #006064;
            font-size: 2rem;
            margin-bottom: 20px;
        }

        /* The Analog Clock Design - Made slightly larger for the numbers */
        .clock {
            width: 260px;
            height: 260px;
            border: 10px solid #ff9800;
            border-radius: 50%;
            background-color: white;
            position: relative;
            margin-bottom: 30px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        /* Center dot of the clock */
        .clock::after {
            content: '';
            position: absolute;
            width: 14px;
            height: 14px;
            background-color: #333;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
        }

        /* New Styles for the Clock Numbers */
        .number {
            position: absolute;
            width: 100%;
            height: 100%;
            text-align: center;
            padding-top: 10px; /* Pushes numbers slightly inward from the edge */
            box-sizing: border-box;
            font-size: 1.5rem;
            font-weight: bold;
            color: #00838f;
            pointer-events: none; /* Prevents touch interference */
            z-index: 1;
        }

        /* This keeps the numbers standing straight up instead of sideways */
        .number span {
            display: inline-block;
        }

        .hand {
            position: absolute;
            bottom: 50%;
            left: 50%;
            transform-origin: bottom;
            background-color: #333;
            border-radius: 10px;
            transition: transform 0.5s ease-in-out;
            z-index: 5; /* Keeps hands above the numbers */
        }

        .hour-hand {
            width: 8px;
            height: 70px;
            margin-left: -4px;
            background-color: #d32f2f;
        }

        .minute-hand {
            width: 5px;
            height: 100px;
            margin-left: -2.5px;
        }

        /* The Multiple Choice Buttons */
        .options-container {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            background-color: #4caf50;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.5rem;
            font-family: inherit;
            border-radius: 15px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.1s, background-color 0.2s;
        }

        button:active {
            transform: scale(0.95);
        }

        button:hover {
            background-color: #388e3c;
        }

        /* Feedback Message */
        #feedback {
            font-size: 1.8rem;
            font-weight: bold;
            margin-top: 20px;
            min-height: 40px;
            color: #00796b;
        }
    </style>
</head>
<body>

    <h1>What time is it?</h1>

    <div class="clock" id="clockFace">
        <div class="hand hour-hand" id="hourHand"></div>
        <div class="hand minute-hand" id="minuteHand"></div>
    </div>

    <div class="options-container" id="options"></div>

    <div id="feedback"></div>

    <script>
        let currentCorrectHour = 0;

        // --- NEW FUNCTION: Draw the numbers 1 to 12 ---
        function buildClockNumbers() {
            const clockFace = document.getElementById('clockFace');
            
            for (let i = 1; i <= 12; i++) {
                const numberDiv = document.createElement('div');
                numberDiv.className = 'number';
                // Rotate the container to the correct angle (30 degrees per hour)
                numberDiv.style.transform = `rotate(${i * 30}deg)`;
                
                const span = document.createElement('span');
                span.textContent = i;
                // Counter-rotate the actual number so it stays upright
                span.style.transform = `rotate(${-i * 30}deg)`;
                
                numberDiv.appendChild(span);
                clockFace.appendChild(numberDiv);
            }
        }

        function generateGame() {
            currentCorrectHour = Math.floor(Math.random() * 12) + 1;
            
            const hourHand = document.getElementById('hourHand');
            const minuteHand = document.getElementById('minuteHand');
            
            const hourRotation = currentCorrectHour * 30;
            hourHand.style.transform = `rotate(${hourRotation}deg)`;
            minuteHand.style.transform = `rotate(0deg)`; 

            let options = [currentCorrectHour];
            while (options.length < 3) {
                let wrongHour = Math.floor(Math.random() * 12) + 1;
                if (!options.includes(wrongHour)) {
                    options.push(wrongHour);
                }
            }

            options.sort(() => Math.random() - 0.5);

            const optionsContainer = document.getElementById('options');
            optionsContainer.innerHTML = ''; 
            
            options.forEach(hour => {
                const btn = document.createElement('button');
                btn.textContent = `${hour}:00`;
                btn.onclick = () => checkAnswer(hour);
                optionsContainer.appendChild(btn);
            });

            document.getElementById('feedback').textContent = '';
        }

        function checkAnswer(selectedHour) {
            const feedback = document.getElementById('feedback');
            if (selectedHour === currentCorrectHour) {
                feedback.textContent = "⭐ Great Job! ⭐";
                feedback.style.color = "#ffeb3b";
                feedback.style.textShadow = "2px 2px 4px #000"; 
                
                setTimeout(generateGame, 1500); 
            } else {
                feedback.textContent = "Oops! Try again.";
                feedback.style.color = "#d32f2f";
                feedback.style.textShadow = "none";
            }
        }

        // Initialize the game
        buildClockNumbers(); // Draws the numbers once
        generateGame();      // Starts the first round
    </script>

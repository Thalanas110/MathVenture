<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Missing Number Clock Game</title>
    <style>
        body {
            font-family: 'Comic Sans MS', cursive, sans-serif;
            background-color: #e8f5e9; /* Soft green background */
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden; 
        }

        h1 {
            color: #2e7d32;
            font-size: 1.8rem;
            margin: 10px 0;
            text-align: center;
        }

        /* --- Reward Bar --- */
        .reward-bar {
            background-color: #c8e6c9;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 1.5rem;
            color: #1b5e20;
            font-weight: bold;
            margin-bottom: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .star {
            color: #fbc02d;
            text-shadow: 1px 1px 2px #000;
        }

        /* --- The Main Clock --- */
        .clock {
            width: 160px; 
            height: 160px;
            border: 8px solid #ff9800;
            border-radius: 50%;
            background-color: white;
            position: relative;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            margin-bottom: 20px;
        }

        .clock::after {
            content: '';
            position: absolute;
            width: 10px;
            height: 10px;
            background-color: #333;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
        }

        /* Clock Numbers */
        .clock-number {
            position: absolute;
            width: 100%;
            height: 100%;
            text-align: center;
            padding-top: 5px;
            box-sizing: border-box;
            font-size: 1.1rem;
            font-weight: bold;
            color: #00838f;
            pointer-events: none; 
            z-index: 1;
        }

        .clock-number span {
            display: inline-block;
        }

        /* Clock Hands */
        .hand {
            position: absolute;
            bottom: 50%;
            left: 50%;
            transform-origin: bottom;
            background-color: #333;
            border-radius: 10px;
            z-index: 5;
            transition: transform 0.5s ease-in-out;
        }

        .hour-hand { width: 5px; height: 45px; margin-left: -2.5px; background-color: #d32f2f; }
        .minute-hand { width: 3px; height: 65px; margin-left: -1.5px; }

        /* --- Digital Time Sentence & Drop Zone --- */
        .sentence-container {
            display: flex;
            align-items: center;
            font-size: 3rem;
            font-weight: bold;
            color: #37474f;
            margin-bottom: 30px;
            background-color: white;
            padding: 10px 20px;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .drop-zone {
            width: 70px;
            height: 70px;
            border: 4px dashed #90caf9;
            border-radius: 15px;
            background-color: #e3f2fd;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 10px;
            color: #bbdefb;
            transition: background-color 0.3s;
        }

        .drop-zone.hovered {
            background-color: #fff59d; 
            border-color: #fbc02d;
        }

        /* --- Draggable Number Blocks --- */
        .tiles-area {
            display: flex;
            gap: 20px;
            justify-content: center;
            width: 100%;
        }

        .number-tile {
            width: 70px; 
            height: 70px;
            border-radius: 15px;
            background-color: #29b6f6;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            font-weight: bold;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            cursor: grab;
            touch-action: none; 
            z-index: 10;
            border: 3px solid #0288d1;
        }

        .number-tile:active {
            cursor: grabbing;
        }

        /* Full Screen Celebration */
        #celebration {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(255, 255, 255, 0.95);
            z-index: 100;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: #2e7d32;
            font-weight: bold;
            text-align: center;
        }

        #playAgainBtn {
            margin-top: 20px;
            padding: 15px 30px;
            font-size: 1.5rem;
            background-color: #ff9800;
            color: white;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

    <h1>Fill in the missing time!</h1>
    
    <div class="reward-bar" id="rewardBar">Rewards: </div>

    <div class="clock" id="mainClock">
        <div class="hand hour-hand" id="hourHand"></div>
        <div class="hand minute-hand" id="minuteHand"></div>
    </div>

    <div class="sentence-container">
        It is 
        <div class="drop-zone" id="dropZone">?</div> 
        : 00
    </div>

    <div class="tiles-area" id="tilesArea"></div>

    <div id="celebration">
        🎉 YOU WIN! 🎉
        <button id="playAgainBtn" onclick="resetGame()">Play Again</button>
    </div>

    <script>
        let currentCorrectHour = 0;
        let starsCollected = 0;
        const maxStars = 5;

        let draggedTile = null;
        let startX = 0, startY = 0;

        // Draw the numbers 1 to 12 on the main clock once
        function initClockFace() {
            const clock = document.getElementById('mainClock');
            for (let i = 1; i <= 12; i++) {
                const numberDiv = document.createElement('div');
                numberDiv.className = 'clock-number';
                numberDiv.style.transform = `rotate(${i * 30}deg)`;
                
                const span = document.createElement('span');
                span.textContent = i;
                span.style.transform = `rotate(${-i * 30}deg)`;
                
                numberDiv.appendChild(span);
                clock.appendChild(numberDiv);
            }
        }

        function createNumberTile(number) {
            const tile = document.createElement('div');
            tile.className = 'number-tile';
            tile.textContent = number;
            tile.dataset.value = number; 
            tile.addEventListener('pointerdown', dragStart);
            return tile;
        }

        function generateLevel() {
            // Pick the target time
            currentCorrectHour = Math.floor(Math.random() * 12) + 1;
            
            // Set the clock hands
            document.getElementById('hourHand').style.transform = `rotate(${currentCorrectHour * 30}deg)`;
            document.getElementById('minuteHand').style.transform = `rotate(0deg)`;

            // Reset the drop zone
            document.getElementById('dropZone').textContent = '?';
            document.getElementById('dropZone').style.color = '#bbdefb';

            // Generate wrong answers
            let options = [currentCorrectHour];
            while (options.length < 3) {
                let wrongHour = Math.floor(Math.random() * 12) + 1;
                if (!options.includes(wrongHour)) {
                    options.push(wrongHour);
                }
            }
            options.sort(() => Math.random() - 0.5); // Shuffle

            // Display the tiles
            const tilesArea = document.getElementById('tilesArea');
            tilesArea.innerHTML = ''; 
            options.forEach(num => {
                tilesArea.appendChild(createNumberTile(num));
            });
        }

        // --- Drag and Drop Logic ---
        function dragStart(e) {
            draggedTile = e.target.closest('.number-tile');
            if (!draggedTile) return;

            draggedTile.style.transition = 'none';
            draggedTile.style.zIndex = '100'; 

            startX = e.clientX;
            startY = e.clientY;

            window.addEventListener('pointermove', dragMove);
            window.addEventListener('pointerup', dragEnd);
        }

        function dragMove(e) {
            if (!draggedTile) return;
            e.preventDefault();

            const dx = e.clientX - startX;
            const dy = e.clientY - startY;

            draggedTile.style.transform = `translate(${dx}px, ${dy}px)`;

            if (isOverlapping(draggedTile, document.getElementById('dropZone'))) {
                document.getElementById('dropZone').classList.add('hovered');
            } else {
                document.getElementById('dropZone').classList.remove('hovered');
            }
        }

        function dragEnd(e) {
            window.removeEventListener('pointermove', dragMove);
            window.removeEventListener('pointerup', dragEnd);
            
            if (!draggedTile) return;

            const dropZone = document.getElementById('dropZone');
            dropZone.classList.remove('hovered');

            if (isOverlapping(draggedTile, dropZone)) {
                checkMatch(parseInt(draggedTile.dataset.value));
            } else {
                snapBack();
            }
        }

        function snapBack() {
            draggedTile.style.transition = 'transform 0.3s ease';
            draggedTile.style.transform = 'translate(0px, 0px)';
            draggedTile.style.zIndex = '10';
            draggedTile = null;
        }

        function isOverlapping(el1, el2) {
            const rect1 = el1.getBoundingClientRect();
            const rect2 = el2.getBoundingClientRect();
            return !(rect1.right < rect2.left + 20 || 
                     rect1.left > rect2.right - 20 || 
                     rect1.bottom < rect2.top + 20 || 
                     rect1.top > rect2.bottom - 20);
        }

        function checkMatch(selectedValue) {
            if (selectedValue === currentCorrectHour) {
                // Instantly show the number in the box
                const dropZone = document.getElementById('dropZone');
                dropZone.textContent = selectedValue;
                dropZone.style.color = '#1565c0'; // Make text dark blue
                
                starsCollected++;
                updateRewardBar();
                
                // Short delay so they see the completed time before the next round
                setTimeout(() => {
                    if (starsCollected >= maxStars) {
                        document.getElementById('celebration').style.display = 'flex';
                    } else {
                        generateLevel();
                    }
                }, 800);

            } else {
                snapBack();
            }
        }

        function updateRewardBar() {
            let starsHtml = 'Rewards: ';
            for (let i = 0; i < starsCollected; i++) {
                starsHtml += '<span class="star">⭐</span>';
            }
            document.getElementById('rewardBar').innerHTML = starsHtml;
        }

        function resetGame() {
            starsCollected = 0;
            updateRewardBar();
            document.getElementById('celebration').style.display = 'none';
            generateLevel();
        }

        // Start the game
        initClockFace();
        updateRewardBar();
        generateLevel();
    </script>

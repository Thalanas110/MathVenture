<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>16 to 20 Match Adventure</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: #b8dff0;
            font-family: 'Comic Sans MS', 'Chalkboard SE', cursive, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
        }

        .header-img {
            max-width: 180px;
            width: 100%;
            margin-bottom: 10px;
        }

        .game-box {
            max-width: 600px;
            width: 100%;
            background: #feebcc;
            border-radius: 40px;
            border: 6px solid #e09d5e;
            box-shadow: 0 10px 0 #b17438;
            padding: 15px;
            position: relative;
        }

        .title {
            text-align: center;
            font-size: 1.5rem;
            color: #2d5128;
            margin: 0 0 10px;
        }

        .sub {
            display: block;
            text-align: center;
            font-size: 0.9rem;
            background: #fff0cc;
            padding: 5px 15px;
            border-radius: 50px;
            margin-bottom: 15px;
            border: 2px solid #bb833f;
        }

        .match-area {
            display: flex;
            justify-content: space-between;
            background: #f8dbb0;
            border-radius: 20px;
            padding: 15px 10px;
            border: 3px dashed #b87a40;
            position: relative;
            min-height: 400px;
        }

        .nums, .imgs {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            gap: 10px;
            z-index: 5;
            width: 35%;
        }

        .num-btn {
            background: #ffad60;
            border: 3px solid #b55a1a;
            border-radius: 15px;
            padding: 10px 5px;
            text-align: center;
            font-size: 1.8rem;
            font-weight: bold;
            box-shadow: 0 4px 0 #9b4f1a;
            cursor: pointer;
        }

        .num-btn.selected { background: #ffe57f; border-color: #ffc107; box-shadow: 0 0 10px #ffc107; }

        .img-card {
            background: #c7e3c7;
            border: 3px solid #2f7d4d;
            border-radius: 15px;
            padding: 5px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 2px;
            box-shadow: 0 4px 0 #236b3a;
            cursor: pointer;
            min-height: 65px;
        }

        .smiley { font-size: 10px; }

        .matched {
            opacity: 0.4;
            pointer-events: none;
            box-shadow: none !important;
            transform: scale(0.9);
        }

        #lineCanvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        .message {
            text-align: center;
            margin-top: 15px;
            font-size: 1rem;
            background: #fff4cf;
            border-radius: 15px;
            padding: 10px;
            border: 3px solid #cb9a5b;
        }

        .controls {
            display: flex;
            gap: 10px;
            width: 100%;
            margin-top: 15px;
        }

        .control-btn {
            flex: 1;
            padding: 10px;
            border-radius: 15px;
            border: none;
            background: #ffb156;
            color: #3e301a;
            font-weight: bold;
            box-shadow: 0 4px 0 #a06730;
            cursor: pointer;
            font-family: inherit;
        }

        .control-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #a06730; }

        #star-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.96);
            z-index: 1000;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .big-star { font-size: 100px; color: #FFD700; animation: spin 2s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .next-btn {
            background: #FF9800; color: white; border: none; padding: 15px 40px;
            font-size: 24px; border-radius: 50px; cursor: pointer;
            box-shadow: 0 6px #e68a00; margin-top: 20px;
        }

        .nav-table { width: 100%; margin-top: 15px; }
    </style>
</head>
<body>

    <img src="1NUM.png" class="header-img" alt="Numbers">

    <div class="game-box">
        <div class="title">16 • 17 • 18 • 19 • 20</div>
        <span class="sub">✏️ Match number and group</span>

        <div class="match-area" id="matchArea">
            <div class="nums" id="numbersColumn"></div>
            <div class="imgs" id="imagesColumn"></div>
            <canvas id="lineCanvas"></canvas>
        </div>

        <div id="message" class="message">Tap a number, then tap its group!</div>
        
        <div class="controls">
            <button class="control-btn" onclick="initGame()">🔄 Ikutin ang mga Numero</button>
        </div>
    </div>

    <div id="star-overlay">
        <div class="big-star">⭐</div>
        <h1 style="color: #ff4500;">AWESOME!</h1>
        <p>Natapos mo na ang 1 hanggang 20!</p>
        <button class="next-btn" onclick="window.location.href='6e.html'">Next Game ➔</button>
        <p onclick="initGame()" style="cursor:pointer; text-decoration: underline; margin-top: 20px; color: #666;">Try Again</p>
    </div>
<center>
    <table class="nav-table">
        <tr>
            <td align="center"><a href="1.html"><img src="ACT.png" width="100"></a></td>
            <td align="center"><a href="dive.html"><img src="np.png" width="100"></a></td>
        </tr>
    </table>
</center>
<script>
    const numbers = [16, 17, 18, 19, 20];
    let selectedNum = null;
    let selectedEl = null;
    let matches = {};
    
    const canvas = document.getElementById('lineCanvas');
    const ctx = canvas.getContext('2d');
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playSound(isCorrect) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = isCorrect ? 'sine' : 'square';
        osc.frequency.setValueAtTime(isCorrect ? 600 : 150, audioCtx.currentTime);
        osc.connect(gain); gain.connect(audioCtx.destination);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        osc.start(); osc.stop(audioCtx.currentTime + 0.15);
    }

    function initGame() {
        matches = {};
        selectedNum = null;
        document.getElementById('star-overlay').style.display = 'none';
        document.getElementById('message').innerText = "Simulan na natin!";
        
        const numCol = document.getElementById('numbersColumn');
        const imgCol = document.getElementById('imagesColumn');
        numCol.innerHTML = ''; imgCol.innerHTML = '';
        
        // Clear Canvas
        resizeCanvas();
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        numbers.forEach(n => {
            const btn = document.createElement('div');
            btn.className = 'num-btn';
            btn.innerText = n;
            btn.onclick = () => {
                if(!matches[n]) {
                    document.querySelectorAll('.num-btn').forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected');
                    selectedNum = n;
                    selectedEl = btn;
                    document.getElementById('message').innerText = "Hanapin ang group na may " + n + "!";
                }
            };
            numCol.appendChild(btn);
        });

        const shuffled = [...numbers].sort(() => Math.random() - 0.5);
        shuffled.forEach(n => {
            const card = document.createElement('div');
            card.className = 'img-card';
            for(let i=0; i<n; i++) card.innerHTML += '<span class="smiley">😊</span>';
            card.onclick = () => {
                if(!matches[n] && selectedNum === n) {
                    matches[n] = true;
                    drawMatchLine(selectedEl, card);
                    playSound(true);
                    selectedEl.classList.add('matched');
                    card.classList.add('matched');
                    selectedNum = null;
                    document.getElementById('message').innerText = "Tama! Ang galing! 🌟";
                    if(Object.keys(matches).length === 5) {
                        setTimeout(() => document.getElementById('star-overlay').style.display='flex', 800);
                    }
                } else if(!matches[n] && selectedNum) {
                    playSound(false);
                    document.getElementById('message').innerText = "Mali, bilangin muli! 🧐";
                }
            };
            imgCol.appendChild(card);
        });
    }

    function resizeCanvas() {
        const rect = document.getElementById('matchArea').getBoundingClientRect();
        canvas.width = rect.width;
        canvas.height = rect.height;
    }

    function drawMatchLine(el1, el2) {
        const rect = document.getElementById('matchArea').getBoundingClientRect();
        const r1 = el1.getBoundingClientRect();
        const r2 = el2.getBoundingClientRect();
        
        ctx.beginPath();
        ctx.moveTo(r1.right - rect.left, r1.top + r1.height/2 - rect.top);
        ctx.lineTo(r2.left - rect.left, r2.top + r2.height/2 - rect.top);
        ctx.strokeStyle = '#2e7d32';
        ctx.lineWidth = 5;
        ctx.stroke();
    }

    window.onresize = () => { resizeCanvas(); initGame(); };
    initGame();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Sky Explorer! (Day vs Night)</title>
    <style>
        :root {
            --sky-blue: #0ea5e9;
            --space-purple: #4338ca;
            --sunny-yellow: #f97316;
            --grass-green: #22c55e;
            --dark: #1e293b;
        }

        body {
            margin: 0;
            padding: 20px; /* Added padding to protect phone edges */
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif;
            background: linear-gradient(180deg, #e0f2fe 0%, #bae6fd 100%);
            color: var(--dark);
            display: flex;
            flex-direction: column; /* Forces vertical stacking */
            justify-content: flex-start; /* Safely starts content at the top on small screens */
            align-items: center;
            min-height: 100vh;
            min-height: 100dvh; /* Accounts for mobile browser address bars */
            gap: 25px; /* Adds space between game and buttons */
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }

        #game-container {
            width: 100%; /* Changed to 100% for safe mobile sizing */
            max-width: 440px;
            margin-top: auto; /* Pushes the box down to center when there is space */
            background: #ffffff;
            border: 6px solid var(--sky-blue);
            border-radius: 32px;
            padding: 20px;
            box-shadow: 0 20px 40px rgba(14, 165, 233, 0.2);
            text-align: center;
            position: relative;
            box-sizing: border-box;
        }

        .hud-row {
            display: flex;
            justify-content: space-between;
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--sky-blue);
            margin-bottom: 5px;
        }

        #question-banner {
            font-size: 1.9rem;
            font-weight: 900;
            margin: 10px 0;
            color: #0369a1;
            text-transform: uppercase;
        }

        .highlight-word {
            background-color: #fef08a;
            padding: 2px 12px;
            border-radius: 12px;
            border: 2px dashed #ca8a04;
        }

        /* The Telescope View Bench */
        #sky-stage {
            height: 180px;
            background: #f8fafc;
            border: 4px solid #cbd5e1;
            border-radius: 24px;
            margin: 15px 0;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 10px;
            box-sizing: border-box;
            box-shadow: inset 0 4px 8px rgba(0,0,0,0.05);
        }

        /* Sky View Cards */
        .sky-card {
            width: 44%;
            height: 140px;
            background: #ffffff;
            border: 4px solid #e2e8f0;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 6px 0 #cbd5e1;
            transition: transform 0.1s, box-shadow 0.1s;
        }

        .sky-card:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #cbd5e1;
        }

        .card-emoji {
            font-size: 3.8rem;
            margin-bottom: 5px;
        }

        .card-text {
            font-weight: bold;
            font-size: 0.95rem;
            color: #475569;
        }

        /* Badges Rack */
        #space-shelf {
            background: #f1f5f9;
            border-top: 4px solid var(--sky-blue);
            border-radius: 12px;
            padding: 8px;
            margin-top: 15px;
        }

        #shelf-badges {
            display: flex;
            justify-content: center;
            gap: 10px;
            font-size: 1.8rem;
            min-height: 35px;
        }

        /* Popup Overlay Screen */
        #sky-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.98);
            border-radius: 26px;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 10; opacity: 0; pointer-events: none;
            transition: opacity 0.4s ease;
        }

        #sky-overlay.show { opacity: 1; pointer-events: auto; }

        .next-sky-btn {
            background-color: var(--grass-green);
            color: white;
            border: none;
            padding: 12px 35px;
            font-size: 1.3rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 0 #16a34a;
            font-family: inherit;
        }

        /* Modern layout for bottom navigation images */
        .nav-buttons {
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap; /* Allows safe stacking on narrow screens */
            gap: 20px;
            margin-bottom: auto; /* Pushes the buttons up to balance the centering */
        }

        .nav-buttons img {
            transition: transform 0.2s;
            border-radius: 15px;
        }

        @media (hover: hover) {
            .nav-buttons img:hover {
                transform: scale(1.05);
            }
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="sky-overlay">
            <h2 style="color: var(--sky-blue); margin: 0; font-size: 2.2rem;">🚀 Star Explorer! 🚀</h2>
            <p style="font-size: 1.2rem; margin: 5px 0; color: #475569;">You earned a space badge:</p>
            <div style="font-size: 6.5rem; margin: 10px 0;" id="badge-icon">🪐</div>
            <button class="next-sky-btn" onclick="closeSkyWindow()">Next Horizon!</button>
        </div>

        <div class="hud-row">
            <div>Sky Explored: <span id="score-text">0</span></div>
            <div>Next Badge: <span id="target-text" style="color: var(--sunny-yellow);">10</span></div>
        </div>

        <div id="question-banner">Done at <span id="task-type" class="highlight-word">DAYTIME</span>?</div>
        <p style="margin: 0; font-weight: bold; color: #64748b; font-size: 0.9rem;">Tap the picture that belongs to the time!</p>

        <div id="sky-stage">
            <div class="sky-card" id="card-0" onclick="selectCard(0)">
                <div class="card-emoji" id="emoji-0">☀️</div>
                <div class="card-text" id="text-0">Bright Sun</div>
            </div>
            <div class="sky-card" id="card-1" onclick="selectCard(1)">
                <div class="card-emoji" id="emoji-1">🌙</div>
                <div class="card-text" id="text-1">Glowing Moon</div>
            </div>
        </div>

        <div id="space-shelf">
            <div style="font-size: 0.75rem; color: #94a3b8; font-weight: bold; text-transform: uppercase; margin-bottom: 3px;">Cosmic Exploration Case</div>
            <div id="shelf-badges"></div>
        </div>
    </div>

    <!-- Mobile-Friendly Buttons Layout -->
    <div class="nav-buttons">
        <a href="liquid.html"><img src="np.png" width="80" height="50" alt="Next Page"></a>
        <a href="1.html"><img src="ACT.png" width="80" height="50" alt="Activity"></a>
    </div>

    <script>
        let score = 0;
        let skyMilestone = 10;
        let targetCondition = "DAY";
        let correctIndex = -1;
        let canClick = true;

        const timePairs = [
            { day: { emoji: '☀️', name: 'Bright Sun' }, night: { emoji: '🌙', name: 'Glowing Moon' } },
            { day: { emoji: '🏫', name: 'Go to School' }, night: { emoji: '🛌', name: 'Sleep in Bed' } },
            { day: { emoji: '🍳', name: 'Eat Breakfast' }, night: { emoji: '🦉', name: 'Hooting Owl' } },
            { day: { emoji: '🪁', name: 'Fly a Kite' }, night: { emoji: '✨', name: 'Shining Stars' } },
            { day: { emoji: '🐓', name: 'Rooster Crows' }, night: { emoji: '🦇', name: 'Flying Bat' } },
            { day: { emoji: '⚽', name: 'Play Outside' }, night: { emoji: '💤', name: 'Dreaming' } }
        ];

        const spacePrizes = ['🪐', '🚀', '⭐', '🛸', '🛰️', '☄️', '🌍', '👽'];

        function generateLevel() {
            canClick = true;
            targetCondition = Math.random() > 0.5 ? "DAY" : "NIGHT";
            const taskSpan = document.getElementById('task-type');
            taskSpan.textContent = targetCondition === "DAY" ? "DAYTIME ☀️" : "NIGHTTIME 🌙";
            taskSpan.style.backgroundColor = targetCondition === "DAY" ? "#fef08a" : "#e0e7ff";
            taskSpan.style.borderColor = targetCondition === "DAY" ? "#ca8a04" : "#4338ca";

            const selectedPair = timePairs[Math.floor(Math.random() * timePairs.length)];
            const shuffleOrder = Math.random() > 0.5;
            
            const slot0 = shuffleOrder ? selectedPair.day : selectedPair.night;
            const slot1 = shuffleOrder ? selectedPair.night : selectedPair.day;

            correctIndex = targetCondition === "DAY" ? (shuffleOrder ? 0 : 1) : (shuffleOrder ? 1 : 0);

            document.getElementById('emoji-0').textContent = slot0.emoji;
            document.getElementById('text-0').textContent = slot0.name;
            document.getElementById('emoji-1').textContent = slot1.emoji;
            document.getElementById('text-1').textContent = slot1.name;

            for (let i = 0; i < 2; i++) {
                const card = document.getElementById(`card-${i}`);
                card.style.opacity = "1";
                card.style.transform = "scale(1)";
                card.style.backgroundColor = "#ffffff";
                card.style.borderColor = "#e2e8f0";
                card.style.boxShadow = "0 6px 0 #cbd5e1";
            }
        }

        function selectCard(index) {
            if (!canClick) return;
            const card = document.getElementById(`card-${index}`);

            if (index === correctIndex) {
                score++;
                document.getElementById('score-text').textContent = score;
                canClick = false;

                card.style.backgroundColor = "#dcfce7";
                card.style.borderColor = "var(--grass-green)";
                card.style.boxShadow = "0 6px 0 #15803d";
                card.style.transform = "scale(1.05)";

                const otherIndex = index === 0 ? 1 : 0;
                document.getElementById(`card-${otherIndex}`).style.opacity = "0.3";

                if (score === skyMilestone) {
                    setTimeout(showSkyAward, 500);
                } else {
                    setTimeout(generateLevel, 900);
                }
            } else {
                card.style.opacity = "0.3";
                card.style.backgroundColor = "#f1f5f9";
                card.style.borderColor = "#94a3b8";
                card.style.boxShadow = "0 6px 0 #475569";
            }
        }

        function showSkyAward() {
            const prize = spacePrizes[Math.floor(Math.random() * spacePrizes.length)];
            document.getElementById('badge-icon').textContent = prize;

            const shelf = document.getElementById('shelf-badges');
            const span = document.createElement('span');
            span.textContent = prize;
            shelf.appendChild(span);

            document.getElementById('sky-overlay').classList.add('show');
            skyMilestone += 10;
        }

        function closeSkyWindow() {
            document.getElementById('sky-overlay').classList.remove('show');
            document.getElementById('target-text').textContent = skyMilestone;
            generateLevel();
        }

        generateLevel();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heavy or Light? Measurement Game</title>
    <style>
        body {
            font-family: 'Comic Sans MS', 'Arial', sans-serif;
            background-color: #e1f5fe; /* Light ocean blue */
            text-align: center;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            color: #01579b;
            font-size: 1.8rem;
            margin-bottom: 5px;
        }
        .instruction {
            font-size: 1.2rem;
            color: #0277bd;
            margin-bottom: 20px;
            font-weight: bold;
        }
        .game-board {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
            box-sizing: border-box;
            border: 3px solid #81d4fa;
        }
        .options-container {
            display: flex;
            justify-content: space-around;
            margin-top: 15px;
        }
        .option-card {
            background-color: #b3e5fc;
            border-radius: 15px;
            padding: 20px 10px;
            width: 40%;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        @media (hover: hover) {
            .option-card:hover {
                transform: scale(1.05);
                background-color: #81d4fa;
            }
        }
        .item-emoji {
            font-size: 4rem;
            margin-bottom: 10px;
            user-select: none;
        }
        .item-name {
            font-size: 1.2rem;
            color: #01579b;
            font-weight: bold;
        }
        .feedback {
            font-size: 1.4rem;
            font-weight: bold;
            height: 30px;
            margin: 10px 0;
        }
        .rewards-section {
            margin-top: 30px;
            background-color: #ffffff;
            border-radius: 15px;
            padding: 15px;
            width: 100%;
            max-width: 500px;
            box-sizing: border-box;
            border: 3px dashed #4fc3f7;
        }
        .rewards-title {
            color: #0288d1;
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .aquarium {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            min-height: 50px;
            font-size: 2rem;
        }
        .score-board {
            font-size: 1.2rem;
            color: #0277bd;
            margin-top: 10px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>⚖️ Heavy or Light? ⚖️</h1>
    <div class="instruction" id="questionText">Which one is HEAVIER?</div>

    <div class="game-board">
        <div class="feedback" id="feedbackMsg"></div>
        
        <div class="options-container">
            <div class="option-card" id="card1" onclick="checkAnswer(0)">
                <div class="item-emoji" id="emoji1">🐋</div>
                <div class="item-name" id="name1">Whale</div>
            </div>
            
            <div class="option-card" id="card2" onclick="checkAnswer(1)">
                <div class="item-emoji" id="emoji2">🐠</div>
                <div class="item-name" id="name2">Fish</div>
            </div>
        </div>
    </div>

    <div class="score-board">Correct Answers: <span id="score">0</span></div>

    <div class="rewards-section">
        <div class="rewards-title">🌊 Your Rescued Ocean Friends 🌊</div>
        <div class="aquarium" id="aquarium"></div>
        <div style="font-size: 0.9rem; color: #0277bd; margin-top: 5px;">Earn a new friend every 3 correct answers!</div>
    </div>

    <script>
        // Database of items with their relative weight values
        const items = [
            { emoji: '🐋', name: 'Whale', weight: 100 },
            { emoji: '🐠', name: 'Fish', weight: 2 },
            { emoji: '🚢', name: 'Ship', weight: 1000 },
            { emoji: '⛵', name: 'Small Boat', weight: 50 },
            { emoji: '🪨', name: 'Big Rock', weight: 80 },
            { emoji: '🐚', name: 'Seashell', weight: 1 },
            { emoji: '🐢', name: 'Sea Turtle', weight: 30 },
            { emoji: '🦐', name: 'Shrimp', weight: 0.5 },
            { emoji: '🦈', name: 'Shark', weight: 90 },
            { emoji: '🐡', name: 'Pufferfish', weight: 3 },
            { emoji: '⚓', name: 'Anchor', weight: 200 },
            { emoji: '🪶', name: 'Feather', weight: 0.1 }
        ];

        const rewardsList = ['🐬', '🐙', '🦀', '🐳', '🦑', '🐡', '🐢', '🦈', '🐠', '🦭'];
        
        let score = 0;
        let currentOptions = [];
        let askingHeavier = true; // true = heavier, false = lighter
        let isPlaying = true;
        let rewardsEarned = 0;

        function startRound() {
            isPlaying = true;
            document.getElementById('feedbackMsg').innerText = "";
            document.getElementById('card1').style.backgroundColor = "#b3e5fc";
            document.getElementById('card2').style.backgroundColor = "#b3e5fc";

            // Randomly decide if we are asking for HEAVIER or LIGHTER
            askingHeavier = Math.random() > 0.5;
            document.getElementById('questionText').innerText = askingHeavier ? "Which one is HEAVIER?" : "Which one is LIGHTER?";

            // Pick two different random items
            let index1 = Math.floor(Math.random() * items.length);
            let index2 = Math.floor(Math.random() * items.length);
            while (index1 === index2) {
                index2 = Math.floor(Math.random() * items.length);
            }

            currentOptions = [items[index1], items[index2]];

            // Update the UI
            document.getElementById('emoji1').innerText = currentOptions[0].emoji;
            document.getElementById('name1').innerText = currentOptions[0].name;
            
            document.getElementById('emoji2').innerText = currentOptions[1].emoji;
            document.getElementById('name2').innerText = currentOptions[1].name;
        }

        function checkAnswer(selectedIndex) {
            if (!isPlaying) return;
            isPlaying = false;

            let isCorrect = false;
            let otherIndex = selectedIndex === 0 ? 1 : 0;

            if (askingHeavier) {
                isCorrect = currentOptions[selectedIndex].weight > currentOptions[otherIndex].weight;
            } else {
                isCorrect = currentOptions[selectedIndex].weight < currentOptions[otherIndex].weight;
            }

            if (isCorrect) {
                document.getElementById('feedbackMsg').innerText = "⭐ Correct! ⭐";
                document.getElementById('feedbackMsg').style.color = "#2e7d32";
                document.getElementById('card' + (selectedIndex + 1)).style.backgroundColor = "#a5d6a7";
                score++;
                document.getElementById('score').innerText = score;
                
                // Check if they earned a reward (every 3 points)
                if (score % 3 === 0 && rewardsEarned < rewardsList.length) {
                    let newReward = document.createElement('div');
                    newReward.innerText = rewardsList[rewardsEarned];
                    // Tiny animation for the new reward
                    newReward.style.animation = "popIn 0.5s ease"; 
                    document.getElementById('aquarium').appendChild(newReward);
                    rewardsEarned++;
                }
            } else {
                document.getElementById('feedbackMsg').innerText = "Oops! Try again.";
                document.getElementById('feedbackMsg').style.color = "#c62828";
                document.getElementById('card' + (selectedIndex + 1)).style.backgroundColor = "#ef9a9a";
            }

            setTimeout(startRound, 1500);
        }

        // Add a quick animation style for the rewards dynamically
        const style = document.createElement('style');
        style.innerHTML = `
            @keyframes popIn {
                0% { transform: scale(0); }
                80% { transform: scale(1.2); }
                100% { transform: scale(1); }
            }
        `;
        document.head.appendChild(style);

        window.onload = startRound;
    </script>

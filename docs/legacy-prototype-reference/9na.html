<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Time Adventure - Full Hours</title>
<style>
body {
    font-family: Arial;
    text-align: center;
    background: linear-gradient(to top, #fbc2eb, #a6c1ee);
    margin: 0;
}

.screen { display: none; }
.active { display: block; }

.character {
    font-size: 50px;
    cursor: pointer;
    margin: 10px;
}
.selected {
    border: 3px solid #333;
    border-radius: 10px;
}

#clockCanvas {
    border: 2px solid #333;
    background: #fff;
    margin: 20px auto;
    display: block;
}

.btn {
    padding: 12px 18px;
    font-size: 18px;
    border: none;
    border-radius: 15px;
    margin: 5px;
    cursor: pointer;
}
</style>
</head>
<body>

<!-- MENU -->
<div id="menu" class="screen active">
    <h1>⏰ Time Adventure</h1>
    <p>Piliin ang nais mong gamiting mukha:</p>
    <div>
        <span class="character" onclick="selectCharacter('🐻', this)">🐻</span>
        <span class="character" onclick="selectCharacter('🐱', this)">🐱</span>
        <span class="character" onclick="selectCharacter('🐸', this)">🐸</span>
    </div>
    <br>
    <button class="btn" onclick="startGame()">▶️ Start Game</button>
</div>

<!-- GAME -->
<div id="game" class="screen">
    <h2 id="characterDisplay"></h2>
    <canvas id="clockCanvas" width="250" height="250"></canvas>
    <div id="answers"></div>
    <p>
        Score: <span id="score">0</span> |
        Level: <span id="level">1</span>
    </p>
    <button class="btn" onclick="goMenu()">🔁 Back to Menu</button>
</div>

<script>
let character = "🐻";
let score = 0;
let level = 1;
let correctAnswer = "";

function selectCharacter(char, element){
    character = char;
    document.querySelectorAll(".character").forEach(c=>c.classList.remove("selected"));
    element.classList.add("selected");
}

function startGame(){
    document.getElementById("menu").classList.remove("active");
    document.getElementById("game").classList.add("active");
    document.getElementById("characterDisplay").innerText = character;
    score = 0;
    level = 1;
    document.getElementById("score").innerText = score;
    document.getElementById("level").innerText = level;
    generateGame();
}

function goMenu(){
    document.getElementById("game").classList.remove("active");
    document.getElementById("menu").classList.add("active");
}

function drawClock(hour){
    const canvas = document.getElementById("clockCanvas");
    const ctx = canvas.getContext("2d");
    const radius = canvas.width / 2;
    const center = radius;

    // Clear and reset
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // 1. Draw Clock Face
    ctx.beginPath();
    ctx.arc(center, center, radius - 10, 0, 2 * Math.PI);
    ctx.fillStyle = 'white';
    ctx.fill();
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 5;
    ctx.stroke();

    // 2. Draw Numbers
    ctx.font = "bold 20px Arial";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillStyle = "#333";
    for(let num = 1; num <= 12; num++){
        let angle = num * Math.PI / 6;
        let x = center + Math.sin(angle) * (radius - 35);
        let y = center - Math.cos(angle) * (radius - 35);
        ctx.fillText(num.toString(), x, y);
    }

    // 3. Draw Minute Hand (Always at 12 for full hours)
    ctx.save();
    ctx.translate(center, center);
    ctx.beginPath();
    ctx.moveTo(0,0);
    ctx.lineTo(0, -(radius * 0.75));
    ctx.lineWidth = 4;
    ctx.strokeStyle = "#555";
    ctx.stroke();
    ctx.restore();

    // 4. Draw Hour Hand
    ctx.save();
    ctx.translate(center, center);
    let hourAngle = (hour % 12) * (Math.PI / 6);
    ctx.rotate(hourAngle);
    ctx.beginPath();
    ctx.moveTo(0,0);
    ctx.lineTo(0, -(radius * 0.5));
    ctx.lineWidth = 8;
    ctx.strokeStyle = "#000";
    ctx.lineCap = "round";
    ctx.stroke();
    ctx.restore();

    // 5. Center Pin
    ctx.beginPath();
    ctx.arc(center, center, 6, 0, 2 * Math.PI);
    ctx.fillStyle = '#333';
    ctx.fill();
}

function generateGame(){
    let hour = Math.floor(Math.random() * 12) + 1;
    correctAnswer = `${hour}:00`;

    drawClock(hour);

    let options = new Set();
    options.add(correctAnswer);

    while(options.size < 4){
        let wrongHour = Math.floor(Math.random() * 12) + 1;
        options.add(`${wrongHour}:00`);
    }

    let shuffled = Array.from(options).sort(() => Math.random() - 0.5);

    const container = document.getElementById("answers");
    container.innerHTML = "";

    shuffled.forEach(opt => {
        let btn = document.createElement("button");
        btn.className = "btn";
        btn.style.background = "#fff"; // Make buttons pop more
        btn.style.border = "2px solid #a6c1ee";
        btn.innerText = opt;
        btn.onclick = () => checkAnswer(opt);
        container.appendChild(btn);
    });
}

function checkAnswer(selected){
    if(selected === correctAnswer){
        score++;
        if(score % 5 === 0) level++;
        
        document.getElementById("score").innerText = score;
        document.getElementById("level").innerText = level;
        generateGame();
    } else {
        // Simple shake effect or visual feedback could go here
        alert("Try again! Look closely at the short hand.");
    }
}
</script>

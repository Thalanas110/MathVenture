<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magical Dino Egg Hatchery!</title>
    <style>
        :root {
            --jungle-green: #15803d;
            --lava-orange: #f97316;
            --sky-blue: #bae6fd;
            --nest-brown: #78350f;
        }

        body {
            margin: 0;
            padding: 20px;
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif;
            background: linear-gradient(180deg, var(--sky-blue) 0%, #bbf7d0 100%);
            color: #1e293b;
            display: flex;
            flex-direction: column;
            justify-content: flex-start; /* Safely starts content at the top on small screens */
            align-items: center;
            min-height: 100vh;
            min-height: 100dvh; /* Accounts for mobile browser address bars */
            gap: 25px;
            user-select: none;
            -webkit-user-select: none;
            box-sizing: border-box;
        }

        #hatchery-box {
            width: 100%;
            max-width: 460px;
            margin-top: auto; /* Pushes the box down to center when there is space */
            background: #ffffff;
            border: 6px solid var(--jungle-green);
            border-radius: 32px;
            padding: 20px;
            box-shadow: 0 20px 40px rgba(21, 128, 61, 0.2);
            text-align: center;
            position: relative;
            box-sizing: border-box;
        }

        .hud-bar {
            display: flex;
            justify-content: space-between;
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--jungle-green);
            margin-bottom: 5px;
        }

        /* Dino Mother & Question Dashboard */
        #dino-dashboard {
            background: #f0fdf4;
            border: 3px dashed var(--jungle-green);
            border-radius: 24px;
            padding: 12px;
            margin-bottom: 15px;
        }

        #dino-mom {
            font-size: 4.5rem;
            margin: 0;
            display: inline-block;
            animation: breathe 3s infinite ease-in-out;
        }

        @keyframes breathe {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.08) rotate(2deg); }
        }

        #question-prompt {
            font-size: 1.8rem;
            font-weight: 900;
            color: #16a34a;
            margin: 5px 0;
            text-shadow: 1px 1px 0px #fef08a;
        }

        /* Nest selection grid */
        #nests-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin: 20px 0;
        }

        .nest-card {
            background: linear-gradient(to bottom, #fef08a 0%, #fef9c3 60%, var(--nest-brown) 60%, #451a03 100%);
            border: 3px solid var(--nest-brown);
            border-radius: 24px;
            min-height: 85px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            padding: 10px;
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
            transition: transform 0.1s;
            position: relative;
        }

        .nest-card:active {
            transform: scale(0.96);
        }

        .egg-or-baby {
            font-size: 2.3rem;
            display: inline-block;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
        }

        /* Permanent Badge Display Shelf */
        #safari-shelf {
            background: #f8fafc;
            border-top: 4px solid var(--nest-brown);
            border-radius: 12px;
            padding: 8px;
            margin-top: 10px;
        }

        #badge-collection {
            display: flex;
            justify-content: center;
            gap: 8px;
            font-size: 1.8rem;
            min-height: 35px;
            flex-wrap: wrap;
        }

        /* Success Overlay Popups */
        #safari-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.98);
            border-radius: 26px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }

        #safari-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }

        .fossil-glow {
            font-size: 6.5rem;
            animation: prizeJump 1s infinite alternate ease-in-out;
        }

        @keyframes prizeJump {
            0% { transform: translateY(0) scale(1); }
            100% { transform: translateY(-15px) scale(1.1); }
        }

        .hatch-btn {
            background-color: var(--lava-orange);
            color: white;
            border: none;
            padding: 12px 35px;
            font-size: 1.3rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 0 #c2410c;
            font-family: inherit;
        }

        /* Modern layout for bottom navigation images */
        .nav-buttons {
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap; 
            gap: 20px;
            margin-bottom: auto; /* Pushes the buttons up to balance the centering */
        }

        .nav-buttons img {
            transition: transform 0.2s;
            border-radius: 15px;
        }

        @media (hover: hover) {
            .nav-buttons img:hover {
                transform: scale(1.05);
            }
        }
    </style>
</head>
<body>

    <div id="hatchery-box">
        <div id="safari-overlay">
            <h2 style="color: var(--lava-orange); margin: 0; font-size: 2.2rem;">🦖 Fossil Unlocked! 🦖</h2>
            <p style="font-size: 1.2rem; margin: 5px 0; color: #475569;">You are a certified Dino Expert!</p>
            <div class="fossil-glow" id="fossil-prize">🦴</div>
            <button class="hatch-btn" onclick="closeSafariReward()">Find More Eggs!</button>
        </div>

        <div class="hud-bar">
            <div>Hatched: <span id="score-text" style="color: var(--lava-orange);">0</span></div>
            <div>Next Fossil: <span id="target-text" style="color: var(--jungle-green);">10</span></div>
        </div>

        <div id="dino-dashboard">
            <div id="dino-mom">🦖</div>
            <div id="question-prompt">Find the nest with 4 eggs!</div>
        </div>

        <p style="margin: 0; font-size: 0.95rem; color: #64748b; font-weight: bold;">Tap the correct nest to help them hatch!</p>

        <div id="nests-container">
            <div class="nest-card" onclick="tapNest(this)" data-count="0"></div>
            <div class="nest-card" onclick="tapNest(this)" data-count="0"></div>
            <div class="nest-card" onclick="tapNest(this)" data-count="0"></div>
        </div>

        <div id="safari-shelf">
            <div style="font-size: 0.75rem; color: #94a3b8; font-weight: bold; text-transform: uppercase; margin-bottom: 3px;">Your Golden Fossil Map</div>
            <div id="badge-collection"></div>
        </div>
    </div>

    <div class="nav-buttons">
        <a href="farm.html"><img src="np.png" width="80" height="50" alt="Next Page"></a>
        <a href="1.html"><img src="ACT.png" width="80" height="50" alt="Activity"></a>
    </div>

    <script>
        let score = 0;
        let targetAnswer = 0;
        let fossilMilestone = 10;

        const babyDinos = ['🦕', '🦖', '👶', '🐉', '🐊'];
        const fossilRewards = ['🦴', '🦕', '🦖', '🌋', '🌴', '💎', '👑'];
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playDinoSound(style) {
            const now = audioCtx.currentTime;

            if (style === 'hatch') {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(300, now);
                osc.frequency.exponentialRampToValueAtTime(900, now + 0.1);
                gain.gain.setValueAtTime(0.25, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(now); osc.stop(now + 0.1);
            } else if (style === 'error') {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(130, now);
                gain.gain.setValueAtTime(0.2, now);
                gain.gain.linearRampToValueAtTime(0.01, now + 0.2);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(now); osc.stop(now + 0.2);
            } else if (style === 'roar') {
                const frequencies = [100, 150, 120, 200];
                frequencies.forEach((f, i) => {
                    const o = audioCtx.createOscillator();
                    const g = audioCtx.createGain();
                    o.type = 'sawtooth';
                    o.frequency.setValueAtTime(f, now + (i * 0.08));
                    g.gain.setValueAtTime(0.2, now + (i * 0.08));
                    g.gain.exponentialRampToValueAtTime(0.01, now + (i * 0.08) + 0.3);
                    o.connect(g); g.connect(audioCtx.destination);
                    o.start(now + (i * 0.08)); o.stop(now + (i * 0.08) + 0.3);
                });
            }
        }

        function createHatcheryLevel() {
            const promptBox = document.getElementById('question-prompt');
            
            const isSubtraction = Math.random() > 0.5;

            if (!isSubtraction) {
                targetAnswer = Math.floor(Math.random() * 6) + 2; 
                promptBox.textContent = `Find the nest with ${targetAnswer} eggs!`;
            } else {
                const num1 = Math.floor(Math.random() * 4) + 5; 
                const num2 = Math.floor(Math.random() * 4) + 1; 
                targetAnswer = num1 - num2;
                promptBox.textContent = `Which nest has ${num1} - ${num2} eggs?`;
            }

            let nestCounts = [targetAnswer];
            while (nestCounts.length < 3) {
                let randomFake = Math.floor(Math.random() * 7) + 1; 
                if (!nestCounts.includes(randomFake)) nestCounts.push(randomFake);
            }
            nestCounts.sort(() => Math.random() - 0.5); 

            const nests = document.querySelectorAll('.nest-card');
            nests.forEach((nest, index) => {
                nest.innerHTML = ''; 
                nest.style.pointerEvents = 'auto';
                nest.style.opacity = '1';
                
                const count = nestCounts[index];
                nest.setAttribute('data-count', count);

                for (let i = 0; i < count; i++) {
                    const span = document.createElement('span');
                    span.className = 'egg-or-baby';
                    span.textContent = '🥚';
                    nest.appendChild(span);
                }
            });
        }

        function tapNest(nest) {
            const selectedCount = parseInt(nest.getAttribute('data-count'));
            const nests = document.querySelectorAll('.nest-card');

            if (selectedCount === targetAnswer) {
                score++;
                document.getElementById('score-text').textContent = score;
                playDinoSound('hatch');

                const activeBaby = babyDinos[Math.floor(Math.random() * babyDinos.length)];
                const eggSpans = nest.querySelectorAll('.egg-or-baby');
                eggSpans.forEach(span => {
                    span.textContent = activeBaby;
                    span.style.transform = 'scale(1.2)';
                });

                nests.forEach(n => n.style.pointerEvents = 'none');

                if (score === fossilMilestone) {
                    setTimeout(triggerFossilMilestoneWindow, 1200);
                } else {
                    setTimeout(createHatcheryLevel, 1600);
                }
            } else {
                playDinoSound('error');
                nest.style.opacity = '0.2';
                nest.style.pointerEvents = 'none';
            }
        }

        function triggerFossilMilestoneWindow() {
            playDinoSound('roar');

            const fossil = fossilRewards[Math.floor(Math.random() * fossilRewards.length)];
            document.getElementById('fossil-prize').textContent = fossil;

            const collection = document.getElementById('badge-collection');
            const span = document.createElement('span');
            span.textContent = fossil;
            collection.appendChild(span);

            document.getElementById('safari-overlay').classList.add('show');
            fossilMilestone += 10;
        }

        function closeSafariReward() {
            document.getElementById('safari-overlay').classList.remove('show');
            document.getElementById('target-text').textContent = fossilMilestone;
            createHatcheryLevel();
        }

        createHatcheryLevel();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>📏 Slow & Fun Measurement</title>
    <style>
        * { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
        
        body {
            background: #87CEEB;
            font-family: 'Comic Sans MS', cursive, sans-serif;
            margin: 0;
            padding: 20px; /* Added padding to protect phone edges */
            display: flex;
            flex-direction: column; /* Forces vertical stacking */
            justify-content: flex-start; /* Safely starts content at the top on small screens */
            align-items: center;
            min-height: 100vh;
            min-height: 100dvh; /* Accounts for mobile browser address bars */
            gap: 25px; /* Adds space between game and buttons */
            box-sizing: border-box;
        }

        .game-container {
            width: 100%; /* Changed to 100% for safe mobile sizing */
            max-width: 500px;
            margin-top: auto; /* Pushes the box down to center when there is space */
            background: #7cfc00;
            border: 8px solid #556b2f;
            border-radius: 40px;
            padding: 15px;
            text-align: center;
            box-shadow: 0 10px 0 #3e4e22;
            box-sizing: border-box;
        }

        .header {
            background: white;
            padding: 15px;
            border-radius: 25px;
            border: 4px solid #556b2f;
            margin-bottom: 15px;
            min-height: 100px; /* Keeps layout steady */
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .instruction {
            font-size: 1.4rem;
            color: #d2691e;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        .hole {
            position: relative;
            background: #4b3621;
            height: 90px;
            border-radius: 40px 40px 10px 10px;
            overflow: hidden;
        }

        .mole {
            position: absolute;
            top: 100%; 
            left: 0;
            width: 100%;
            height: 100%;
            background: #a0522d;
            border-radius: 30px 30px 0 0;
            /* SLOWER ANIMATION: Changed 0.2s to 0.5s */
            transition: top 0.5s ease-in-out; 
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 3px solid #633219;
        }

        .mole.up { top: 10%; }

        .object {
            background: white;
            border: 2px solid #333;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* BIG is very big, SMALL is very small for easy seeing */
        .big { width: 65px; height: 65px; font-size: 2.5rem; }
        .small { width: 30px; height: 30px; font-size: 1.2rem; }

        .btn-start {
            margin-top: 15px;
            padding: 18px 40px;
            font-size: 1.6rem;
            background: #ff4500;
            color: white;
            border: none;
            border-radius: 50px;
            box-shadow: 0 6px 0 #b23300;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-start:active { transform: translateY(4px); box-shadow: none; }

        /* Modern layout for bottom navigation images */
        .nav-buttons {
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap; /* Allows safe stacking on narrow screens */
            gap: 20px;
            margin-bottom: auto; /* Pushes the buttons up to balance the centering */
        }

        .nav-buttons img {
            transition: transform 0.2s;
            border-radius: 15px;
        }

        @media (hover: hover) {
            .nav-buttons img:hover {
                transform: scale(1.05);
            }
        }
    </style>
</head>
<body>

<div class="game-container">
    <div class="header">
        <div id="task" class="instruction">Ready to play?</div>
        <div style="font-weight:bold;">⭐ Score: <span id="score">0</span></div>
    </div>

    <div class="grid">
        <div class="hole"><div class="mole" onclick="whack(this)"></div></div>
        <div class="hole"><div class="mole" onclick="whack(this)"></div></div>
        <div class="hole"><div class="mole" onclick="whack(this)"></div></div>
        <div class="hole"><div class="mole" onclick="whack(this)"></div></div>
        <div class="hole"><div class="mole" onclick="whack(this)"></div></div>
        <div class="hole"><div class="mole" onclick="whack(this)"></div></div>
    </div>

    <button class="btn-start" id="startBtn" onclick="startGame()">START! ▶️</button>
</div>

<div class="nav-buttons">
    <a href="7b.html"><img src="np.png" width="80" height="50" alt="Next Page"></a>
    <a href="1.html"><img src="ACT.png" width="80" height="50" alt="Activity"></a>
</div>

<script>
    const moles = Array.from(document.querySelectorAll('.mole'));
    const taskText = document.getElementById('task');
    const scoreText = document.getElementById('score');
    const startBtn = document.getElementById('startBtn');

    let score = 0;
    let gameActive = false;
    let currentGoal = "BIG";
    let moleTimeout;

    const items = ["✏️", "🍎", "🚗", "🦴", "🎁"];

    function startGame() {
        score = 0;
        gameActive = true;
        scoreText.innerText = score;
        startBtn.style.display = 'none';
        setNewTask();
        popOut();
    }

    function setNewTask() {
        currentGoal = Math.random() > 0.5 ? "BIG" : "SMALL";
        taskText.innerText = "Find the " + currentGoal + " one!";
        taskText.style.color = currentGoal === "BIG" ? "#d63031" : "#0984e3";
    }

    function popOut() {
        if (!gameActive) return;

        // Clear previous moles
        moles.forEach(m => m.classList.remove('up'));

        // Pick random spots
        const shuffled = moles.sort(() => 0.5 - Math.random());
        const selected = shuffled.slice(0, 2); 

        const emoji = items[Math.floor(Math.random() * items.length)];

        // Assign Big and Small
        setupMole(selected[0], "BIG", emoji);
        setupMole(selected[1], "SMALL", emoji);

        // WAIT TIME: Moles stay up for 3 seconds now (plenty of time to tap!)
        moleTimeout = setTimeout(() => {
            if (gameActive) popOut();
        }, 3500); 
    }

    function setupMole(el, size, emoji) {
        el.innerHTML = `<div class="object ${size.toLowerCase()}">${emoji}</div>`;
        el.dataset.size = size;
        el.classList.add('up');
    }

    function whack(mole) {
        if (!gameActive || !mole.classList.contains('up')) return;

        if (mole.dataset.size === currentGoal) {
            score++;
            scoreText.innerText = score;
            mole.classList.remove('up');
            taskText.innerText = "YES! That's it! ✨";
            
            // Give them a moment to feel proud before the next one
            clearTimeout(moleTimeout);
            setTimeout(() => {
                setNewTask();
                popOut();
            }, 1000);
        } else {
            taskText.innerText = "Try again! Look for " + currentGoal + ".";
            // Don't hide the moles yet, let them try again!
        }
    }

    // Optional: Reset button logic
    function resetGame() {
        gameActive = false;
        clearTimeout(moleTimeout);
        moles.forEach(m => m.classList.remove('up'));
        startBtn.style.display = 'inline-block';
    }
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magic Balloon Carnival Addition</title>
    <style>
        :root {
            --carnival-red: #ef4444;
            --sky-blue: #bae6fd;
            --ticket-gold: #f59e0b;
            --purple: #a855f7;
            --dark: #1e293b;
        }

        body {
            margin: 0;
            padding: 20px; /* Added padding so it doesn't touch phone edges */
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif;
            background: linear-gradient(180deg, #fef08a 0%, #fef9c3 100%);
            color: var(--dark);
            display: flex;
            flex-direction: column; /* Forces everything to stack vertically */
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            gap: 25px; /* Adds space between the game box and the bottom buttons */
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }

        #game-box {
            width: 100%; /* Changed to 100% to fill the phone width safely */
            max-width: 460px;
            background: #ffffff;
            border: 6px dashed var(--carnival-red);
            border-radius: 32px;
            padding: 20px;
            box-shadow: 0 20px 40px rgba(239, 68, 68, 0.15);
            text-align: center;
            position: relative;
            box-sizing: border-box;
        }

        .hud {
            display: flex;
            justify-content: space-between;
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--carnival-red);
            margin-bottom: 5px;
        }

        /* The Carnival Sky Stage */
        #sky-stage {
            height: 160px;
            background: linear-gradient(to bottom, #38bdf8 0%, var(--sky-blue) 100%);
            border-radius: 24px;
            position: relative;
            margin: 15px 0;
            border: 3px solid #0284c7;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            overflow: hidden;
        }

        .balloon-group {
            display: flex;
            gap: 4px;
            max-width: 160px;
            flex-wrap: wrap;
            justify-content: center;
            animation: float 3s infinite ease-in-out alternate;
        }

        .balloon-group:nth-child(3) {
            animation-delay: 0.5s;
        }

        @keyframes float {
            0% { transform: translateY(5px); }
            100% { transform: translateY(-10px); }
        }

        .balloon {
            font-size: 2.2rem;
            display: inline-block;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));
            transition: transform 0.3s ease;
        }

        .plus-sign {
            font-size: 2.5rem;
            font-weight: 900;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        #math-text {
            font-size: 3.5rem;
            font-weight: 900;
            margin: 10px 0;
            color: var(--purple);
            text-shadow: 2px 2px 0px #fbcfe8;
        }

        /* Choice Buttons */
        #choices-zone {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-top: 15px;
        }

        .carnival-btn {
            background-color: #06b6d4;
            color: white;
            border: none;
            border-radius: 20px;
            font-size: 2.5rem;
            font-weight: bold;
            padding: 10px 0;
            cursor: pointer;
            box-shadow: 0 6px 0 #0891b2;
            font-family: inherit;
            transition: transform 0.1s;
        }

        .carnival-btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #0891b2;
        }

        /* Prize Shelf */
        #prize-shelf {
            background: #f1f5f9;
            border-top: 4px dashed var(--ticket-gold);
            border-radius: 12px;
            padding: 8px;
            margin-top: 15px;
        }

        #shelf-items {
            display: flex;
            justify-content: center;
            gap: 10px;
            font-size: 1.8rem;
            min-height: 35px;
            flex-wrap: wrap;
        }

        /* Celebration Overlay */
        #ticket-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.98);
            border-radius: 26px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }

        #ticket-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }

        .ticket-glow {
            font-size: 6.5rem;
            animation: ticketPop 1s infinite alternate ease-in-out;
        }

        @keyframes ticketPop {
            0% { transform: scale(1) rotate(-5deg); }
            100% { transform: scale(1.1) rotate(5deg); }
        }

        .next-game-btn {
            background-color: var(--carnival-red);
            color: white;
            border: none;
            padding: 12px 35px;
            font-size: 1.3rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 0 #b91c1c;
            font-family: inherit;
        }

        /* Modern layout for bottom navigation images */
        .nav-buttons {
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap; /* Allows them to stack neatly on tiny screens */
            gap: 20px;
        }

        .nav-buttons img {
            transition: transform 0.2s;
            border-radius: 15px; /* Adds a nice rounded edge if your images don't have them */
        }

        /* Fun little hover effect for computers */
        @media (hover: hover) {
            .nav-buttons img:hover {
                transform: scale(1.05);
            }
        }
    </style>
</head>
<body>

    <div id="game-box">
        <div id="ticket-overlay">
            <h2 style="color: var(--ticket-gold); margin: 0; font-size: 2.2rem;">🎟️ Golden Ticket! 🎟️</h2>
            <p style="font-size: 1.2rem; margin: 5px 0; color: #475569;">You won a fun carnival prize:</p>
            <div class="ticket-glow" id="prize-icon">🍿</div>
            <button class="next-game-btn" onclick="closeTicketWindow()">Play More Games!</button>
        </div>

        <div class="hud">
            <div>Tickets: <span id="score-text" style="color: var(--carnival-red);">0</span></div>
            <div>Next Ticket: <span id="target-text" style="color: var(--ticket-gold);">10</span></div>
        </div>

        <div id="sky-stage">
            <div class="balloon-group" id="group-1"></div>
            <div class="plus-sign">+</div>
            <div class="balloon-group" id="group-2"></div>
        </div>

        <p style="margin: 0; font-weight: bold; color: #64748b;">Count all the balloons together!</p>
        <div id="math-text">2 + 3</div>

        <div id="choices-zone">
            <button class="carnival-btn" onclick="selectChoice(this)">?</button>
            <button class="carnival-btn" onclick="selectChoice(this)">?</button>
            <button class="carnival-btn" onclick="selectChoice(this)">?</button>
        </div>

        <div id="prize-shelf">
            <div style="font-size: 0.75rem; color: #94a3b8; font-weight: bold; text-transform: uppercase; margin-bottom: 3px;">Your Carnival Prizes</div>
            <div id="shelf-items"></div>
        </div>
    </div>

    <div class="nav-buttons">
        <a href="icecream.html"><img src="np.png" width="80" height="50" alt="Next Page"></a>
        <a href="1.html"><img src="ACT.png" width="80" height="50" alt="Activity"></a>
    </div>

    <script>
        let score = 0;
        let correctAnswer = 0;
        let ticketMilestone = 10;

        const leftBalloons = ['🎈', '💖', '🦄', '🌟']; // Fun shapes for left side
        const rightBalloons = ['🔵', '🟢', '🟡', '🟠']; // Fun shapes for right side
        const carnivalPrizes = ['🍿', '🍦', '🎪', '🎡', '🎢', '🦁', '🐻', '🥨', '🍭'];

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playCarnivalSound(type) {
            const now = audioCtx.currentTime;

            if (type === 'pop') {
                // Fun rapid triple pop sound effect
                [0, 0.06, 0.12].forEach((offset) => {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(400 + (offset * 1000), now + offset);
                    osc.frequency.exponentialRampToValueAtTime(100, now + offset + 0.05);
                    gain.gain.setValueAtTime(0.2, now + offset);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + offset + 0.05);
                    osc.connect(gain); gain.connect(audioCtx.destination);
                    osc.start(now + offset); osc.stop(now + offset + 0.05);
                });
            } else if (type === 'buzzer') {
                // Short sad slide down for mistakes
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(180, now);
                osc.frequency.linearRampToValueAtTime(90, now + 0.2);
                gain.gain.setValueAtTime(0.2, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(now); osc.stop(now + 0.2);
            } else if (type === 'fanfare') {
                // Happy carnival organ chime sequence
                const scale = [261.63, 329.63, 392.00, 523.25, 659.25];
                scale.forEach((freq, idx) => {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(freq, now + (idx * 0.07));
                    gain.gain.setValueAtTime(0.15, now + (idx * 0.07));
                    gain.gain.exponentialRampToValueAtTime(0.01, now + (idx * 0.07) + 0.2);
                    osc.connect(gain); gain.connect(audioCtx.destination);
                    osc.start(now + (idx * 0.07)); osc.stop(now + (idx * 0.07) + 0.2);
                });
            }
        }

        function generateAdditionLevel() {
            // Kindergarten friendly addition totals (Sum staying between 2 and 10)
            const num1 = Math.floor(Math.random() * 5) + 1; // 1 to 5
            const num2 = Math.floor(Math.random() * 5) + 1; // 1 to 5
            correctAnswer = num1 + num2;

            document.getElementById('math-text').textContent = `${num1} + ${num2}`;

            // Reset and build left side balloons
            const g1 = document.getElementById('group-1');
            g1.innerHTML = '';
            const b1Emoji = leftBalloons[Math.floor(Math.random() * leftBalloons.length)];
            for (let i = 0; i < num1; i++) {
                const b = document.createElement('span');
                b.className = 'balloon';
                b.textContent = b1Emoji;
                g1.appendChild(b);
            }

            // Reset and build right side balloons
            const g2 = document.getElementById('group-2');
            g2.innerHTML = '';
            const b2Emoji = rightBalloons[Math.floor(Math.random() * rightBalloons.length)];
            for (let i = 0; i < num2; i++) {
                const b = document.createElement('span');
                b.className = 'balloon';
                b.textContent = b2Emoji;
                g2.appendChild(b);
            }

            // Create 3 keypad options
            let choices = [correctAnswer];
            while (choices.length < 3) {
                let fake = Math.floor(Math.random() * 9) + 2; // 2 to 10
                if (!choices.includes(fake)) choices.push(fake);
            }
            choices.sort(() => Math.random() - 0.5);

            // Setup buttons
            const buttons = document.querySelectorAll('.carnival-btn');
            buttons.forEach((btn, idx) => {
                btn.textContent = choices[idx];
                btn.disabled = false;
                btn.style.backgroundColor = '#06b6d4';
                btn.style.boxShadow = '0 6px 0 #0891b2';
            });
        }

        function selectChoice(button) {
            const guess = parseInt(button.textContent);
            const buttons = document.querySelectorAll('.carnival-btn');

            if (guess === correctAnswer) {
                score++;
                document.getElementById('score-text').textContent = score;
                playCarnivalSound('pop');

                // Animate pop effect on balloons
                document.querySelectorAll('.balloon').forEach(b => {
                    b.style.transform = 'scale(0)';
                });

                button.style.backgroundColor = '#22c55e';
                button.style.boxShadow = '0 6px 0 #16a34a';
                buttons.forEach(btn => btn.disabled = true);

                if (score === ticketMilestone) {
                    setTimeout(triggerMilestoneReward, 800);
                } else {
                    setTimeout(generateAdditionLevel, 1100);
                }
            } else {
                playCarnivalSound('buzzer');
                button.style.backgroundColor = '#ef4444';
                button.style.boxShadow = '0 6px 0 #b91c1c';
                button.disabled = true;
            }
        }

        function triggerMilestoneReward() {
            playCarnivalSound('fanfare');

            const prize = carnivalPrizes[Math.floor(Math.random() * carnivalPrizes.length)];
            document.getElementById('prize-icon').textContent = prize;

            const shelf = document.getElementById('shelf-items');
            const span = document.createElement('span');
            span.textContent = prize;
            shelf.appendChild(span);

            document.getElementById('ticket-overlay').classList.add('show');
            ticketMilestone += 10;
        }

        function closeTicketWindow() {
            document.getElementById('ticket-overlay').classList.remove('show');
            document.getElementById('target-text').textContent = ticketMilestone;
            generateAdditionLevel();
        }

        // Run on startup
        generateAdditionLevel();
    </script>
</body>
</html>

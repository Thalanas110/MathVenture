<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🏆 Measurement Star Train</title>
    <style>
        * { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
        
        body {
            background: #81d4fa;
            font-family: 'Comic Sans MS', cursive, sans-serif;
            margin: 0;
            padding: 20px; /* Added padding to protect phone edges */
            display: flex;
            flex-direction: column; /* Forces vertical stacking */
            justify-content: flex-start; /* Safely starts content at the top on small screens */
            align-items: center;
            min-height: 100vh;
            min-height: 100dvh; /* Accounts for mobile browser address bars */
            overflow-x: hidden; /* Hides clouds on sides, but allows vertical scrolling! */
            box-sizing: border-box;
            gap: 20px;
        }

        /* Scenic Background - Changed to fixed so it stays put if the user scrolls */
        .scenic-world {
            position: fixed; 
            bottom: 0;
            left: 0;
            width: 100%;
            height: 30%;
            background: #81c784;
            border-top: 10px solid #66bb6a;
            z-index: -1;
        }

        .cloud {
            position: fixed; /* Changed to fixed so clouds don't scroll away */
            background: white;
            width: 100px;
            height: 40px;
            border-radius: 50px;
            top: 10%;
            opacity: 0.8;
            animation: drift 25s linear infinite;
            z-index: -1;
        }

        @keyframes drift {
            from { left: -150px; }
            to { left: 100vw; }
        }

        /* Star Board */
        .star-board {
            position: relative;
            background: white;
            padding: 10px 20px;
            border-radius: 30px;
            border: 4px solid #ffb300;
            font-size: 1.5rem;
            font-weight: bold;
            color: #e65100;
            z-index: 10;
            margin-top: 10px;
        }

        .game-area {
            width: 100%;
            max-width: 900px;
            text-align: center;
            padding: 10px;
            margin-top: auto; /* Pushes the box down to center when there is space */
            z-index: 5;
        }

        /* Train Logic */
        .track-zone {
            position: relative;
            height: 180px;
            background: rgba(144, 164, 174, 0.8);
            border-bottom: 15px solid #455a64;
            border-radius: 20px;
            margin: 20px 0;
        }

        #train {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: row-reverse; 
            gap: 8px;
            transition: left 1.5s ease-in;
        }

        .engine { font-size: 4.5rem; line-height: 1; transform: scaleX(-1); } 
        
        .car {
            width: 95px;
            height: 70px;
            background: #ff7675;
            border: 4px solid #2d3436;
            border-radius: 10px;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            position: relative;
        }

        .car::after { content: '● ●'; position: absolute; bottom: -18px; font-size: 1.2rem; color: #2d3436; }

        .cargo-space { font-size: 3rem; margin-bottom: 5px; display: flex; align-items: flex-end; }

        .bubble {
            background: white;
            padding: 15px 25px;
            border-radius: 50px;
            border: 5px solid #0288d1;
            font-size: 1.4rem;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 10px;
            color: #2d3436;
        }

        .choices {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            background: rgba(255,255,255,0.3);
            padding: 15px;
            border-radius: 30px;
        }

        .choice-card {
            background: white;
            border: 5px solid #ffb300;
            border-radius: 25px;
            width: 100px;
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            cursor: pointer;
            box-shadow: 0 8px 0 #e65100;
        }

        /* Trophy Overlay */
        #trophyScreen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(129, 212, 250, 0.95);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            text-align: center;
        }

        .trophy-icon { font-size: 8rem; animation: bounce 1s infinite alternate; }
        
        @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-20px); } }

        .btn-again {
            margin-top: 20px;
            padding: 15px 40px;
            font-size: 1.5rem;
            background: #4caf50;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 6px 0 #2e7d32;
        }

        /* Sizing CSS */
        .size-big { transform: scale(1.4); transform-origin: bottom; }
        .size-small { transform: scale(0.6); transform-origin: bottom; }
        .move-forward { left: 150% !important; }

        /* Modern layout for bottom navigation images */
        .nav-buttons {
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap; /* Allows safe stacking on narrow screens */
            gap: 20px;
            margin-bottom: auto; /* Pushes the buttons up to balance the centering */
            z-index: 10;
        }

        .nav-buttons img {
            transition: transform 0.2s;
            border-radius: 15px;
        }

        @media (hover: hover) {
            .nav-buttons img:hover {
                transform: scale(1.05);
            }
        }

        @media (max-width: 600px) {
            .engine { font-size: 3rem; }
            .car { width: 75px; height: 50px; }
            .choice-card { width: 85px; height: 85px; font-size: 2.2rem; }
            .bubble { font-size: 1rem; }
        }
    </style>
</head>
<body>

<div id="trophyScreen">
    <div class="trophy-icon">🏆✨</div>
    <h1 style="color: #e65100; font-size: 2.5rem;">MEASUREMENT STAR!</h1>
    <p style="font-size: 1.5rem;">You loaded 10 trains!</p>
    <button class="btn-again" onclick="resetGame()">Play Again! 🔄</button>
</div>

<div class="scenic-world"></div>
<div class="cloud" style="animation-delay: -2s;"></div>
<div class="cloud" style="top: 25%; animation-delay: -15s;"></div>

<div class="star-board">⭐ Trains: <span id="starCount">0</span>/10</div>

<div class="game-area">
    <div class="bubble" id="msg">Load the Train!</div>

    <div class="track-zone">
        <div id="train">
            <div class="engine">🚂</div>
            <div class="car" style="background:#ff8a65;"><div class="cargo-space" id="car1"></div></div>
            <div class="car" style="background:#4fc3f7;"><div class="cargo-space" id="car2">❓</div></div>
        </div>
    </div>

    <div class="choices" id="choiceContainer"></div>
</div>

<div class="nav-buttons">
    <a href="7d.html"><img src="np.png" width="80" height="50" alt="Next Page"></a>
    <a href="1.html"><img src="ACT.png" width="80" height="50" alt="Activity"></a>
</div>

<script>
    const gameData = [
        { img: "🌳", name: "tree" }, { img: "⚽", name: "ball" },
        { img: "🏰", name: "tower" }, { img: "🍎", name: "apple" },
        { img: "🐍", name: "snake" }, { img: "🎁", name: "gift" },
        { img: "🦒", name: "giraffe" }, { img: "📏", name: "ruler" }
    ];

    let starScore = 0;
    let currentImg = "";
    let targetSize = "";
    let fixedSize = "";
    let gameActive = true;

    const train = document.getElementById('train');
    const car1 = document.getElementById('car1');
    const car2 = document.getElementById('car2');
    const msg = document.getElementById('msg');
    const choiceContainer = document.getElementById('choiceContainer');
    const starCount = document.getElementById('starCount');
    const trophyScreen = document.getElementById('trophyScreen');

    function loadGame() {
        if (!gameActive) return;

        const randomObj = gameData[Math.floor(Math.random() * gameData.length)];
        currentImg = randomObj.img;

        if (Math.random() > 0.5) {
            targetSize = "size-big"; fixedSize = "size-small";
        } else {
            targetSize = "size-small"; fixedSize = "size-big";
        }

        let sizeWord = (targetSize === "size-big") ? "BIG/TALL" : "SMALL/SHORT";
        msg.innerText = "Find the " + sizeWord + " " + randomObj.name + "!";
        
        train.style.left = "50%";
        train.classList.remove('move-forward');
        car1.innerHTML = `<span class="${fixedSize}">${currentImg}</span>`;
        car2.innerHTML = "❓";

        const choices = ["size-big", "size-small"].sort(() => Math.random() - 0.5);
        choiceContainer.innerHTML = "";
        choices.forEach(c => {
            const div = document.createElement('div');
            div.className = 'choice-card';
            div.innerHTML = `<span class="${c}">${currentImg}</span>`;
            div.onclick = () => handleChoice(c);
            choiceContainer.appendChild(div);
        });
    }

    function handleChoice(picked) {
        if (picked === targetSize) {
            car2.innerHTML = `<span class="${targetSize}">${currentImg}</span>`;
            msg.innerText = "EXCELLENT! 🌟";
            
            setTimeout(() => {
                msg.innerText = "CHOO CHOO! 🚂💨";
                train.classList.add('move-forward');
                
                setTimeout(() => {
                    starScore++;
                    starCount.innerText = starScore;
                    
                    if (starScore >= 10) {
                        showTrophy();
                    } else {
                        nextLevel();
                    }
                }, 1600);
            }, 800);
        } else {
            msg.innerText = "Oops! Try the other one! 🧐";
        }
    }

    function nextLevel() {
        train.style.transition = "none";
        train.style.left = "-150%";
        setTimeout(() => {
            train.style.transition = "left 1.5s ease-in";
            loadGame();
        }, 100);
    }

    function showTrophy() {
        gameActive = false;
        trophyScreen.style.display = 'flex';
    }

    function resetGame() {
        starScore = 0;
        starCount.innerText = "0";
        gameActive = true;
        trophyScreen.style.display = 'none';
        nextLevel();
    }

    loadGame();
</script>

</body>
</html>

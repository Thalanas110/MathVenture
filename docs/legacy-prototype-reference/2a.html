<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shape Matching Game - Fun</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Arial Rounded MT Bold', 'Helvetica', sans-serif;
            background-color: #fffae3;
            text-align: center;
            touch-action: manipulation;
        }

        #header {
            background: white;
            padding: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            position: relative;
            z-index: 100;
        }

        h1 { color: #333; margin: 0; font-size: 24px; }

        #shape-word {
            font-size: 40px;
            margin: 15px 0;
            font-weight: bold;
            text-shadow: 2px 2px #ddd;
        }

        .shape-buttons {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
            padding: 10px;
        }

        .shape-btn {
            width: 120px;
            height: 120px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            box-shadow: 0 6px #bbb;
            transition: transform 0.1s;
        }

        .shape-btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px #bbb;
        }

        #score {
            font-size: 24px;
            margin-top: 20px;
            color: #ff4500;
            font-weight: bold;
        }

        .character {
            position: absolute;
            width: 70px;
            height: 70px;
            z-index: 10;
            pointer-events: none;
        }

        /* Congratulatory Star Screen */
        #star-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.95);
            z-index: 200;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .big-star {
            font-size: 150px;
            color: #FFD700;
            animation: bounce 1s ease-in-out infinite alternate;
        }

        @keyframes bounce {
            from { transform: scale(1); }
            to { transform: scale(1.2); }
        }

        .game-btn {
            padding: 15px 40px;
            font-size: 24px;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            margin: 10px;
            box-shadow: 0 5px rgba(0,0,0,0.2);
            font-family: inherit;
        }

        .play-again { background: #4CAF50; }
        .next-page { background: #FF9800; animation: glow 1.5s infinite; }
        
        @keyframes glow {
            0% { box-shadow: 0 0 0 0 rgba(255, 152, 0, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(255, 152, 0, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 152, 0, 0); }
        }
    </style>
</head>
<body>

<div id="header">
    <h1>Shape Matching Game</h1>
    <div id="shape-word">...</div>
    <div id="score">Stars: 0 / 10</div>
</div>

<div class="shape-buttons">
    <button class="shape-btn" id="btn1"></button>
    <button class="shape-btn" id="btn2"></button>
    <button class="shape-btn" id="btn3"></button>
    <button class="shape-btn" id="btn4"></button>
</div>

<div id="characters-container"></div>

<div id="star-overlay">
    <div class="big-star">⭐</div>
    <h1 style="font-size: 50px; color: #ff4500;">GREAT JOB!</h1>
    <p style="font-size: 24px;">You know your shapes!</p>
    <button class="game-btn play-again" onclick="resetGame()">Play Again</button>
    <button class="game-btn next-page" onclick="window.location.href='2b.html'">Next Game ➡️</button>
</div>

<script>
const shapes = [
    {name:'CIRCLE/BILOG', color:'#f94144', symbol:'●'},
    {name:'SQUARE/PARISUKAT', color:'#228B22', symbol:'■'},
    {name:'TRIANGLE/TATSULOK', color:'#2196F3', symbol:'▲'},
    {name:'STAR/BITUIN', color:'#FFD700', symbol:'★'},
    {name:'HEART/HUGIS-PUSO', color:'#FF69B4', symbol:'♥'}
];

let score = 0;
let targetShape = {};
const shapeWordDiv = document.getElementById('shape-word');
const scoreDiv = document.getElementById('score');
const buttons = [document.getElementById('btn1'), document.getElementById('btn2'), document.getElementById('btn3'), document.getElementById('btn4')];
const starOverlay = document.getElementById('star-overlay');

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playBeep(isCorrect) {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(isCorrect ? 800 : 200, audioCtx.currentTime);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
    osc.start();
    gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.1);
    osc.stop(audioCtx.currentTime + 0.1);
}

function initGame() {
    targetShape = shapes[Math.floor(Math.random() * shapes.length)];
    shapeWordDiv.textContent = targetShape.name;
    shapeWordDiv.style.color = targetShape.color;

    let otherShapes = [...shapes].filter(s => s.name !== targetShape.name);
    otherShapes.sort(() => 0.5 - Math.random());
    
    let winnerIndex = Math.floor(Math.random() * 4);
    
    for(let i=0; i<4; i++) {
        if(i === winnerIndex) {
            buttons[i].textContent = targetShape.symbol;
            buttons[i].style.backgroundColor = targetShape.color;
            buttons[i].dataset.shape = targetShape.name;
        } else {
            let s = otherShapes.pop();
            buttons[i].textContent = s.symbol;
            buttons[i].style.backgroundColor = s.color;
            buttons[i].dataset.shape = s.name;
        }
    }
}

buttons.forEach(btn => {
    btn.addEventListener('click', () => {
        if(btn.dataset.shape === targetShape.name) {
            playBeep(true);
            score++;
            scoreDiv.textContent = `Stars: ${score} / 10`;
            addCharacter();
            if(score >= 10) {
                starOverlay.style.display = 'flex';
            } else {
                initGame();
            }
        } else {
            playBeep(false);
            btn.style.opacity = "0.3";
            setTimeout(() => btn.style.opacity = "1", 500);
        }
    });
});

function addCharacter() {
    const char = document.createElement('div');
    char.className = 'character';
    char.style.fontSize = '50px';
    const icons = ['☀️', '🎈', '🐱', '⭐', '🌈', '🍦', '🐶', '🐝'];
    char.textContent = icons[Math.floor(Math.random() * icons.length)];
    document.getElementById('characters-container').appendChild(char);
    
    let x = Math.random() * (window.innerWidth - 60);
    let y = Math.random() * (window.innerHeight - 200) + 150;
    let dx = (Math.random() - 0.5) * 5;
    let dy = (Math.random() - 0.5) * 5;

    function move() {
        x += dx; y += dy;
        if(x < 0 || x > window.innerWidth - 60) dx *= -1;
        if(y < 150 || y > window.innerHeight - 60) dy *= -1;
        char.style.left = x + 'px';
        char.style.top = y + 'px';
        if(score < 10) requestAnimationFrame(move);
    }
    move();
}

function resetGame() {
    score = 0;
    scoreDiv.textContent = `Stars: 0 / 10`;
    starOverlay.style.display = 'none';
    document.getElementById('characters-container').innerHTML = '';
    initGame();
}

initGame();
</script>

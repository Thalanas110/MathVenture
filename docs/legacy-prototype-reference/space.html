<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Blast! Kindergarten Subtraction</title>
    <style>
        :root {
            --space-dark: #0f172a;
            --neon-pink: #f43f5e;
            --neon-blue: #0ea5e9;
            --neon-green: #10b981;
            --yellow: #f59e0b;
        }

        body {
            margin: 0;
            padding: 20px; /* Added padding to protect phone edges */
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif;
            background-color: var(--space-dark);
            color: #f8fafc;
            display: flex;
            flex-direction: column; /* Forces vertical stacking */
            justify-content: flex-start; /* Safely starts content at the top on small screens */
            align-items: center;
            min-height: 100vh;
            min-height: 100dvh; /* Accounts for mobile browser address bars */
            gap: 25px; /* Adds space between game and buttons */
            user-select: none;
            -webkit-user-select: none;
            box-sizing: border-box;
        }

        #game-wrapper {
            width: 100%; /* Changed to 100% for safe mobile sizing */
            max-width: 460px;
            margin-top: auto; /* Pushes the box down to center when there is space */
            background: linear-gradient(180deg, #1e1b4b 0%, #0f172a 100%);
            border: 4px solid var(--neon-blue);
            border-radius: 32px;
            padding: 20px;
            box-shadow: 0 0 20px rgba(14, 165, 233, 0.4);
            text-align: center;
            position: relative;
            box-sizing: border-box;
        }

        .stats-row {
            display: flex;
            justify-content: space-between;
            font-size: 1.1rem;
            color: #cbd5e1;
            font-weight: bold;
        }

        /* The moving spaceship track */
        #space-track {
            height: 70px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50px;
            margin: 15px 0;
            position: relative;
            display: flex;
            align-items: center;
            padding: 0 15px;
            border: 1px dashed rgba(14, 165, 233, 0.3);
        }

        #rocket {
            font-size: 2.5rem;
            position: absolute;
            left: 5%;
            transition: left 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #planet {
            font-size: 2.5rem;
            position: absolute;
            right: 5%;
        }

        #question-display {
            font-size: 3.5rem;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 15px var(--neon-pink);
            margin: 10px 0;
        }

        /* Targets to blast */
        #star-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin: 25px 0 15px 0;
        }

        .star-target {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 3px solid var(--neon-pink);
            border-radius: 24px;
            font-size: 2.8rem;
            font-weight: bold;
            padding: 15px 0;
            cursor: pointer;
            position: relative;
            font-family: inherit;
            box-shadow: 0 0 10px rgba(244, 63, 94, 0.2);
            transition: transform 0.1s, background-color 0.2s;
        }

        .star-target:active {
            transform: scale(0.92);
        }

        /* Badges container at the bottom */
        #badge-case {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 16px;
            padding: 10px;
            margin-top: 15px;
        }

        #badge-list {
            display: flex;
            justify-content: center;
            gap: 15px;
            font-size: 1.8rem;
            min-height: 40px;
        }

        /* Reward Screen Overlay */
        #victory-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.95);
            border-radius: 28px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }

        #victory-screen.show {
            opacity: 1;
            pointer-events: auto;
        }

        .badge-prize {
            font-size: 6rem;
            animation: float 2s infinite ease-in-out;
            margin: 20px;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .next-btn {
            background: var(--neon-green);
            color: #fff;
            border: none;
            font-size: 1.4rem;
            font-weight: bold;
            padding: 12px 35px;
            border-radius: 50px;
            cursor: pointer;
            font-family: inherit;
            box-shadow: 0 0 15px var(--neon-green);
        }

        /* Modern layout for bottom navigation images */
        .nav-buttons {
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap; /* Allows safe stacking on narrow screens */
            gap: 20px;
            margin-bottom: auto; /* Pushes the buttons up to balance the centering */
        }

        .nav-buttons img {
            transition: transform 0.2s;
            border-radius: 15px;
        }

        @media (hover: hover) {
            .nav-buttons img:hover {
                transform: scale(1.05);
            }
        }
    </style>
</head>
<body>

    <div id="game-wrapper">
        <div id="victory-screen">
            <h2 style="color: var(--yellow); margin: 0; font-size: 2rem;">🚀 Rank Unlocked! 🚀</h2>
            <p id="badge-name" style="font-size: 1.3rem; margin: 10px 0; color: #cbd5e1;">Space Cadet</p>
            <div class="badge-prize" id="badge-icon">🛸</div>
            <button class="next-btn" onclick="nextLevel()">Keep Flying!</button>
        </div>

        <div class="stats-row">
            <div>Score: <span id="score-val" style="color: var(--neon-pink);">0</span></div>
            <div>Next Badge: <span id="goal-val" style="color: var(--neon-blue);">10</span></div>
        </div>

        <div id="space-track">
            <div id="rocket">🚀</div>
            <div id="planet">🪐</div>
        </div>

        <p style="margin: 5px 0; color: #94a3b8; font-weight: bold;">Blast the star with the right answer!</p>
        <div id="question-display">6 - 2</div>

        <div id="star-grid">
            <button class="star-target" onclick="shootStar(this)">?</button>
            <button class="star-target" onclick="shootStar(this)">?</button>
            <button class="star-target" onclick="shootStar(this)">?</button>
            <button class="star-target" onclick="shootStar(this)">?</button>
        </div>

        <div id="badge-case">
            <div style="font-size: 0.8rem; color: #64748b; margin-bottom: 5px; text-transform: uppercase;">Space Ranks Earned</div>
            <div id="badge-list"></div>
        </div>
    </div>

    <div class="nav-buttons">
        <a href="5e.html"><img src="np.png" width="80" height="50" alt="Next Page"></a>
        <a href="1.html"><img src="ACT.png" width="80" height="50" alt="Activity"></a>
    </div>

    <script>
        let score = 0;
        let correctAnswer = 0;
        let milestone = 10;

        // Space Rank Rewards
        const ranks = [
            { name: "Moon Explorer", icon: "🧑‍🚀" },
            { name: "Galaxy Captain", icon: "🛸" },
            { name: "Cosmic Superstar", icon: "🌟" },
            { name: "Master of the Universe", icon: "👑" }
        ];
        let rankIndex = 0;

        // Custom Synthesized Sound Effects Engine (No audio download files required!)
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playLaserSound(isCorrect) {
            // Setup synthesizer oscillator node
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            const now = audioCtx.currentTime;

            if (isCorrect) {
                // Retro Space Laser Shoot sound "Pew!"
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(400, now);
                osc.frequency.exponentialRampToValueAtTime(900, now + 0.15);
                gain.gain.setValueAtTime(0.3, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
                osc.start(now);
                osc.stop(now + 0.15);
            } else {
                // Incorrect buzzy/dropping tone
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(220, now);
                osc.frequency.linearRampToValueAtTime(100, now + 0.2);
                gain.gain.setValueAtTime(0.2, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
                osc.start(now);
                osc.stop(now + 0.2);
            }
        }

        function playChimeSound() {
            // Sweet arcade arpeggio melody for winning a space rank badge
            const now = audioCtx.currentTime;
            const notes = [261.63, 329.63, 392.00, 523.25]; // C, E, G, C
            notes.forEach((freq, index) => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(freq, now + (index * 0.1));
                gain.gain.setValueAtTime(0.2, now + (index * 0.1));
                gain.gain.exponentialRampToValueAtTime(0.01, now + (index * 0.1) + 0.2);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start(now + (index * 0.1));
                osc.stop(now + (index * 0.1) + 0.2);
            });
        }

        function makeQuestion() {
            // Kindergarten subtraction: keeping calculations within 0 to 7
            const num1 = Math.floor(Math.random() * 5) + 3; // 3 to 7
            const num2 = Math.floor(Math.random() * (num1 + 1)); // 0 to num1
            correctAnswer = num1 - num2;

            document.getElementById('question-display').textContent = `${num1} - ${num2}`;

            // Create 4 random options
            let choices = [correctAnswer];
            while (choices.length < 4) {
                let fake = Math.floor(Math.random() * 8);
                if (!choices.includes(fake)) choices.push(fake);
            }
            choices.sort(() => Math.random() - 0.5);

            // Setup the star targets
            const buttons = document.querySelectorAll('.star-target');
            buttons.forEach((btn, idx) => {
                btn.textContent = choices[idx];
                btn.disabled = false;
                btn.style.border = '3px solid var(--neon-pink)';
                btn.style.background = 'rgba(255, 255, 255, 0.1)';
            });

            // Update Rocket Position visually on the line track (based on current score progress)
            const currentProgress = ((score % 10) / 10) * 70; // Map 0-10 score onto percentage bounds
            document.getElementById('rocket').style.left = `${5 + currentProgress}%`;
        }

        function shootStar(button) {
            const guess = parseInt(button.textContent);
            const buttons = document.querySelectorAll('.star-target');

            if (guess === correctAnswer) {
                score++;
                document.getElementById('score-val').textContent = score;
                playLaserSound(true);

                // Change star color to green on hit
                button.style.background = 'var(--neon-green)';
                button.style.border = '3px solid var(--neon-green)';
                
                buttons.forEach(btn => btn.disabled = true);

                if (score === milestone) {
                    setTimeout(showMilestoneScreen, 800);
                } else {
                    setTimeout(makeQuestion, 1000);
                }
            } else {
                playLaserSound(false);
                button.style.background = 'rgba(255,255,255,0.02)';
                button.style.border = '3px solid #475569'; // Grey out the incorrect choice
                button.disabled = true;
            }
        }

        function showMilestoneScreen() {
            playChimeSound();
            
            // Pick appropriate rank reward tier
            const rank = ranks[rankIndex % ranks.length];
            document.getElementById('badge-name').textContent = rank.name;
            document.getElementById('badge-icon').textContent = rank.icon;

            // Add new permanent badge to inventory drawer at bottom
            const badgeList = document.getElementById('badge-list');
            const span = document.createElement('span');
            span.textContent = rank.icon;
            span.title = rank.name;
            badgeList.appendChild(span);

            // Pop open overlay screen
            document.getElementById('victory-screen').classList.add('show');
            rankIndex++;
            milestone += 10;
        }

        function nextLevel() {
            document.getElementById('victory-screen').classList.remove('show');
            document.getElementById('goal-val').textContent = milestone;
            makeQuestion();
        }

        // Initialize first cosmic question
        makeQuestion();
    </script>
</body>
</html>

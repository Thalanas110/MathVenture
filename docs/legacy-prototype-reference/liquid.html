<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Mad Scientist's Liquid Lab</title>
    <style>
        :root {
            --mad-purple: #a855f7;
            --neon-green: #22c55e;
            --potion-pink: #ec4899;
            --potion-blue: #06b6d4;
            --potion-orange: #f97316;
            --dark: #1e293b;
        }

        body {
            margin: 0;
            padding: 20px; /* Added padding to protect phone edges */
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif;
            background: linear-gradient(180deg, #f3e8ff 0%, #e9d5ff 100%);
            color: var(--dark);
            display: flex;
            flex-direction: column; /* Forces vertical stacking */
            justify-content: flex-start; /* Safely starts content at the top on small screens */
            align-items: center;
            min-height: 100vh;
            min-height: 100dvh; /* Accounts for mobile browser address bars */
            gap: 25px; /* Adds space between game and buttons */
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }

        #game-container {
            width: 100%; /* Changed to 100% for safe mobile sizing */
            max-width: 440px;
            margin-top: auto; /* Pushes the box down to center when there is space */
            background: #ffffff;
            border: 6px solid var(--mad-purple);
            border-radius: 32px;
            padding: 20px;
            box-shadow: 0 20px 40px rgba(168, 85, 247, 0.2);
            text-align: center;
            position: relative;
            box-sizing: border-box;
        }

        .hud-row {
            display: flex;
            justify-content: space-between;
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--mad-purple);
            margin-bottom: 5px;
        }

        #question-banner {
            font-size: 2.2rem;
            font-weight: 900;
            margin: 10px 0;
            color: #6b21a8;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .highlight-word {
            background-color: #fef08a;
            padding: 2px 10px;
            border-radius: 10px;
            border: 2px dashed #ca8a04;
        }

        /* The Lab Table Stage */
        #lab-bench {
            height: 200px;
            background: #f8fafc;
            border: 4px solid #cbd5e1;
            border-radius: 24px;
            margin: 15px 0;
            display: flex;
            justify-content: space-around;
            align-items: flex-end;
            padding: 20px 10px;
            box-sizing: border-box;
            box-shadow: inset 0 4px 8px rgba(0,0,0,0.05), 0 8px 0 #e2e8f0;
        }

        /* Test Tube Container */
        .beaker-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            width: 28%;
            transition: transform 0.1s;
        }
        .beaker-wrapper:active {
            transform: scale(0.95);
        }

        /* Clear Glass Test Tube Frame */
        .test-tube {
            width: 50px;
            height: 120px;
            border: 4px solid #64748b;
            border-top: none;
            border-radius: 0 0 25px 25px;
            background: rgba(255, 255, 255, 0.6);
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            overflow: hidden;
            box-shadow: inset -5px 0 5px rgba(255,255,255,0.6);
        }

        /* Lip of the test tube */
        .beaker-wrapper::before {
            content: '';
            width: 58px;
            height: 8px;
            background: #64748b;
            border-radius: 4px;
            margin-bottom: -2px;
            z-index: 2;
        }

        /* Liquid Layer inside tube */
        .potion-liquid {
            width: 100%;
            transition: height 0.3s ease-out;
            border-radius: 0 0 20px 20px;
            position: relative;
        }

        /* Sparkle effect inside liquid */
        .potion-liquid::after {
            content: '✨';
            font-size: 0.8rem;
            position: absolute;
            top: 5px;
            left: 35%;
            opacity: 0.6;
        }

        .beaker-label {
            margin-top: 8px;
            font-weight: bold;
            font-size: 1.1rem;
            color: #475569;
        }

        /* Shelf for Scientist Badges */
        #mad-shelf {
            background: #f1f5f9;
            border-top: 4px solid var(--mad-purple);
            border-radius: 12px;
            padding: 8px;
            margin-top: 15px;
        }

        #shelf-badges {
            display: flex;
            justify-content: center;
            gap: 10px;
            font-size: 1.8rem;
            min-height: 35px;
        }

        /* Monster Reward Overlay Screen */
        #lab-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.98);
            border-radius: 26px;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 10; opacity: 0; pointer-events: none;
            transition: opacity 0.4s ease;
        }

        #lab-overlay.show { opacity: 1; pointer-events: auto; }

        .next-mix-btn {
            background-color: var(--neon-green);
            color: white;
            border: none;
            padding: 12px 35px;
            font-size: 1.3rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 0 #16a34a;
            font-family: inherit;
        }

        /* Modern layout for bottom navigation images */
        .nav-buttons {
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap; /* Allows safe stacking on narrow screens */
            gap: 20px;
            margin-bottom: auto; /* Pushes the buttons up to balance the centering */
        }

        .nav-buttons img {
            transition: transform 0.2s;
            border-radius: 15px;
        }

        @media (hover: hover) {
            .nav-buttons img:hover {
                transform: scale(1.05);
            }
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="lab-overlay">
            <h2 style="color: var(--mad-purple); margin: 0; font-size: 2.2rem;">🧪 Genius Chemist! 🧪</h2>
            <p style="font-size: 1.2rem; margin: 5px 0; color: #475569;">You unlocked a friendly lab helper:</p>
            <div style="font-size: 6.5rem; margin: 10px 0;" id="monster-icon">👾</div>
            <button class="next-mix-btn" onclick="closeLabWindow()">Next Experiment!</button>
        </div>

        <div class="hud-row">
            <div>Mixes Made: <span id="score-text">0</span></div>
            <div>Next Monster: <span id="target-text" style="color: var(--potion-orange);">10</span></div>
        </div>

        <div id="question-banner">Find the <span id="task-type" class="highlight-word">MOST</span></div>
        <p style="margin: 0; font-weight: bold; color: #64748b; font-size: 0.9rem;">Tap the test tube with the right amount of liquid!</p>

        <div id="lab-bench">
            <div class="beaker-wrapper" onclick="selectTube(0)" id="wrapper-0">
                <div class="test-tube">
                    <div class="potion-liquid" id="liquid-0" style="background-color: var(--potion-pink);"></div>
                </div>
                <div class="beaker-label">A</div>
            </div>
            <div class="beaker-wrapper" onclick="selectTube(1)" id="wrapper-1">
                <div class="test-tube">
                    <div class="potion-liquid" id="liquid-1" style="background-color: var(--potion-blue);"></div>
                </div>
                <div class="beaker-label">B</div>
            </div>
            <div class="beaker-wrapper" onclick="selectTube(2)" id="wrapper-2">
                <div class="test-tube">
                    <div class="potion-liquid" id="liquid-2" style="background-color: var(--potion-orange);"></div>
                </div>
                <div class="beaker-label">C</div>
            </div>
        </div>

        <div id="mad-shelf">
            <div style="font-size: 0.75rem; color: #94a3b8; font-weight: bold; text-transform: uppercase; margin-bottom: 3px;">Lab Helper Crew</div>
            <div id="shelf-badges"></div>
        </div>
    </div>

    <div class="nav-buttons">
        <a href="longer.html"><img src="np.png" width="80" height="50" alt="Next Page"></a>
        <a href="1.html"><img src="ACT.png" width="80" height="50" alt="Activity"></a>
    </div>

    <script>
        let score = 0;
        let labMilestone = 10;
        
        let targetCondition = "MOST"; 
        let heights = [0, 0, 0];
        let correctIndex = -1;
        let canClick = true;

        const monsterPrizes = ['👾', '👽', '👻', '🤖', '🦇', '🦉', '🐸', '🦁'];

        function generateExperiment() {
            canClick = true;
            targetCondition = Math.random() > 0.5 ? "MOST" : "LEAST";
            const taskSpan = document.getElementById('task-type');
            taskSpan.textContent = targetCondition;
            
            taskSpan.style.backgroundColor = targetCondition === "MOST" ? "#fef08a" : "#bfdbfe";
            taskSpan.style.borderColor = targetCondition === "MOST" ? "#ca8a04" : "#2563eb";

            let options = [25, 60, 95];
            options.sort(() => Math.random() - 0.5);
            heights = options;

            if (targetCondition === "MOST") {
                let maxVal = Math.max(...heights);
                correctIndex = heights.indexOf(maxVal);
            } else {
                let minVal = Math.min(...heights);
                correctIndex = heights.indexOf(minVal);
            }

            for (let i = 0; i < 3; i++) {
                const liquid = document.getElementById(`liquid-${i}`);
                liquid.style.height = heights[i] + "%";
                const wrapper = document.getElementById(`wrapper-${i}`);
                wrapper.style.opacity = "1";
                wrapper.style.transform = "scale(1)";
                liquid.style.filter = "none";
            }
        }

        function selectTube(index) {
            if (!canClick) return;
            if (index === correctIndex) {
                score++;
                document.getElementById('score-text').textContent = score;
                canClick = false;
                document.getElementById(`wrapper-${index}`).style.transform = "scale(1.1)";
                for (let i = 0; i < 3; i++) {
                    if (i !== correctIndex) document.getElementById(`wrapper-${i}`).style.opacity = "0.3";
                }
                if (score === labMilestone) setTimeout(showMonsterAward, 500);
                else setTimeout(generateExperiment, 900);
            } else {
                document.getElementById(`wrapper-${index}`).style.opacity = "0.2";
                document.getElementById(`liquid-${index}`).style.filter = "grayscale(1)";
            }
        }

        function showMonsterAward() {
            const prize = monsterPrizes[Math.floor(Math.random() * monsterPrizes.length)];
            document.getElementById('monster-icon').textContent = prize;
            const shelf = document.getElementById('shelf-badges');
            const span = document.createElement('span');
            span.textContent = prize;
            shelf.appendChild(span);
            document.getElementById('lab-overlay').classList.add('show');
            labMilestone += 10;
        }

        function closeLabWindow() {
            document.getElementById('lab-overlay').classList.remove('show');
            document.getElementById('target-text').textContent = labMilestone;
            generateExperiment();
        }

        generateExperiment();
    </script>
</body>
</html>

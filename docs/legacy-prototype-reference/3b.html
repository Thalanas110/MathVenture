<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Alphabet Express</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #b6d8e3;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Comic Sans MS', 'Chalkboard SE', cursive, sans-serif;
            padding: 10px;
        }

        .game-box {
            max-width: 600px; /* Adjusted for better phone fit */
            width: 100%;
            background: #fcf3cf;
            border-radius: 30px;
            border: 6px solid #f7b773;
            box-shadow: 0 8px 0 #cc9146;
            padding: 15px;
        }

        /* Top Bar */
        .train-header {
            background: #fedd9e;
            border-radius: 20px;
            padding: 8px 15px;
            margin-bottom: 12px;
            border: 4px solid #ce964b;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .level-indicator {
            background: #bee0b9;
            border-radius: 12px;
            padding: 3px 10px;
            font-size: 1rem;
            border: 2px solid #57944e;
            font-weight: bold;
        }

        .engine {
            background: #ffd58c;
            border-radius: 15px;
            padding: 8px;
            margin-bottom: 12px;
            border: 3px solid #c1863d;
            text-align: center;
            font-size: 1rem;
            font-weight: bold;
        }

        /* THE TRACK */
        .track {
            background: #b8d198;
            border-radius: 20px;
            padding: 15px 5px;
            border: 4px solid #789b4b;
            margin-bottom: 12px;
        }

        .train-cars {
            display: flex;
            justify-content: center;
            gap: 5px; /* Smaller gap for mobile */
        }

        .car-slot {
            background: #ffc88a;
            flex: 1;
            max-width: 80px; /* Slightly smaller for mobile */
            height: 90px;
            border-radius: 15px 15px 8px 8px;
            border: 3px solid #ad6e35;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 0 #7b4f26;
        }

        .letter-place {
            font-size: 2rem;
            font-weight: bold;
            color: #2c1809;
        }

        /* THE STATION */
        .station {
            background: #cfdbea;
            border-radius: 20px;
            padding: 15px;
            border: 4px solid #6482a3;
            margin-bottom: 12px;
        }

        .letters-grid {
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .letter-card {
            background: #ffdbb5;
            width: 60px; /* Better mobile size */
            height: 80px;
            border-radius: 15px;
            border: 3px solid #ea9549;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 6px 0 #b15f2a;
            font-size: 2.2rem;
            font-weight: bold;
            transition: transform 0.1s;
        }

        .letter-card:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #b15f2a;
        }

        .disabled-letter {
            opacity: 0.2;
            pointer-events: none;
            box-shadow: none;
        }

        /* Next Button */
        .next-choo-btn {
            width: 100%;
            background: #fdd06b;
            border: 5px solid #cc8b3c;
            font-size: 1.3rem;
            font-weight: bold;
            padding: 12px;
            border-radius: 20px;
            cursor: pointer;
            box-shadow: 0 6px 0 #9e632b;
            margin-bottom: 10px;
        }

        .next-choo-btn:active:not(:disabled) {
            transform: translateY(4px);
            box-shadow: none;
        }

        /* Bottom Menu Table */
        .bottom-nav {
            margin-top: 15px;
            width: 100%;
        }

        .nav-table {
            width: 100%;
            max-width: 300px;
            margin: 0 auto;
        }

        /* Tablet/Desktop Resize */
        @media (min-width: 600px) {
            .car-slot { height: 120px; max-width: 100px; }
            .letter-place { font-size: 3rem; }
            .letter-card { width: 80px; height: 100px; font-size: 3rem; }
            .game-box { padding: 25px; }
        }
    </style>
</head>
<body>

<div class="game-box">
    <div class="train-header">
        <h2 style="font-size: 1.1rem;">❤️ KAYA MO YAN!</h2>
        <div class="level-indicator" id="levelDisplay">....</div>
    </div>

    <div class="engine" id="engineMessage">Loading...</div>

    <div class="track">
        <div class="train-cars" id="trainCarsContainer"></div>
    </div>

    <div class="station">
        <div class="letters-grid" id="lettersGrid"></div>
    </div>

    <div class="engine" style="background:#ead2aa;" id="feedbackText">Ready?</div>

    <button class="next-choo-btn" id="nextTrainBtn" disabled>NEXT ➔</button>
    
    <div style="text-align: center;">
        <span onclick="location.reload()" style="cursor:pointer; text-decoration: underline; color: #9e602b; font-weight: bold; font-size: 0.9rem;">🔄 Reset Game</span>
    </div>
</div>

<div class="bottom-nav">
    <table class="nav-table">
        <tr>
            <td align="center">
                <a href="3c.html"><img src="np.png" width="100" alt="Next Page"></a>
            <br>
                <a href="1.html"><img src="ACT.png" width="100" alt="Home"></a>
            </td>
        </tr>
    </table>
</div>

<script>
    window.onload = function() {
        const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
        let currentSequence = [];
        let userSequence = [];
        let currentStepIndex = 0;

        const trainContainer = document.getElementById('trainCarsContainer');
        const lettersGrid = document.getElementById('lettersGrid');
        const engineMsg = document.getElementById('engineMessage');
        const feedback = document.getElementById('feedbackText');
        const levelDisp = document.getElementById('levelDisplay');
        const nextBtn = document.getElementById('nextTrainBtn');

        function startNewRound() {
            const startIdx = Math.floor(Math.random() * (alphabet.length - 4));
            currentSequence = alphabet.slice(startIdx, startIdx + 4);
            userSequence = [];
            currentStepIndex = 0;
            
            nextBtn.disabled = true;
            levelDisp.innerText = currentSequence.join(" ");
            engineMsg.innerText = "Pagsunod-sunurin ang mga letra!";
            feedback.innerText = "Pumili ng mga letra.";
            
            renderSlots();
            renderChoices();
        }

        function renderSlots() {
            trainContainer.innerHTML = "";
            for(let i=0; i<4; i++) {
                const char = userSequence[i] || "";
                trainContainer.innerHTML += `
                    <div class="car-slot">
                        <div style="font-size: 0.7rem; margin-bottom: 2px;">😊 ${i+1}</div>
                        <div class="letter-place">${char}</div>
                    </div>`;
            }
        }

        function renderChoices() {
            const shuffled = [...currentSequence].sort(() => Math.random() - 0.5);
            lettersGrid.innerHTML = "";
            shuffled.forEach(letter => {
                const btn = document.createElement('div');
                btn.className = 'letter-card';
                btn.innerText = letter;
                btn.onclick = () => handlePick(letter, btn);
                lettersGrid.appendChild(btn);
            });
        }

        function handlePick(letter, element) {
            const expected = currentSequence[currentStepIndex];

            if (letter === expected) {
                userSequence.push(letter);
                currentStepIndex++;
                element.classList.add('disabled-letter');
                feedback.innerText = "Good job! ✅";
                
                if (currentStepIndex === 4) {
                    feedback.innerText = "Mahusay! 🏆";
                    engineMsg.innerText = "Magaling! Binabati kita";
                    nextBtn.disabled = false;
                }
                renderSlots(); 
            } else {
                feedback.innerText = "Hindi yan! Subukan ang " + expected + " 🤔";
            }
        }

        nextBtn.onclick = startNewRound;
        startNewRound();
    };
</script>

</body>
</html>

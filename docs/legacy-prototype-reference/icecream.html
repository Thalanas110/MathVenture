<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magic Ice Cream Shop Addition</title>
    <style>
        :root {
            --cream-pink: #f472b6;
            --mint-blue: #38bdf8;
            --cone-brown: #d97706;
            --dish-glass: #e2e8f0;
            --dark: #1e293b;
        }

        body {
            margin: 0;
            padding: 20px; /* Added padding to protect phone edges */
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif;
            background: linear-gradient(180deg, #faf5ff 0%, #f3e8ff 100%);
            color: var(--dark);
            display: flex;
            flex-direction: column; /* Forces vertical stacking */
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            gap: 25px; /* Adds space between game and buttons */
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }

        #game-container {
            width: 100%; /* Changed to 100% for safe mobile sizing */
            max-width: 460px;
            background: #ffffff;
            border: 6px solid #a855f7;
            border-radius: 32px;
            padding: 20px;
            box-shadow: 0 20px 40px rgba(168, 85, 247, 0.15);
            text-align: center;
            position: relative;
            box-sizing: border-box;
        }

        .hud-row {
            display: flex;
            justify-content: space-between;
            font-size: 1.2rem;
            font-weight: bold;
            color: #a855f7;
        }

        #math-banner {
            font-size: 3.2rem;
            font-weight: 900;
            margin: 10px 0;
            color: #7e22ce;
            text-shadow: 2px 2px 0px #f3e8ff;
        }

        /* The Ingredients / Scooping Stations */
        .tub-container {
            display: flex;
            justify-content: space-around;
            margin: 10px 0;
            background: #fafafa;
            border-radius: 20px;
            padding: 10px;
            border: 2px dashed #cbd5e1;
        }

        .ice-cream-tub {
            background: #ffffff;
            border: 3px solid #e2e8f0;
            border-radius: 16px;
            padding: 8px 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* The Draggable Scoops */
        .scoop {
            font-size: 2.8rem;
            cursor: grab;
            display: inline-block;
            transition: transform 0.1s;
            touch-action: none; /* Crucial for mobile dragging */
        }
        .scoop:active { cursor: grabbing; transform: scale(1.1); }

        /* The Sundae Dish Stage */
        #serving-stage {
            height: 160px;
            background: #f1f5f9;
            border-radius: 24px;
            margin: 15px 0;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            padding-bottom: 25px;
            box-shadow: inset 0 4px 6px rgba(0,0,0,0.05);
        }

        #glass-bowl {
            width: 220px;
            height: 70px;
            background: rgba(226, 232, 240, 0.7);
            border: 4px solid #94a3b8;
            border-radius: 0 0 50px 50px;
            position: relative;
            display: flex;
        }

        .bowl-half {
            width: 50%;
            height: 100%;
            display: flex;
            flex-wrap: wrap-reverse;
            align-content: flex-start;
            justify-content: center;
            gap: 2px;
            padding-bottom: 10px;
            position: relative;
            box-sizing: border-box;
        }
        #left-bowl-half { border-right: 2px dashed rgba(148, 163, 184, 0.4); }

        /* Placed scoops inside the bowl */
        .placed-scoop {
            font-size: 2.3rem;
            margin-bottom: -12px; /* Stacks them slightly look like a real sundae */
            animation: plopDrop 0.2s ease-out;
            cursor: pointer;
        }

        @keyframes plopDrop {
            0% { transform: translateY(-30px) scale(0.5); }
            100% { transform: translateY(0) scale(1); }
        }

        /* Action Serving Button */
        .serve-btn {
            background-color: #22c55e;
            color: white;
            border: none;
            padding: 12px 40px;
            font-size: 1.5rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 6px 0 #15803d;
            font-family: inherit;
            margin-top: 5px;
        }
        .serve-btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #15803d;
        }

        /* Badge Shelf */
        #badge-shelf {
            background: #f8fafc;
            border-top: 4px solid #a855f7;
            border-radius: 12px;
            padding: 8px;
            margin-top: 15px;
        }
        #shelf-badges {
            display: flex;
            justify-content: center;
            gap: 8px;
            font-size: 1.8rem;
            min-height: 35px;
        }

        /* Overlay Reward */
        #shop-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.98);
            border-radius: 26px;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 10; opacity: 0; pointer-events: none;
            transition: opacity 0.4s ease;
        }
        #shop-overlay.show { opacity: 1; pointer-events: auto; }

        /* Modern layout for bottom navigation images */
        .nav-buttons {
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap; /* Allows safe stacking on narrow screens */
            gap: 20px;
        }

        .nav-buttons img {
            transition: transform 0.2s;
            border-radius: 15px;
        }

        @media (hover: hover) {
            .nav-buttons img:hover {
                transform: scale(1.05);
            }
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="shop-overlay">
            <h2 style="color: #a855f7; margin: 0; font-size: 2.2rem;">🍦 Ice Cream Master! 🍦</h2>
            <p style="font-size: 1.2rem; margin: 5px 0; color: #475569;">You unlocked a new special topping:</p>
            <div style="font-size: 6.5rem; animation: ticketPop 1s infinite alternate ease-in-out;" id="reward-icon">🍒</div>
            <button class="serve-btn" onclick="closeShopWindow()">Make Next Sundae!</button>
        </div>

        <div class="hud-row">
            <div>Sundaes: <span id="score-text" style="color: #a855f7;">0</span></div>
            <div>Next Topping: <span id="target-text" style="color: var(--cone-brown);">10</span></div>
        </div>

        <div id="math-banner">3 + 2</div>
        <p style="margin: 0; font-weight: bold; color: #64748b; font-size: 0.9rem;">Drag ice cream to the bowl! Tap a scoop to remove it.</p>

        <div class="tub-container">
            <div class="ice-cream-tub" style="border-color: var(--cream-pink);">
                <div class="scoop" draggable="true" id="pink-scoop" ondragstart="drag(event)">🍨</div>
                <span style="font-size: 0.75rem; font-weight: bold; color: var(--cream-pink);">STRAWBERRY</span>
            </div>
            <div class="ice-cream-tub" style="border-color: var(--mint-blue);">
                <div class="scoop" draggable="true" id="blue-scoop" ondragstart="drag(event)">🍦</div>
                <span style="font-size: 0.75rem; font-weight: bold; color: var(--mint-blue);">MINT BLUE</span>
            </div>
        </div>

        <div id="serving-stage">
            <div id="glass-bowl">
                <div class="bowl-half" id="left-bowl-half" ondragover="allowDrop(event)" ondrop="drop(event, 'left')"></div>
                <div class="bowl-half" id="right-bowl-half" ondragover="allowDrop(event)" ondrop="drop(event, 'right')"></div>
            </div>
        </div>

        <button class="serve-btn" onclick="checkSundaeOrder()">Ring Bell & Serve! 🔔</button>

        <div id="badge-shelf">
            <div style="font-size: 0.75rem; color: #94a3b8; font-weight: bold; text-transform: uppercase; margin-bottom: 3px;">Unlocked Topping Badges</div>
            <div id="shelf-badges"></div>
        </div>
    </div>

    <div class="nav-buttons">
        <a href="pizza.html"><img src="np.png" width="80" height="50" alt="Next Page"></a>
        <a href="1.html"><img src="ACT.png" width="80" height="50" alt="Activity"></a>
    </div>

    <script>
        let score = 0;
        let num1 = 0, num2 = 0;
        let shopMilestone = 10;

        const shopPrizes = ['🍒', '🍫', '🍓', '🍌', '🍪', 'Wafer', '🍯', '✨'];
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        // Cross-platform mobile touch setup
        document.querySelectorAll('.scoop').forEach(item => {
            item.addEventListener('touchstart', handleTouchStart, {passive: false});
            item.addEventListener('touchmove', handleTouchMove, {passive: false});
            item.addEventListener('touchend', handleTouchEnd, {passive: false});
        });

        let activeTouchId = null;
        let activeClone = null;

        function handleTouchStart(e) {
            e.preventDefault();
            const touch = e.touches[0];
            activeTouchId = touch.identifier;
            activeClone = this.cloneNode(true);
            activeClone.style.position = 'fixed';
            activeClone.style.left = touch.clientX - 25 + 'px';
            activeClone.style.top = touch.clientY - 25 + 'px';
            activeClone.style.opacity = '0.8';
            activeClone.style.zIndex = '1000';
            activeClone.id = this.id; // Preserve ID for drop processing
            document.body.appendChild(activeClone);
        }

        function handleTouchMove(e) {
            if (!activeClone) return;
            const touch = Array.from(e.touches).find(t => t.identifier === activeTouchId);
            if (touch) {
                activeClone.style.left = touch.clientX - 25 + 'px';
                activeClone.style.top = touch.clientY - 25 + 'px';
            }
        }

        function handleTouchEnd(e) {
            if (!activeClone) return;
            const rectLeft = document.getElementById('left-bowl-half').getBoundingClientRect();
            const rectRight = document.getElementById('right-bowl-half').getBoundingClientRect();
            
            const dropX = parseInt(activeClone.style.left) + 25;
            const dropY = parseInt(activeClone.style.top) + 25;

            // Simple collision check for container drops
            if (dropX >= rectLeft.left && dropX <= rectLeft.right && dropY >= rectLeft.top && dropY <= rectLeft.bottom) {
                addScoopToBowl('left', activeClone.id);
            } else if (dropX >= rectRight.left && dropX <= rectRight.right && dropY >= rectRight.top && dropY <= rectRight.bottom) {
                addScoopToBowl('right', activeClone.id);
            }

            activeClone.remove();
            activeClone = null;
        }

        function playSound(type) {
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();

            if (type === 'plop') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(250, now);
                osc.frequency.linearRampToValueAtTime(150, now + 0.1);
                gain.gain.setValueAtTime(0.15, now);
                gain.gain.linearRampToValueAtTime(0.01, now + 0.1);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(now); osc.stop(now + 0.1);
            } else if (type === 'bell') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(987.77, now); // B5 note
                gain.gain.setValueAtTime(0.2, now);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(now); osc.stop(now + 0.4);
            } else if (type === 'error') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(150, now);
                gain.gain.setValueAtTime(0.2, now);
                gain.gain.linearRampToValueAtTime(0.01, now + 0.2);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(now); osc.stop(now + 0.2);
            }
        }

        // Desktop Drag and Drop handlers
        function allowDrop(ev) { ev.preventDefault(); }
        function drag(ev) { ev.dataTransfer.setData("text", ev.target.id); }
        function drop(ev, side) {
            ev.preventDefault();
            const id = ev.dataTransfer.getData("text");
            addScoopToBowl(side, id);
        }

        function addScoopToBowl(side, id) {
            const targetHalf = document.getElementById(`${side}-bowl-half`);
            if (targetHalf.children.length >= 6) return; // Prevent messy overflows

            const flavor = document.createElement('span');
            flavor.className = 'placed-scoop';
            flavor.textContent = (id === 'pink-scoop') ? '🍨' : '🍦';
            
            // Allow children to click a scoop inside the bowl to throw it away if they miscount!
            flavor.onclick = function() { this.remove(); playSound('plop'); };

            targetHalf.appendChild(flavor);
            playSound('plop');
        }

        function generateNewRecipe() {
            num1 = Math.floor(Math.random() * 4) + 1; // 1 to 4 strawberry
            num2 = Math.floor(Math.random() * 4) + 1; // 1 to 4 mint
            document.getElementById('math-banner').textContent = `${num1} + ${num2}`;
            
            document.getElementById('left-bowl-half').innerHTML = '';
            document.getElementById('right-bowl-half').innerHTML = '';
        }

        function checkSundaeOrder() {
            const currentLeft = document.getElementById('left-bowl-half').children.length;
            const currentRight = document.getElementById('right-bowl-half').children.length;

            if (currentLeft === num1 && currentRight === num2) {
                score++;
                document.getElementById('score-text').textContent = score;
                playSound('bell');

                if (score === shopMilestone) {
                    setTimeout(showMilestoneReward, 500);
                } else {
                    setTimeout(generateNewRecipe, 1000);
                }
            } else {
                playSound('error');
                alert("Oops! Let's count the scoops again to match the recipe numbers! ✨");
            }
        }

        function showMilestoneReward() {
            const prize = shopPrizes[Math.floor(Math.random() * shopPrizes.length)];
            document.getElementById('reward-icon').textContent = prize;

            const shelf = document.getElementById('shelf-badges');
            const span = document.createElement('span');
            span.textContent = prize;
            shelf.appendChild(span);

            document.getElementById('shop-overlay').classList.add('show');
            shopMilestone += 10;
        }

        function closeShopWindow() {
            document.getElementById('shop-overlay').classList.remove('show');
            document.getElementById('target-text').textContent = shopMilestone;
            generateNewRecipe();
        }

        generateNewRecipe();
    </script>
</body>
</html>
